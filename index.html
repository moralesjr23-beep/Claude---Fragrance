<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="build-stamp" content="v5.9.6-pdf-v29" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10101d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Vault" />
  <title>The Vault — Maison AJ v5.9.6</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');
    :root{
      --bg:#fbf7ee; --panel:#fffaf0; --panel2:#f5ead7; --text:#17140f; --muted:#6b604f; --line:rgba(80,58,20,.18);
      --accent:#b78934; --accent2:#7a5a22; --danger:#b53b3b; --good:#2f7c54; --warn:#c98a2b;
      --shadow:0 18px 45px rgba(48,34,12,.14); --shadowSm:0 6px 16px rgba(48,34,12,.08);
      --chip:#efe3ca; --nav:#fffaf0; --btn:#1c1a17; --btnText:#fff8e8;
      --display:"Cormorant Garamond",Georgia,serif; --body:"Inter",-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    }
    [data-theme="dark"]{
      --bg:#0e0e1c; --panel:#17172a; --panel2:#20203a; --text:#f7f0df; --muted:#aa9f8b; --line:rgba(232,184,74,.18);
      --accent:#e8b84a; --accent2:#ffd66f; --danger:#ff6b6b; --good:#72d49d; --warn:#ffc875;
      --shadow:0 22px 55px rgba(0,0,0,.42); --shadowSm:0 6px 16px rgba(0,0,0,.3);
      --chip:#262646; --nav:#151527; --btn:#e8b84a; --btnText:#17120a;
    }
    *{box-sizing:border-box}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{margin:0;min-height:100%;background:radial-gradient(ellipse at top,var(--panel2),var(--bg) 50%) fixed;color:var(--text);font-family:var(--body);font-size:15px;line-height:1.45;padding:env(safe-area-inset-top) 0 calc(78px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit;font-family:var(--body)}
    button{min-height:44px;cursor:pointer}
    .app{max-width:980px;margin:0 auto;padding:14px 14px 0}
    header{position:sticky;top:0;z-index:20;padding:10px 0 12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:linear-gradient(to bottom,var(--bg) 30%,rgba(0,0,0,0))}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand h1{font-family:var(--display);font-size:42px;line-height:.9;margin:0;letter-spacing:.005em;font-weight:600;font-style:italic;font-feature-settings:"liga","dlig"}
    .brand h1 .pronounce{font-style:normal;font-size:11px;font-weight:500;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;display:block;margin-top:2px;font-family:var(--body);opacity:.7}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
    .themeToggle{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);padding:4px;border-radius:999px;box-shadow:var(--shadowSm)}
    .themeToggle button{border:0;border-radius:999px;background:transparent;color:var(--muted);padding:0 11px;font-size:12px;min-height:32px;font-weight:600}
    .themeToggle button.active{background:var(--btn);color:var(--btnText)}
    .upgradeBanner{margin-top:10px;padding:10px 14px;background:linear-gradient(90deg,rgba(232,184,74,.18),rgba(232,184,74,.08));border:1px solid var(--accent);border-radius:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12.5px;font-weight:600}
    .upgradeBanner span{flex:1;line-height:1.35}

    main{padding-bottom:12px}
    .view{display:none}
    .view.active{display:block;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .card{background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px;margin:14px 0}
    .card h2,.card h3{font-family:var(--display);margin:0 0 10px;letter-spacing:.01em;font-weight:600}
    .card h2{font-size:30px}
    .card h3{font-size:22px}
    .sub{color:var(--muted);font-size:13px;line-height:1.5}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media(min-width:720px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.app{padding:16px 22px 0}}

    .input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:14px;padding:12px 14px;min-height:44px;outline:none;transition:border-color .15s,box-shadow .15s}
    .input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(183,137,52,.18)}
    textarea{min-height:88px;resize:vertical}
    .btn{border:0;border-radius:14px;background:var(--btn);color:var(--btnText);padding:0 16px;font-weight:700;box-shadow:0 6px 16px rgba(0,0,0,.14);transition:transform .1s,filter .15s}
    .btn:active{transform:scale(.97)}
    .btn:hover{filter:brightness(1.06)}
    .btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line);box-shadow:none}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.full{width:100%}
    .btn.sm{padding:0 11px;min-height:34px;font-size:13px;border-radius:11px}

    .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;-ms-overflow-style:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{border:1px solid var(--line);background:var(--chip);color:var(--text);border-radius:999px;padding:8px 12px;white-space:nowrap;font-size:12.5px;min-height:36px;display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:transform .1s}
    .chip:active{transform:scale(.96)}
    .chip.active{background:var(--btn);color:var(--btnText);border-color:transparent;font-weight:700}
    /* DNA filter chip: small inline color dot before the label */
    .dnaFilterChip .dnaDot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
    [data-theme="light"] .dnaFilterChip .dnaDot{box-shadow:0 0 0 1px rgba(0,0,0,.12)}
    .dnaChip{border-radius:999px;padding:6px 10px;color:#0c0c14;font-weight:700;font-size:11.5px;border:1px solid rgba(255,255,255,.35);letter-spacing:.01em;background:#a08254}
    .wearDnaBlock{margin:12px 0 0;padding:11px 12px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(135deg,rgba(232,184,74,.08),rgba(255,255,255,.02))}
    .wearDnaLabel{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:0 0 7px}
    .wearDnaRow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .wearDnaBlock .dnaChip{font-size:11px;padding:6px 9px;box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:rgba(255,255,255,.28)}
    .todayDnaSummary{border-color:rgba(214,173,92,.28);background:linear-gradient(145deg,rgba(214,173,92,.13),rgba(12,12,18,.42));box-shadow:0 18px 46px rgba(0,0,0,.28)}
    .todayDnaSummary .dnaChip{font-size:12px;padding:7px 11px;letter-spacing:.01em}
    .todayDnaSummary h3{font-size:25px;margin:0 0 2px}
    .todayDnaTitle{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
    .todayDnaPills{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
    .todayDnaMeta{font-size:12px;color:var(--muted);line-height:1.45}
    .wearAltDna{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 4px}
    .wearAltDna .dnaChip{font-size:10.5px;padding:5px 8px}

    .bottleCard{border:1px solid var(--line);background:linear-gradient(160deg,var(--panel),var(--panel2));border-radius:22px;padding:14px;min-height:160px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .12s,box-shadow .15s;position:relative;overflow:hidden}
    .bottleCard:active{transform:scale(.985)}
    .bottleCard:hover{box-shadow:var(--shadow)}
    .bottleCard h3{font-size:19px;margin:0 0 4px;line-height:1.15}
    /* Flag-based visual differentiation. Anchor gets a gold left bar + glow; justified gets accent left bar; near/exact dup get a muted warning bar */
    .bottleCard.flag-anchor{border-color:rgba(232,184,74,.55);background:linear-gradient(160deg,rgba(232,184,74,.08),var(--panel2))}
    .bottleCard.flag-anchor::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#e8b84a,#a07b1a);box-shadow:0 0 12px rgba(232,184,74,.45)}
    .bottleCard.flag-justified::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent2,#7da890);opacity:.7}
    .bottleCard.flag-near-dup::before,.bottleCard.flag-exact-dup::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--warn,#d97757);opacity:.55}
    .bottleCard.flag-overlap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#9d8fbf;opacity:.5}
    .meta{color:var(--muted);font-size:11.5px;line-height:1.4}
    .flag{font-size:9.5px;font-weight:800;letter-spacing:.08em;color:var(--accent2);background:rgba(183,137,52,.14);padding:3px 7px;border-radius:6px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
    .flag.dust{color:var(--warn);background:rgba(201,138,43,.16)}
    .sectionTitle{font-family:var(--display);font-size:24px;margin:22px 4px 10px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline}
    .sectionTitle .count{font-family:var(--body);font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.04em}
    .list{display:grid;gap:10px}
    .lineItem{padding:13px 14px;border:1px solid var(--line);border-radius:16px;background:var(--panel)}
    .lineItem b{font-weight:700}

    /* === LAB HERO — CINEMATIC ANIMATION === */
    .labHero{position:relative;min-height:280px;border-radius:24px;background:radial-gradient(ellipse at center,var(--panel2),var(--panel));border:1px solid var(--line);overflow:hidden;padding:16px 12px 12px;isolation:isolate}
    /* Vignette layer */
    .labHero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.35) 100%);opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:1}
    .labHero.animating::before{opacity:1}
    /* Spotlight beam from center */
    .labHero::after{content:'';position:absolute;left:50%;top:50%;width:280px;height:280px;background:radial-gradient(circle,rgba(232,184,74,.18) 0%,transparent 60%);transform:translate(-50%,-50%) scale(.3);opacity:0;transition:transform .8s cubic-bezier(.4,0,.2,1),opacity .5s ease;pointer-events:none;z-index:0}
    .labHero.merge::after{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
    .labHero.clash::after{background:radial-gradient(circle,rgba(220,60,60,.25) 0%,transparent 60%);opacity:1}

    .bottleStage{position:relative;height:240px;z-index:2}
    .svgBottle{position:absolute;top:24px;width:108px;height:174px;transform-origin:bottom center;transition:transform .9s cubic-bezier(.34,1.56,.64,1),opacity .4s ease,filter .4s ease;filter:drop-shadow(0 6px 12px rgba(0,0,0,.25))}
    .bottleA{left:6%;transform:rotate(-2deg)}
    .bottleB{right:6%;transform:rotate(2deg)}
    .resultBottle{left:50%;transform:translateX(-50%) scale(.5) translateY(20px);opacity:0;filter:drop-shadow(0 0 24px rgba(232,184,74,.5)) drop-shadow(0 8px 16px rgba(0,0,0,.3))}

    /* Step 1: tilt and pour toward center */
    .labHero.animating .bottleA{transform:translateX(50px) rotate(18deg) scale(1.04)}
    .labHero.animating .bottleB{transform:translateX(-50px) rotate(-18deg) scale(1.04)}

    /* Droplet trails */
    .droplet{position:absolute;width:6px;height:10px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;top:88px;opacity:0;z-index:3;pointer-events:none;filter:blur(.3px)}
    .dropletA{left:38%;background:radial-gradient(circle at 30% 30%,#fff,var(--accent) 70%)}
    .dropletB{right:38%;background:radial-gradient(circle at 30% 30%,#fff,var(--accent2) 70%)}
    .labHero.animating .dropletA{animation:dropFallA 700ms cubic-bezier(.55,0,.6,1) 280ms forwards}
    .labHero.animating .dropletB{animation:dropFallB 700ms cubic-bezier(.55,0,.6,1) 280ms forwards}
    @keyframes dropFallA{0%{opacity:0;transform:translate(0,0) scale(.5)}15%{opacity:1;transform:translate(8px,12px) scale(1)}70%{opacity:1;transform:translate(56px,40px) scale(.9)}100%{opacity:0;transform:translate(76px,52px) scale(.3)}}
    @keyframes dropFallB{0%{opacity:0;transform:translate(0,0) scale(.5)}15%{opacity:1;transform:translate(-8px,12px) scale(1)}70%{opacity:1;transform:translate(-56px,40px) scale(.9)}100%{opacity:0;transform:translate(-76px,52px) scale(.3)}}

    /* Orb */
    .orb{position:absolute;left:50%;top:78px;width:96px;height:96px;transform:translateX(-50%) scale(.2);opacity:0;transition:transform .6s cubic-bezier(.34,1.56,.64,1),opacity .4s ease;filter:drop-shadow(0 0 22px rgba(232,184,74,.55));z-index:4;pointer-events:none}
    .labHero.merge .orb{opacity:1;transform:translateX(-50%) scale(1)}
    .labHero.merge .orb circle{animation:orbPulse 1.4s ease-in-out infinite}
    @keyframes orbPulse{0%,100%{transform-origin:center;transform:scale(1)}50%{transform:scale(1.06)}}

    /* Particle burst */
    .particles{position:absolute;left:50%;top:50%;width:2px;height:2px;z-index:3;pointer-events:none}
    .particle{position:absolute;left:0;top:0;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);opacity:0}
    .labHero.merge .particle{animation:particleBurst 800ms cubic-bezier(.2,.7,.4,1) forwards}
    .labHero.merge .particle:nth-child(1){animation-delay:0ms;--tx:80px;--ty:0px}
    .labHero.merge .particle:nth-child(2){animation-delay:30ms;--tx:64px;--ty:64px}
    .labHero.merge .particle:nth-child(3){animation-delay:60ms;--tx:0px;--ty:70px}
    .labHero.merge .particle:nth-child(4){animation-delay:90ms;--tx:-60px;--ty:60px}
    .labHero.merge .particle:nth-child(5){animation-delay:120ms;--tx:-78px;--ty:0px}
    .labHero.merge .particle:nth-child(6){animation-delay:50ms;--tx:-62px;--ty:-62px}
    .labHero.merge .particle:nth-child(7){animation-delay:80ms;--tx:0px;--ty:-75px}
    .labHero.merge .particle:nth-child(8){animation-delay:110ms;--tx:58px;--ty:-58px}
    @keyframes particleBurst{
      0%{opacity:0;transform:translate(0,0) scale(.3)}
      20%{opacity:1;transform:translate(calc(var(--tx) * .3),calc(var(--ty) * .3)) scale(1)}
      100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.4)}
    }

    /* Result reveal */
    .labHero.result .bottleA{transform:translateX(-90px) rotate(-2deg) scale(.85);opacity:.18;filter:saturate(.4) blur(1px)}
    .labHero.result .bottleB{transform:translateX(90px) rotate(2deg) scale(.85);opacity:.18;filter:saturate(.4) blur(1px)}
    .labHero.result .resultBottle{opacity:1;transform:translateX(-50%) scale(1.05) translateY(0);animation:resultBob 3s ease-in-out 1s infinite}
    .labHero.result .orb{opacity:0;transform:translateX(-50%) scale(2.2);filter:drop-shadow(0 0 40px rgba(232,184,74,.8))}
    @keyframes resultBob{0%,100%{transform:translateX(-50%) scale(1.05) translateY(0)}50%{transform:translateX(-50%) scale(1.05) translateY(-4px)}}

    /* Clash mode — bottles still merge into one, but the combo bottle gets a red glow and shaky settle */
    .labHero.clash .bottleA{transform:translateX(-110px) rotate(-12deg) scale(.85);filter:saturate(.4) blur(1px) drop-shadow(0 0 12px rgba(220,60,60,.4));opacity:.18}
    .labHero.clash .bottleB{transform:translateX(110px) rotate(12deg) scale(.85);filter:saturate(.4) blur(1px) drop-shadow(0 0 12px rgba(220,60,60,.4));opacity:.18}
    .labHero.clash .orb{opacity:1;transform:translateX(-50%) scale(1.1);animation:shake .5s ease;filter:drop-shadow(0 0 28px rgba(220,60,60,.85)) saturate(1.5)}
    .labHero.clash.result .resultBottle{opacity:1;filter:drop-shadow(0 0 24px rgba(220,60,60,.55)) drop-shadow(0 8px 16px rgba(0,0,0,.3)) saturate(.85);animation:clashSettle .8s ease, resultBob 3s ease-in-out 1s infinite}
    @keyframes clashSettle{0%{transform:translateX(-50%) scale(1.05) translateY(0)}20%{transform:translateX(calc(-50% - 8px)) scale(1.05) rotate(-2deg)}40%{transform:translateX(calc(-50% + 8px)) scale(1.05) rotate(2deg)}60%{transform:translateX(calc(-50% - 4px)) scale(1.05) rotate(-1deg)}80%{transform:translateX(calc(-50% + 4px)) scale(1.05) rotate(1deg)}100%{transform:translateX(-50%) scale(1.05) translateY(0)}}
    .labHero.clash::before{background:radial-gradient(ellipse at center,transparent 20%,rgba(60,0,0,.5) 100%)}
    @keyframes shake{0%,100%{transform:translateX(-50%) scale(1.1)}15%{transform:translateX(calc(-50% - 14px)) rotate(-3deg) scale(1.1)}30%{transform:translateX(calc(-50% + 14px)) rotate(3deg) scale(1.1)}45%{transform:translateX(calc(-50% - 10px)) rotate(-2deg) scale(1.1)}60%{transform:translateX(calc(-50% + 10px)) rotate(2deg) scale(1.1)}75%{transform:translateX(calc(-50% - 5px)) scale(1.1)}}

    /* Calculate button pulse during anim */
    .labHero.animating ~ .row .btn[data-action="calc"]{animation:calcPulse 1s ease-in-out infinite}
    @keyframes calcPulse{0%,100%{box-shadow:0 6px 16px rgba(0,0,0,.14)}50%{box-shadow:0 6px 24px rgba(232,184,74,.6)}}

    .scoreNum{font-family:var(--display);font-size:60px;line-height:1;text-align:center;font-weight:600;animation:scoreIn .6s cubic-bezier(.34,1.56,.64,1)}
    .scoreNum.bad{color:var(--danger)}
    .scoreNum.great{color:var(--good);text-shadow:0 0 24px rgba(47,124,84,.4)}
    @keyframes scoreIn{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.15) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0)}}
    .verdict{animation:verdictIn .5s cubic-bezier(.34,1.56,.64,1) .15s both}
    @keyframes verdictIn{0%{transform:translateX(20px) scale(.7);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}
    .rationale.show{animation:rationaleIn .5s ease .3s both;opacity:1}
    @keyframes rationaleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .tagRow .dnaChip{animation:chipIn .4s cubic-bezier(.34,1.56,.64,1) both}
    .tagRow .dnaChip:nth-child(1){animation-delay:.45s}
    .tagRow .dnaChip:nth-child(2){animation-delay:.5s}
    .tagRow .dnaChip:nth-child(3){animation-delay:.55s}
    .tagRow .dnaChip:nth-child(4){animation-delay:.6s}
    .tagRow .dnaChip:nth-child(5){animation-delay:.65s}
    .tagRow .dnaChip:nth-child(6){animation-delay:.7s}
    .tagRow .dnaChip:nth-child(7){animation-delay:.75s}
    .tagRow .dnaChip:nth-child(8){animation-delay:.8s}
    @keyframes chipIn{0%{transform:scale(0) rotate(-90deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

    /* === ISO E SUPER (scoped under .isoe-root) === */
    .isoe-root .between{align-items:center}
    .isoe-hero h2{font-family:var(--display);font-size:28px;font-weight:600}
    .isoe-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
    .isoe-stat{padding:10px;border:1px solid var(--line);border-radius:14px;background:var(--panel);text-align:center}
    .isoe-stat-v{font-family:var(--display);font-size:22px;font-weight:600;line-height:1;color:var(--accent)}
    .isoe-stat-l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:5px;font-weight:700}
    .isoe-weather{display:flex;align-items:flex-start;gap:14px}
    .isoe-wx-icon{font-size:28px;flex-shrink:0}
    .isoe-info-btn{background:transparent;border:0;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;padding:0 6px;min-height:0}
    .isoe-wx-info{border-left:3px solid var(--accent)}
    .isoe-info-list{margin:6px 0;padding-left:18px;font-size:13px;color:var(--text);line-height:1.7}
    .isoe-info-list li{margin:4px 0}
    .isoe-info-list b{color:var(--accent2);font-weight:700}
    .isoe-combos summary{font-size:14px;padding:6px 0}
    .isoe-combos summary b{font-size:14px}
    .isoe-combo-list{display:grid;gap:10px;margin-top:10px}
    .isoe-combo{padding:12px;background:var(--panel2);border-radius:14px;border:1px solid var(--line)}
    .isoe-frag-pill{display:inline-block;padding:3px 8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:11.5px;font-weight:600;color:var(--accent2);margin:2px}
    .isoe-house{margin-bottom:14px}
    .isoe-house-h{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;color:var(--text);font-size:14px;cursor:pointer;text-align:left}
    .isoe-house-h:hover{background:var(--chip)}
    .isoe-collapse-tri{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;background:var(--panel);border-radius:6px;font-weight:800;font-size:14px;color:var(--accent)}
    .isoe-house-h .small{color:var(--muted);font-size:11px;font-weight:600}
    .isoe-house-avg{margin-left:auto;font-size:10px;font-weight:800;background:var(--panel);border:1px solid var(--line);padding:3px 8px;border-radius:6px;color:var(--accent2);letter-spacing:.04em}
    .isoe-house-avg.high{color:var(--good);border-color:rgba(47,124,84,.4);background:rgba(47,124,84,.08)}
    .isoe-house-avg.low{color:var(--danger);border-color:rgba(181,59,59,.4);background:rgba(181,59,59,.08)}
    .isoe-cards{display:grid;gap:10px;margin-top:10px}
    .isoe-card{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:12px}
    .isoe-card.inferred{border-style:dashed;opacity:.94}
    .isoe-card-head{display:flex;gap:12px;align-items:flex-start}
    .isoe-card h4{font-family:var(--display);letter-spacing:.005em;font-weight:600}
    .isoe-flag{display:inline-block;font-size:9px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:.06em;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
    .isoe-flag.distinct{color:var(--good);border-color:rgba(47,124,84,.4);background:rgba(47,124,84,.08)}
    .isoe-flag.anchor{color:var(--accent2);border-color:var(--accent);background:rgba(232,184,74,.12)}
    .isoe-flag.caution,.isoe-flag.muted,.isoe-flag.overlap,.isoe-flag.neardup,.isoe-flag.exactdup{color:var(--warn);border-color:rgba(201,138,43,.4);background:rgba(201,138,43,.1)}
    .isoe-flag.inferred{color:var(--muted);font-style:italic}
    .isoe-score-pill{flex-shrink:0;background:var(--accent);color:#0c0c14;padding:6px 12px;border-radius:12px;display:flex;flex-direction:column;align-items:center;font-weight:800;min-width:54px;border:0;cursor:pointer;transition:transform .12s,box-shadow .15s}
    .isoe-score-pill:active{transform:scale(.94)}
    .isoe-score-pill:hover{box-shadow:0 4px 12px rgba(0,0,0,.18)}
    .isoe-score-pill.high{background:var(--good);color:#fff}
    .isoe-score-pill.low{background:var(--danger);color:#fff}

    /* Legend banner */
    .isoe-legend{border:1px solid var(--accent);background:linear-gradient(160deg,rgba(232,184,74,.08),var(--panel))}
    .isoe-legend .isoe-info-btn{font-size:18px;width:28px;height:28px;border-radius:8px;background:rgba(0,0,0,.05);color:var(--muted)}
    .isoe-legend-grid{display:grid;gap:6px}
    .isoe-legend-row{display:flex;align-items:center;gap:10px;font-size:12px;line-height:1.4}
    .isoe-legend-pill{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:3px 8px;border-radius:8px;font-weight:800;font-size:11px;color:#0c0c14}
    .isoe-legend-pill.high{background:var(--good);color:#fff}
    .isoe-legend-pill.mid{background:var(--accent);color:#0c0c14}
    .isoe-legend-pill.mid2{background:var(--accent);color:#0c0c14;opacity:.7}
    .isoe-legend-pill.low{background:var(--danger);color:#fff}

    /* Benefit pills inside procedure — refined monochrome variants */
    .isoe-benefits-block{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
    .isoe-benefit{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;line-height:1.5}
    .isoe-benefit-pill{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:6px;background:transparent;border:1px solid var(--accent);color:var(--accent);min-width:118px;text-align:center;white-space:nowrap;text-transform:uppercase}
    .isoe-benefit-pill.amp{border-color:var(--accent);color:var(--accent);background:rgba(232,184,74,.08)}
    .isoe-benefit-pill.long{border-color:var(--good);color:var(--good);background:rgba(114,212,157,.08)}
    .isoe-benefit-pill.proj{border-color:var(--warn);color:var(--warn);background:rgba(255,200,117,.08)}
    .isoe-benefit-pill.depth{border-color:var(--accent2);color:var(--accent2);background:rgba(255,214,111,.06)}
    .isoe-benefit-pill.bind{border-color:var(--accent);color:var(--accent2);background:rgba(232,184,74,.12)}
    .isoe-benefit-pill.lift{border-color:var(--accent2);color:var(--accent2);background:rgba(255,214,111,.06)}
    .isoe-benefit-desc{font-size:12px;color:var(--text);opacity:.78;line-height:1.55}
    .isoe-score-num{font-family:var(--display);font-size:24px;line-height:1;font-weight:600}
    .isoe-score-delta{font-size:10px;opacity:.85;margin-top:2px;letter-spacing:.02em}
    .isoe-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
    .isoe-act-btn{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:7px 10px;border-radius:10px;font-size:11.5px;font-weight:700;cursor:pointer;min-height:34px;transition:background .15s}
    .isoe-act-btn:hover{background:var(--chip)}
    .isoe-act-btn.on{background:var(--accent);color:#0c0c14;border-color:transparent}
    .isoe-act-btn.danger:hover{background:rgba(181,59,59,.15);color:var(--danger);border-color:rgba(181,59,59,.4)}
    .isoe-details{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;border-radius:0;background:transparent;padding-left:0;padding-right:0}
    .isoe-details summary{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;min-height:28px}
    .isoe-procedure{padding:10px 0;font-size:13px;line-height:1.55}
    .isoe-procedure p{margin:4px 0}
    .isoe-breakdown{padding:10px;background:var(--panel2);border-radius:10px;margin-top:6px}
    .isoe-bd-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
    .isoe-bd-row.total{border-top:1px solid var(--line);margin-top:4px;padding-top:6px;font-weight:700}
    .isoe-bd-row.total b{color:var(--accent);font-family:var(--display);font-size:18px;font-weight:600}
    .isoe-about h3{font-family:var(--display);font-size:18px;font-weight:600;margin:0 0 6px}

    /* Problem list — surfaces failure reasons for low scores */
    .problemList{margin-top:14px;border-radius:14px;overflow:hidden;border:1px solid rgba(220,60,60,.25);background:linear-gradient(180deg,rgba(220,60,60,.06),rgba(220,60,60,.02));animation:problemIn .5s ease .35s both}
    .problemHeader{padding:10px 14px;background:rgba(220,60,60,.12);font-size:11.5px;font-weight:800;color:var(--danger);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid rgba(220,60,60,.2)}
    .problemItem{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(220,60,60,.12)}
    .problemItem:last-child{border-bottom:0}
    .problemItem b{font-size:14px;font-weight:700}
    .problemIcon{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:rgba(220,60,60,.14);color:var(--danger);font-size:16px;font-weight:800;flex-shrink:0}
    @keyframes problemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* Spray control */
    .sprayControl{margin-bottom:14px;padding:14px;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px}
    .sprayHeader{font-size:11.5px;font-weight:800;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
    .sprayRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
    .sprayRow:last-of-type{border-bottom:0}
    .sprayLabel{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .sprayLabel b{font-size:13.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sprayStepper{display:flex;align-items:center;gap:0;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;flex-shrink:0}
    .stepBtn{background:transparent;border:0;color:var(--text);width:36px;height:36px;font-size:18px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;min-height:36px;transition:background .12s}
    .stepBtn:active{background:var(--btn);color:var(--btnText)}
    .stepBtn:hover{background:rgba(232,184,74,.1)}
    .sprayCount{font-family:var(--display);font-size:22px;font-weight:600;line-height:1;min-width:32px;text-align:center;padding:0 4px;color:var(--accent)}
    .sprayTotal{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:13px}
    .sprayTotal b{font-family:var(--display);font-size:18px;color:var(--accent);font-weight:600}

    /* Win list — shows when ratio adjustments are *helping* */
    .winList{margin-top:14px;border-radius:14px;overflow:hidden;border:1px solid rgba(47,124,84,.3);background:linear-gradient(180deg,rgba(47,124,84,.06),rgba(47,124,84,.02));animation:problemIn .4s ease both}
    .winHeader{padding:9px 14px;background:rgba(47,124,84,.12);font-size:11.5px;font-weight:800;color:var(--good);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid rgba(47,124,84,.2)}
    .winItem{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(47,124,84,.12)}
    .winItem:last-child{border-bottom:0}
    .winItem b{font-size:13.5px;font-weight:700}
    .winIcon{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;background:rgba(47,124,84,.16);color:var(--good);font-size:16px;font-weight:800;flex-shrink:0}
    .winDelta{display:inline-block;font-size:10.5px;font-weight:800;color:var(--good);background:rgba(47,124,84,.18);padding:1px 6px;border-radius:5px;margin-left:4px;letter-spacing:.02em}

    /* Score pulse on stepper change */
    .scorePulse{animation:scorePulse .4s ease}
    @keyframes scorePulse{0%{transform:scale(1)}50%{transform:scale(1.15);text-shadow:0 0 24px rgba(232,184,74,.6)}100%{transform:scale(1)}}
    .verdict{display:inline-flex;align-items:center;min-height:36px;border-radius:999px;padding:6px 14px;font-weight:800;background:var(--good);color:#fff;font-size:13px;letter-spacing:.01em}
    .verdict.bad{background:var(--danger)}
    .verdict.mid{background:var(--warn);color:#1c1208}
    .rationale{opacity:0;transition:opacity .35s ease;line-height:1.55}
    .rationale.show{opacity:1}
    .tagRow{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:12px}
    .tagRow .shared{font-size:13px;transform:scale(1.06);box-shadow:0 0 16px rgba(232,184,74,.5)}
    details{border:1px solid var(--line);border-radius:14px;padding:10px 14px;background:var(--panel)}
    summary{min-height:34px;display:flex;align-items:center;font-weight:700;cursor:pointer;font-size:14px}
    summary::marker{color:var(--accent)}

    .comboSaved{display:grid;gap:10px}
    .weatherBox{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
    .weatherStat{font-family:var(--display);font-size:46px;font-weight:600;line-height:1}
    .pickReason{font-size:11.5px;color:var(--accent2);font-weight:600;letter-spacing:.02em;margin-top:6px}

    /* DNA Wheel */
    .wheelWrap{display:grid;gap:14px;place-items:center}
    .wheel{width:min(92vw,420px);height:min(92vw,420px)}
    .wedge{cursor:pointer;transition:opacity .2s,transform .25s;transform-origin:center}
    .wedge:hover{opacity:.82}
    .wedge.selected{filter:drop-shadow(0 0 8px rgba(232,184,74,.6))}
    .legendGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;width:100%}
    .gap{border-color:rgba(181,59,59,.5);background:rgba(181,59,59,.08);position:relative}
    .gap::after{content:"GAP";position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:800;color:var(--danger);letter-spacing:.05em}

    /* Bottom nav */
    .bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(20,20,32,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid rgba(232,184,74,.18)}
    .navInner{max-width:980px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
    .navBtn{min-height:54px;border:0;border-radius:14px;background:transparent;color:#e9e0ce;font-size:9.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;letter-spacing:.02em;transition:background .15s;padding:0 2px}
    .navBtn .ic{font-size:17px;line-height:1}
    .navBtn.active{background:rgba(232,184,74,.18);color:#fff}
    /* Iso E nav button gets a cool molecular tint when active (distinct from gold) */
    .navBtn.navIsoE.active{background:linear-gradient(180deg,rgba(110,180,220,.22),rgba(80,140,180,.10));color:#dceaf2;box-shadow:inset 0 0 0 1px rgba(110,180,220,.28)}
    .navBtn.navIsoE .ic{color:#9ed4ee}
    .navBtn.navIsoE.active .ic{color:#cfe9f5}
    /* Iso E identity tokens — used inside .isoe-scope.
       Critically, we ALSO override --accent and --accent2 here so the existing
       gold-themed Iso E sub-components (weather card, list, controls, score pills)
       automatically pick up the cool blue identity. */
    .isoe-scope{--isoeAccent:#7fc4e8;--isoeAccentDeep:#3d8eb9;--isoeSilver:#b8c8d2;--isoeBg:#0d1620;--isoePanel:#15212d;--isoePanel2:#1c2a37;--isoeLine:rgba(127,196,232,.18);--isoeText:#e2edf5;--isoeMuted:#8da4b6;--accent:#7fc4e8;--accent2:#9ed4ee;--btn:linear-gradient(180deg,#7fc4e8,#3d8eb9);--btnText:#0d1620}
    [data-theme="light"] .isoe-scope{--isoeAccent:#3d8eb9;--isoeAccentDeep:#1f5a82;--isoeSilver:#5e7280;--isoeBg:#f0f5f9;--isoePanel:#ffffff;--isoePanel2:#e9eff5;--isoeLine:rgba(61,142,185,.22);--isoeText:#13202c;--isoeMuted:#5e7280;--accent:#3d8eb9;--accent2:#1f5a82;--btn:linear-gradient(180deg,#3d8eb9,#1f5a82);--btnText:#ffffff}
    /* Cards inside iso-e get a faint blue tint border */
    .isoe-scope .card{border-color:rgba(127,196,232,.16)}
    [data-theme="light"] .isoe-scope .card{border-color:rgba(61,142,185,.18)}
    /* Iso E hero card — molecular hex backdrop */
    .isoe-hero{background:linear-gradient(160deg,var(--isoePanel),var(--isoePanel2));border:1px solid var(--isoeLine);border-radius:26px;padding:18px;position:relative;overflow:hidden;color:var(--isoeText)}
    .isoe-hero::before{content:'';position:absolute;inset:0;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 52"><polygon points="30,2 56,17 56,37 30,52 4,37 4,17" fill="none" stroke="%237fc4e8" stroke-width="0.6" opacity="0.12"/></svg>');background-size:60px 52px;opacity:.5;pointer-events:none}
    .isoe-hero h2{color:var(--isoeText)}
    .isoe-hero .eyebrow{color:var(--isoeAccent)}
    .isoe-hero .sub{color:var(--isoeMuted)}
    .isoe-mol{position:absolute;top:14px;right:18px;font-family:var(--display);font-size:11px;letter-spacing:.18em;color:var(--isoeAccent);opacity:.55;font-weight:600;text-transform:uppercase}
    .isoe-mol b{display:block;font-size:18px;font-weight:700;letter-spacing:.04em;line-height:1;margin-top:2px;color:var(--isoeAccent)}
    /* Iso E score bar — looks like a lab meter */
    .isoe-meter{display:flex;gap:2px;align-items:flex-end;height:18px}
    .isoe-meter .bar{flex:1;background:rgba(127,196,232,.14);border-radius:2px;transition:background .2s}
    .isoe-meter .bar.on{background:linear-gradient(180deg,var(--isoeAccent),var(--isoeAccentDeep));box-shadow:0 0 6px rgba(127,196,232,.4)}
    /* Bottle-card Iso E sigil — positioned top-LEFT so it doesn't fight with the flag pill (top-right) or anchor star prefix */
    .isoe-sigil{position:absolute;top:10px;left:10px;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#a8d8ee,#3d8eb9);box-shadow:0 0 10px rgba(127,196,232,.5),inset 0 0 0 1px rgba(255,255,255,.25);display:grid;place-items:center;font-size:9px;font-weight:800;color:#0d1620;font-family:var(--display);letter-spacing:.04em;z-index:2}
    .isoe-sigil.high{box-shadow:0 0 14px rgba(127,196,232,.7),inset 0 0 0 1px rgba(255,255,255,.4)}
    /* Hide the sigil when bottle cards render inside the Iso E view itself — score is already explicit there */
    .isoe-scope .isoe-sigil{display:none}
    /* Anchor cards already have a 4px gold left bar — push the sigil rightward so it doesn't sit on top of the bar */
    .bottleCard.flag-anchor .isoe-sigil{left:14px}
    .bottleCard.unavailable{opacity:.55;filter:grayscale(.4)}
    .bottleCard.unavailable::after{content:'Unavailable';position:absolute;bottom:8px;right:10px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 6px;z-index:1}
    /* Bottles with the Iso E sigil need a bit of left padding so the sigil doesn't sit on top of the house name */
    .bottleCard.has-sigil .eyebrow.mini,.bottleCard.has-sigil h3{padding-left:24px}
    .bottleCard.has-sigil.flag-anchor .eyebrow.mini,.bottleCard.has-sigil.flag-anchor h3{padding-left:28px}
    /* Today hero Iso E banner */
    .isoe-todayBanner{background:linear-gradient(135deg,rgba(127,196,232,.16),rgba(61,142,185,.08));border:1px solid rgba(127,196,232,.32);border-radius:20px;padding:14px;margin-top:12px;color:var(--isoeText);position:relative;overflow:hidden}
    .isoe-todayBanner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#7fc4e8,#3d8eb9);box-shadow:0 0 14px rgba(127,196,232,.6)}
    .isoe-todayBanner h4{font-family:var(--display);margin:0 0 4px;color:#dceaf2;font-size:18px}
    .isoe-todayBanner p{margin:0;font-size:13px;color:#a8c0d0;line-height:1.5}
    .isoe-todayBanner .row{margin-top:10px}
    [data-theme="light"] .isoe-todayBanner h4{color:#13202c}
    [data-theme="light"] .isoe-todayBanner p{color:#5e7280}
    /* Bottle detail Iso E card */
    .isoe-detailCard{background:linear-gradient(160deg,rgba(21,33,45,.7),rgba(28,42,55,.5));border:1px solid rgba(127,196,232,.28);border-radius:24px;padding:16px;margin:10px 0;color:#e2edf5;position:relative}
    .isoe-detailCard::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;background:linear-gradient(180deg,#7fc4e8,#3d8eb9);border-radius:2px}
    .isoe-detailCard h3{color:#cfe9f5;padding-left:8px}
    .isoe-detailCard .label{color:#7fc4e8;text-transform:uppercase;letter-spacing:.1em;font-size:10.5px;font-weight:700}
    [data-theme="light"] .isoe-detailCard{background:linear-gradient(160deg,#f4f9fc,#e9eff5);border-color:rgba(61,142,185,.32);color:#13202c}
    [data-theme="light"] .isoe-detailCard h3{color:#1f5a82}
    [data-theme="light"] .isoe-detailCard .label{color:#3d8eb9}
    /* Lab integration card */
    .isoe-labStack{background:linear-gradient(160deg,rgba(127,196,232,.10),rgba(61,142,185,.04));border:1px dashed rgba(127,196,232,.4);border-radius:18px;padding:14px;margin-top:14px;color:var(--text)}
    .isoe-labStack h4{font-family:var(--display);color:#7fc4e8;margin:0 0 6px;font-size:15px;letter-spacing:.02em}
    [data-theme="light"] .isoe-labStack h4{color:#3d8eb9}

    .empty{padding:22px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);text-align:center;font-size:14px;line-height:1.55}
    .small{font-size:11.5px;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--btn);color:var(--btnText);border-radius:999px;padding:11px 18px;z-index:60;transition:.25s;box-shadow:var(--shadow);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;max-width:90vw}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast button{background:transparent;color:inherit;border:1px solid currentColor;border-radius:999px;padding:3px 10px;min-height:0;font-size:11px;font-weight:700;opacity:.9}

    select option{background:var(--panel);color:var(--text)}
    select optgroup{background:var(--panel2);color:var(--accent2);font-weight:700;font-style:normal;letter-spacing:.04em}
    .row select{flex:1 1 240px;min-width:0}

/* === v5.8.4 ELITE LUXURY RESTRAINT PASS ===
   Goal: unify the product, keep AJ's colored pills, reduce visual noise,
   improve hierarchy, and make each screen feel calmer and more expensive.
*/
:root{
  --eliteRadius:28px;
  --eliteRadiusSm:18px;
  --eliteHairline:rgba(183,137,52,.16);
  --eliteSurface:rgba(255,250,240,.78);
  --eliteSurface2:rgba(245,234,215,.58);
  --eliteInk:#15120d;
  --eliteGold:#c99d45;
}
[data-theme="dark"]{
  --eliteHairline:rgba(232,184,74,.18);
  --eliteSurface:rgba(18,18,31,.72);
  --eliteSurface2:rgba(27,27,48,.58);
  --eliteInk:#f7f0df;
  --eliteGold:#e2b957;
}

/* calmer global rhythm */
.app{max-width:960px}
.card{
  border-radius:var(--eliteRadius);
  border-color:var(--eliteHairline);
  background:
    linear-gradient(180deg,var(--eliteSurface),rgba(255,255,255,0) 120%),
    radial-gradient(circle at 0 0,rgba(232,184,74,.075),transparent 36%);
  box-shadow:0 18px 48px rgba(48,34,12,.10);
}
[data-theme="dark"] .card{box-shadow:0 22px 56px rgba(0,0,0,.36)}
.card h2{font-size:32px;letter-spacing:-.015em}
.card h3{letter-spacing:-.01em}
.sub{font-size:13px;line-height:1.55}
.eyebrow{letter-spacing:.18em}

/* luxury means less shouting */
.luxHero:before{animation:none;opacity:.38}
.luxHero{
  border-radius:32px;
  box-shadow:0 26px 64px rgba(48,34,12,.13);
  background:
    radial-gradient(circle at 14% 0%,rgba(232,184,74,.22),transparent 30%),
    radial-gradient(circle at 105% 8%,rgba(52,199,223,.08),transparent 28%),
    linear-gradient(160deg,var(--panel),var(--panel2));
}
[data-theme="dark"] .luxHero{box-shadow:0 28px 72px rgba(0,0,0,.50)}
.heroTitle{font-size:36px;line-height:.96;letter-spacing:-.035em}
.heroSub{font-size:13.5px;max-width:620px}
.brand h1{letter-spacing:-.035em}
.brand p{opacity:.82}

/* keep pills, make them expensive */
.dnaChip,
.seasonPill,
.flag,
.clusterTag,
.offlinePill{
  box-shadow:none!important;
}
.dnaChip{
  border:1px solid rgba(255,255,255,.24);
  font-size:11px;
  line-height:1;
  padding:6px 9px;
  letter-spacing:.015em;
}
.luxeDNA{
  background:linear-gradient(180deg,color-mix(in srgb,var(--dna,#a08254) 82%,#fff 18%),color-mix(in srgb,var(--dna,#a08254) 72%,#000 28%))!important;
  color:#0b0b12!important;
  border:1px solid rgba(255,255,255,.30)!important;
}
[data-theme="dark"] .luxeDNA{
  background:linear-gradient(180deg,color-mix(in srgb,var(--dna,#a08254) 88%,#fff 12%),color-mix(in srgb,var(--dna,#a08254) 65%,#fff 35%))!important;
  color:#0b0b12!important;
  border-color:rgba(255,255,255,.35)!important;
  text-shadow:0 1px 1px rgba(255,255,255,.2);
}
/* Bare dnaChip (no luxeDNA wrapper) — used in detail view, lab tag row, plane picks.
   In dark mode the inline background:#xxxxxx can be too dark for the dark text.
   This rule ensures the pill has a light overlay in dark mode regardless. */
[data-theme="dark"] .dnaChip:not(.luxeDNA){
  background:linear-gradient(180deg,
    color-mix(in srgb,var(--dna,#a08254) 88%,#fff 12%),
    color-mix(in srgb,var(--dna,#a08254) 60%,#fff 40%))!important;
  color:#0b0b12!important;
  border:1px solid rgba(255,255,255,.30)!important;
  text-shadow:0 1px 1px rgba(255,255,255,.18);
}
.todayDnaPills,.wearDnaRow,.wearAltDna,.tagRow,.row{gap:7px}

/* bottle cards: name first, metadata quieter */
.bottleCard{
  border-radius:26px;
  min-height:174px;
  background:
    linear-gradient(160deg,var(--eliteSurface),var(--eliteSurface2)),
    radial-gradient(circle at 100% 0,rgba(232,184,74,.08),transparent 35%);
  box-shadow:0 10px 28px rgba(48,34,12,.075);
  transition:transform .16s ease,box-shadow .18s ease,border-color .18s ease;
}
.bottleCard:hover{
  transform:translateY(-1px);
  box-shadow:0 18px 46px rgba(48,34,12,.13);
  border-color:rgba(183,137,52,.28);
}
[data-theme="dark"] .bottleCard:hover{box-shadow:0 20px 48px rgba(0,0,0,.42)}
.bottleCard h3{
  font-size:20px;
  line-height:1.08;
  letter-spacing:-.02em;
  margin-top:2px;
}
.bottleCard .meta{
  opacity:.82;
  font-size:11px;
}
.quickLog{
  opacity:.48;
  width:30px;
  height:30px;
}

/* Vault: filters should feel curated, not heavy */
.vaultHero.card{
  padding:18px;
  background:
    radial-gradient(circle at 100% 0,rgba(232,184,74,.16),transparent 32%),
    linear-gradient(160deg,var(--eliteSurface),var(--eliteSurface2));
}
.premiumSearch{margin-top:14px}
.filterSheet{
  background:rgba(255,255,255,.04);
  border-color:var(--eliteHairline);
}
.filterSheet summary{font-size:13px}

/* Scent climate: flagship weather surface */
.scentClimate{
  border:1px solid rgba(214,173,92,.26);
  background:
    radial-gradient(circle at 100% 0%,rgba(214,173,92,.18),transparent 32%),
    radial-gradient(circle at 0% 0%,rgba(52,199,223,.10),transparent 28%),
    linear-gradient(160deg,var(--eliteSurface),var(--eliteSurface2));
}
.scentClimate h3{
  font-size:27px;
  line-height:1.02;
}
.miniWx{
  min-width:104px;
  border-radius:20px;
  background:rgba(255,255,255,.07);
}

/* Weather/Today recommendation cards: one hero, then quiet support */
.pickCard,.premiumPick{
  border-radius:26px!important;
}
.premiumPick{
  box-shadow:0 22px 58px rgba(48,34,12,.16)!important;
}
[data-theme="dark"] .premiumPick{box-shadow:0 24px 64px rgba(0,0,0,.48)!important}

/* Layering Lab: make the flagship calmer */
.labHero{
  min-height:300px;
  border-radius:30px;
  background:
    radial-gradient(circle at 50% 18%,rgba(232,184,74,.16),transparent 34%),
    radial-gradient(ellipse at bottom,rgba(52,199,223,.055),transparent 45%),
    linear-gradient(180deg,var(--panel2),var(--panel));
  border-color:var(--eliteHairline);
}
.bottleStage{height:256px}
.svgBottle{filter:drop-shadow(0 14px 22px rgba(0,0,0,.24))}
.sprayControl{
  border-radius:22px;
  background:linear-gradient(160deg,var(--eliteSurface2),var(--eliteSurface));
}
.scoreNum{
  font-size:66px;
  letter-spacing:-.04em;
}
.resultCard{
  border-color:rgba(214,173,92,.24);
}

/* Iso E: integrate the science identity without making it feel like a different app */
.isoe-scope{
  --isoeAccent:#82c8e9;
  --isoeAccentDeep:#3b8bb4;
}
.isoe-hero{
  border-radius:30px;
  background:
    radial-gradient(circle at 0 0,rgba(127,196,232,.16),transparent 35%),
    linear-gradient(160deg,var(--isoePanel),var(--isoePanel2));
}
.isoe-hero::before{opacity:.28}
.isoe-card{
  border-radius:22px;
  box-shadow:0 12px 34px rgba(0,0,0,.10);
}
.isoe-score-pill{
  border-radius:14px;
}

/* Tools: make it curated, not a junk drawer */
.toolGrid{gap:14px}
.toolCard{
  border-radius:28px;
  background:
    radial-gradient(circle at 100% 0,rgba(232,184,74,.10),transparent 32%),
    linear-gradient(160deg,var(--eliteSurface),var(--eliteSurface2));
  transition:transform .16s ease,box-shadow .18s ease,border-color .18s ease;
}
.toolCard:hover{
  transform:translateY(-1px);
  box-shadow:0 16px 42px rgba(48,34,12,.12);
  border-color:rgba(183,137,52,.28);
}
.toolIcon{
  border-radius:17px;
  background:linear-gradient(145deg,rgba(232,184,74,.18),rgba(232,184,74,.06));
}

/* Navigation: calmer, more Apple-like */
.bottomNav{
  background:rgba(8,8,13,.88);
  border-top:1px solid rgba(214,173,92,.14);
}
.navBtn{
  border-radius:20px;
  min-height:58px;
}
.navBtn.active{
  background:linear-gradient(180deg,rgba(214,173,92,.22),rgba(214,173,92,.07));
}
.navBtn.active:after{opacity:.75}

/* Forms and utility elements */
.input,select,textarea,.houseSelect{
  border-radius:17px;
  border-color:var(--eliteHairline);
}
.btn{
  border-radius:16px;
  letter-spacing:-.005em;
}
.btn.sm{border-radius:13px}
.lineItem{
  border-radius:19px;
  border-color:var(--eliteHairline);
  background:linear-gradient(160deg,var(--eliteSurface),rgba(255,255,255,0));
}
.stat,.anchorBar{
  border-radius:22px;
  border-color:var(--eliteHairline);
}

/* Improve readable density on mobile without killing content */
@media(max-width:430px){
  .card{padding:16px;border-radius:24px}
  .heroTitle{font-size:32px}
  .signalGrid{gap:8px}
  .signal{padding:10px;border-radius:16px}
  .bottleCard{min-height:168px}
  .scoreNum{font-size:60px}
}

/* Accessibility: if motion is reduced, cut subtle animation too */
@media(prefers-reduced-motion:reduce){
  .luxHero:before,.labHero.merge .particle,.labHero.merge .orb circle{animation:none!important}
  .bottleCard,.toolCard,.navBtn,.btn{transition:none!important}
}


/* === v5.8.5 ATELIER / IOS PRODUCT PASS ===
   Decision first, complexity hidden until needed, pills preserved but disciplined.
*/
.statusPill{display:inline-flex;align-items:center;gap:6px;min-height:28px;padding:6px 10px;border-radius:999px;border:1px solid var(--eliteHairline);background:rgba(255,255,255,.055);color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.045em;text-transform:uppercase;white-space:nowrap}
.statusPill.quiet{font-size:10.5px;letter-spacing:.035em;text-transform:none;font-weight:700;border-radius:11px}
.statusPill.action{background:rgba(214,173,92,.11);color:var(--accent2);border-color:rgba(214,173,92,.24);text-transform:none;letter-spacing:0;font-size:12px}
.microLabel{margin:0 0 6px;color:var(--muted);font-size:9.5px;font-weight:900;letter-spacing:.13em;text-transform:uppercase}

/* Home as decision surface */
.wearDecisionHero,.todayHero,.pickCard.premiumPick{position:relative;overflow:hidden;border-radius:34px!important;padding:20px!important;background:radial-gradient(circle at 12% 0%,rgba(214,173,92,.24),transparent 34%),radial-gradient(circle at 100% 0%,rgba(52,199,223,.09),transparent 30%),linear-gradient(160deg,var(--eliteSurface),var(--eliteSurface2))!important;border:1px solid rgba(214,173,92,.26)!important}
.pickCard.premiumPick h2,.wearDecisionHero h2{font-size:38px!important;line-height:.96!important;letter-spacing:-.04em!important;margin-bottom:8px!important}
.pickReason,.sprayAdvice{font-size:12.5px;line-height:1.5}

/* Scent Climate: concise first, expanded only when needed */
.flagshipClimate{margin-top:14px;padding:18px}
.flagshipClimate h3{font-size:29px!important;letter-spacing:-.025em}
.climateLine{margin:8px 0 0;color:var(--muted);font-size:13.5px;line-height:1.5;max-width:610px}
.climateScore{min-width:74px;height:74px;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(214,173,92,.28);background:rgba(214,173,92,.10);color:var(--accent2)}
.climateScore b{font-family:var(--display);font-size:34px;line-height:.9;font-weight:700}
.climateScore span{font-size:10px;font-weight:800;color:var(--muted)}
.luxPillBlock{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}
@media(min-width:680px){.luxPillBlock{grid-template-columns:1.1fr 1fr 1.1fr}}
.luxDetails{margin-top:14px;background:rgba(255,255,255,.035);border-color:var(--eliteHairline)}
.climateSignals{margin-top:8px}

/* Vault: gallery first, inventory on demand */
.modeSwitch{display:inline-flex;gap:4px;margin-top:12px;padding:4px;border:1px solid var(--eliteHairline);background:var(--glass);border-radius:999px}
.modeSwitch button{border:0;background:transparent;color:var(--muted);font-weight:800;font-size:12px;min-height:34px;padding:0 14px;border-radius:999px}
.modeSwitch button.on{background:var(--btn);color:var(--btnText)}
.vaultMode-gallery .bottleCard{min-height:188px}
.vaultMode-gallery .bottleCard h3{font-size:21px}
.vaultMode-gallery .bottleCard .meta:nth-of-type(n+2),.vaultMode-gallery .bottleCard .wearAltDna + .meta{display:none!important}
.vaultMode-gallery .bottleCard .flag{opacity:.82}
.vaultMode-inventory .bottleCard{min-height:154px;border-radius:20px}

/* Layering Lab: base / accent / result */
.pickerWrap{border-radius:24px;background:linear-gradient(160deg,var(--eliteSurface),rgba(255,255,255,.02))}
.pickerSide{border-radius:999px;width:30px;height:30px}
.layerVerdictHero{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;margin-top:14px;padding:16px;border-radius:24px;border:1px solid rgba(214,173,92,.22);background:linear-gradient(160deg,rgba(214,173,92,.10),rgba(255,255,255,.025))}
.layerVerdictHero h3{margin:0;font-size:31px;line-height:1;letter-spacing:-.03em}
.scoreMedallion{width:86px;height:86px;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--display);font-size:39px;font-weight:700;background:rgba(214,173,92,.12);border:1px solid rgba(214,173,92,.30);color:var(--accent2)}
.scoreMedallion span{font-family:var(--body);font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.05em}
.scoreMedallion.bad{color:var(--danger);border-color:rgba(181,59,59,.35);background:rgba(181,59,59,.10)}
.scoreMedallion.great{color:var(--good);border-color:rgba(47,124,84,.35);background:rgba(47,124,84,.10)}
.baseAccentStrip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.baseAccentStrip span{display:inline-flex;gap:6px;align-items:center;padding:7px 10px;border-radius:999px;border:1px solid var(--eliteHairline);background:rgba(255,255,255,.045);font-size:12px;color:var(--muted)}
.baseAccentStrip b{color:var(--accent2);text-transform:uppercase;font-size:10px;letter-spacing:.10em}

/* Verdict-first UI and curated Atelier */
.verdict{box-shadow:none!important}
.toolCard h3{letter-spacing:-.025em}
.toolCard .sub,.toolCard p{line-height:1.5}

const ISO_E_DATA=[{"n":"1 & Only Jazz Club","h":"Dua Brand","ib":"D&G The One x MMM Jazz Club","fl":"DISTINCT","v":"YES","b":"DEPTH, LONG","sp":2,"w":"Chest","dna":"spicy amber, tobacco, vanilla, aromatic sage","fam":["spicy","amber","tobacco","vanilla","aromatic"],"imp":"The tobacco-vanilla-sage DNA already occupies warm amber territory. Iso E introduces a transparent cedarwood scaffold beneath these notes — invisible but structurally important. The aromatic sage note benefits most, gaining sharper definition against the woody base. The spicy amber accord extends its drydown because Iso E's fixative properties slow the evaporation of the lighter aromatic molecules while the tobacco-vanilla richness remains untouched on top.","sc":6,"se":"Fall/Winter","oc":"Evening / lounge / date","ti":"night"},{"n":"Acqua Di DUA","h":"Dua Brand","ib":"Acqua di Gio OG","fl":"DISTINCT","v":"YES","b":"AMP, LONG, PROJ","sp":2,"w":"Full coverage","dna":"marine citrus aromatic, watery woods, fresh masculine","fam":["marine","citrus","aquatic","woody"],"imp":"Major improvement target. Marine-aquatic fragrances are built from small volatile molecules that flash bright then vanish. Iso E Super's molecular weight (234 g/mol) is significantly heavier than typical aquatic compounds, acting as an anchor that bonds to skin lipids and slowly releases the watery-wood accord. Transforms this from a 3-hour skin scent to a 6-hour noticeable presence. The woody facet in the DNA directly harmonizes with cedarwood.","sc":6,"se":"Spring/Summer","oc":"Casual / beach / gym","ti":"day"},{"n":"Aphrodisiac","h":"Dua Brand","ib":"Initio Psychedelic Love","fl":"DISTINCT","v":"CAUTION","b":"—","sp":0,"w":"Sleeve test","dna":"hedione floral-resinous, sandalwood, patchouli","fam":["floral","woody"],"imp":"RISK: Psychedelic Love's DNA relies on hedione — a jasmine-like molecule prized for its airy, floating quality. Hedione is designed to hover above skin creating an ethereal aura. Iso E Super's cedarwood character is heavier and earthier, pulling the composition downward. The sandalwood and patchouli base may compete with rather than complement the cedarwood, creating a muddled woody-floral collision instead of the intended dreamy resinous float. Test on sleeve before committing.","sc":3,"se":"Fall/Winter","oc":"Date / intimate / evening","ti":"night"},{"n":"Aroma of Heaven","h":"Dua Brand","ib":"Hermes TdH vintage","fl":"DISTINCT","v":"YES","b":"AMP, DEPTH","sp":3,"w":"Pulse points","dna":"citrus vetiver, mineral woods, mature earthy masculine","fam":["citrus","vetiver","woody"],"imp":"One of the most natural pairings in the vault. Vetiver (the star of Terre d'Hermes DNA) is a woody-earthy molecule that shares structural similarities with Iso E Super — both are terpenoid-derived compounds with dry woody-mineral character. Applying Iso E beneath this scent is like adding more of what's already there. The citrus top notes get fixative support, and the mineral-earthy masculine quality is directly amplified without introducing any foreign character.","sc":9,"se":"Year-round","oc":"Office / outdoors","ti":"day"},{"n":"Bet On 67","h":"Dua Brand","ib":"Ralph Lauren Polo 67","fl":"DISTINCT","v":"YES","b":"AMP, LONG, BIND","sp":3,"w":"Full coverage","dna":"sporty citrus woods, clean aromatic, easy daytime fresh","fam":["citrus","woody","aromatic"],"imp":"Sporty citrus-aromatic DNA is composed of small, volatile terpene molecules (limonene, linalool) that evaporate rapidly from skin. Iso E Super's large lipophilic structure acts as a molecular net — it bonds to skin oils and creates a slow-release matrix for these smaller molecules. The clean aromatic facet gains cedarwood warmth, and overall wear time extends from approximately 4 hours to 6-7 hours. The woody base note in the DNA directly absorbs the Iso E.","sc":7,"se":"Spring/Summer","oc":"Casual / outdoors / sport","ti":"day"},{"n":"Black Widow","h":"Dua Brand","ib":"Kilian Black Phantom","fl":"DISTINCT","v":"YES","b":"DEPTH","sp":2,"w":"Chest only","dna":"rum, dark chocolate, coffee, almond, caramel, sandalwood-tonka","fam":["gourmand","vanilla","woody"],"imp":"Dense gourmand DNA — rum, chocolate, coffee, caramel — creates a thick aromatic wall. Iso E doesn't penetrate or alter these notes. Instead, it builds an invisible woody scaffold beneath the entire composition, like a polished hardwood floor under a heavy Persian rug. The sandalwood-tonka base absorbs the cedarwood naturally since they're from the same woody molecular family. Effect is subtle but adds architectural structure to what can otherwise be a shapeless sweet cloud.","sc":6,"se":"Fall/Winter","oc":"Evening / date / club","ti":"night"},{"n":"Bleu de Casino Elixir Extrait","h":"Dua Brand","ib":"BdC x Aventus x BR540 Extrait","fl":"DISTINCT","v":"YES","b":"AMP, LIFT","sp":2,"w":"Neck","dna":"blue incense woods, fruity smoky amber, sweet extrait richness","fam":["incense","woody","amber","fruity"],"imp":"The incense-wood backbone in this DNA contains compounds (olibanum, cedarwood derivatives) that naturally harmonize with Iso E Super. Adding Iso E amplifies the woody facet of the blue accord and lifts the sweet amber — the diffusive quality of cedarwood creates a radiant aura that carries the saffron-amber further from the body. The extrait concentration means less improvement than lighter concentrations, but the woody lift is still noticeable.","sc":7,"se":"Fall/Winter","oc":"Date / upscale casual","ti":"night"},{"n":"Bleu de Dua Attar","h":"Dua Brand","ib":"Bleu de Chanel Parfum","fl":"ANCHOR","v":"YES","b":"AMP, PROJ","sp":2,"w":"Pulse points","dna":"deep blue woods, incense, citrus, smooth ambered masculinity","fam":["woody","incense","citrus","amber"],"imp":"ANCHOR. The deep blue-woods accord in BdD Attar is built on molecules that occupy the same olfactory space as Iso E Super — woody, incense-like, subtly amber. Layering Iso E underneath is like turning the volume dial on the woody-incense channel from 7 to 9 without distortion. The citrus top notes get extended by the fixative base, and the smooth amber drydown gains a velvety cedarwood undertone. One of the cleanest amplifications possible.","sc":8,"se":"Year-round","oc":"Office / smart casual","ti":"both"},{"n":"Bleu de Dua Exclusive Extrait","h":"Dua Brand","ib":"Bleu de Chanel L'Exclusif","fl":"OVERLAP","v":"YES","b":"AMP","sp":2,"w":"Pulse points","dna":"elegant blue woods, refined incense, creamy polished depth","fam":["woody","incense"],"imp":"Shares the same blue-woods molecular family as BdD Attar but with more refinement and creaminess. The polished depth is delicate — Iso E adds warmth without disrupting the elegant equilibrium. Two sprays maximum; this is a case where restraint matters. The creamy polished quality merges with Iso E's velvety character, creating a richer but still sophisticated drydown. The incense note in the heart gains subtle reinforcement.","sc":7,"se":"Fall/Winter","oc":"Business formal / special","ti":"both"},{"n":"#Candy","h":"Dua Brand","ib":"Liz Claiborne Candies For Men (DDL)","fl":"DISTINCT","v":"YES","b":"AMP, LONG","sp":2,"w":"Neck/chest","dna":"watermelon, coriander, cardamom, green leaves, birch wood, cedar, sandalwood, oakmoss, musk","fam":["woody","chypre","spicy","green","musk"],"imp":"The woody-aromatic structure is a natural fit for Iso E Super — it sits in adjacent terpenoid territory and amplifies rather than obscures the existing character. Expect cleaner projection and a longer dry-down without losing definition.","sc":6,"se":"Spring/Summer","oc":"Casual / smart casual","ti":"both"},{"n":"Casino Royale Nights Extrait","h":"Dua Brand","ib":"Baccarat Rouge 540 Extrait","fl":"DISTINCT","v":"YES","b":"DEPTH, LONG, AMP","sp":2,"w":"Chest","dna":"saffron amberwood, airy sweetness, glowing woody sugar","fam":["amber","spicy","woody"],"imp":"The saffron-amberwood accord gains a velvety cedarwood anchor — Iso E sits beneath the glowing sweetness like a wooden picture frame around a gilded painting. The diffusive quality of cedarwood molecules creates a wider sillage trail, carrying the airy sweetness further from the body. The BR540 Extrait DNA is already powerful, so the improvement is more about adding woody dimension than volume. The amber facets in both scents merge naturally.","sc":7,"se":"Fall/Winter","oc":"Date / cocktail event","ti":"night"},{"n":"City of Dua","h":"Dua Brand","ib":"LV City of Stars","fl":"DISTINCT","v":"YES","b":"BIND, LONG, AMP","sp":2,"w":"Pulse points","dna":"blood orange, lemon, tiare, soft musk-sandalwood","fam":["citrus","floral","musk","woody"],"imp":"Blood orange (contains highly volatile limonene) and lemon (citral) are among the fastest-evaporating molecules in perfumery — they flash bright for 20 minutes then vanish. Iso E Super's fixative properties dramatically slow their evaporation rate by creating a lipophilic matrix on skin. The tiare flower note benefits from the woody base, and the soft musk-sandalwood drydown merges naturally with cedarwood since sandalwood and Iso E are molecular cousins.","sc":6,"se":"Fall/Winter","oc":"Smart casual / evening","ti":"night"},{"n":"Cola Fizz Of Tonka Beans","h":"Dua Brand","ib":"Mancera Tonka Cola","fl":"DISTINCT","v":"YES","b":"LONG, DEPTH","sp":2,"w":"Chest","dna":"cherry cola fizz, tonka warmth, fun sweet aromatic","fam":["gourmand","aromatic","vanilla"],"imp":"The fizzy effervescent quality — created by volatile aromatic esters — stays intact because Iso E sits underneath as a transparent woody platform rather than mixing into the composition. Tonka bean's coumarin molecule is a natural partner for cedarwood; both are warm, sweet-woody compounds that blend seamlessly. The cherry-cola sparkle on top rides the expanded sillage trail without losing its playful character. A subtle but architecturally sound improvement.","sc":6,"se":"Year-round","oc":"Casual / fun / social","ti":"both"},{"n":"Cotton Candy de Dua","h":"Dua Brand","ib":"Original / house style","fl":"DISTINCT","v":"CAUTION","b":"—","sp":0,"w":"Clothes test","dna":"spun sugar vanilla, white musk, airy cotton candy gourmand","fam":["gourmand","vanilla","musk"],"imp":"RISK: Pure sugar gourmand DNA has zero woody character in its molecular profile. Iso E Super's cedarwood identity introduces an entirely foreign note family into a composition designed to be 100% sweet and airy. The woody dryness can collapse the spun-sugar illusion — the cotton candy effect depends on lightness and transparency, which cedarwood's earthy weight may destroy. Some wearers find the contrast interesting; most find it muddy. Test on clothes before skin.","sc":4,"se":"Spring/Summer","oc":"Casual / fun / playful","ti":"day"},{"n":"Crater","h":"Dua Brand","ib":"MFK Grand Soir","fl":"DISTINCT","v":"YES","b":"DEPTH, LONG, AMP","sp":2,"w":"Pulse points","dna":"benzoin, labdanum, tonka bean, amber, vanilla, resinous sweet warmth","fam":["amber","vanilla","woody","spicy"],"imp":"The resinous amber-benzoin DNA is a natural Iso E Super partner. Benzoin and labdanum are both terpenoid-adjacent compounds that share warm balsamic character with cedarwood. Iso E adds a transparent woody scaffold beneath the thick amber-vanilla blanket, giving it architectural structure without altering the opulent warmth. The tonka bean coumarin harmonizes perfectly with cedarwood. The fixative properties extend the resinous drydown. A clean effective enhancement that adds invisible depth to an already luxurious composition.","sc":8,"se":"Fall/Winter","oc":"Date / evening / special","ti":"night"},{"n":"D Le Attar","h":"Dua Brand","ib":"YSL Y Le Parfum","fl":"DISTINCT","v":"YES","b":"AMP, PROJ","sp":2,"w":"Neck/chest","dna":"dark blue aromatic, apple ginger woods, smooth sweet masculine","fam":["aromatic","woody","fruity","spicy"],"imp":"The apple-ginger topnotes are volatile molecules that benefit significantly from Iso E's fixative action — expect an extra 2-3 hours of the bright opening. The dark blue aromatic heart shares molecular DNA with cedarwood, so the woody base is directly amplified. The smooth sweet masculine quality gains more projection because Iso E's diffusive nature creates a wider sillage cone. This is a case where the enhancer pushes a solid performer to impressive.","sc":6,"se":"Fall/Winter","oc":"Office / date night","ti":"night"},{"n":"D Le Parfum Intense","h":"Dua Brand","ib":"YSL Y EDP Intense","fl":"ANCHOR","v":"YES","b":"AMP, PROJ","sp":2,"w":"Neck/chest","dna":"vibrant blue aromatic, crisp woods, richer modern freshness","fam":["aromatic","woody"],"imp":"Same amplification mechanism as D Le Attar but on a richer canvas. The crisp woods gain cedarwood reinforcement — the molecular structures overlap, so the addition is invisible to the nose but audible to the projection radius. The modern freshness maintains clarity because Iso E Super is one of the most transparent molecules in perfumery — it adds presence without adding opacity. The richer concentration means slightly less dramatic improvement than the lighter version.","sc":6,"se":"Fall/Winter","oc":"Evening / formal","ti":"night"},{"n":"Desert Reflection Extrait","h":"Dua Brand","ib":"Amouage Reflection Man","fl":"DISTINCT","v":"CAUTION","b":"AMP","sp":2,"w":"Inner elbow test","dna":"creamy white florals, sandalwood, elegant soapy refinement","fam":["floral","woody","musk"],"imp":"RISK: Reflection Man's DNA is a masterclass in delicate balance — creamy white florals (neroli, jasmine) floating above sandalwood with soapy refinement. This elegance depends on sandalwood's softness being the dominant woody note. Iso E Super's cedarwood character is louder, drier, and more assertive than sandalwood — it can overpower the refined soapy quality and make the composition smell more generically woody than specifically clean-elegant. Test on inner elbow.","sc":6,"se":"Fall/Winter","oc":"Special occasion / formal","ti":"night"},{"n":"Dolce Poseidon","h":"Dua Brand","ib":"Creed Aventus x Profumum Roma Dulcis in Fundo","fl":"JUSTIFIED","v":"YES","b":"AMP, LONG, PROJ, BIND","sp":2,"w":"Pulse points","dna":"citrus-bergamot top, pineapple apple blackcurrant, jasmine rose birch, vanilla-musk-oakmoss, sweet creamsicle Aventus","fam":["citrus","woody","chypre","floral","vanilla"],"imp":"The woody-aromatic profile combined with the heavier base notes makes this a strong candidate for Iso E layering. The synthetic cedrene character of Iso E reinforces the woody backbone while extending the heavier elements into a longer, more rounded trail.","sc":7,"se":"Spring/Summer","oc":"Casual / daytime / warm-weather","ti":"day"},{"n":"Drowning in Bleu de Dua Attar","h":"Dua Brand","ib":"Nishane Ani x BdC Parfum","fl":"DISTINCT","v":"YES","b":"AMP, DEPTH","sp":2,"w":"Pulse points","dna":"vanillic spicy citrus, blue woods, creamy incense sweetness","fam":["vanilla","spicy","citrus","woody","incense"],"imp":"The blue woods and creamy incense in this DNA share molecular architecture with Iso E Super — both contain terpenoid compounds with woody-balsamic character. Adding cedarwood reinforces these existing notes while the vanillic spicy citrus rides on top untouched. The Ani DNA component brings a vanillic sweetness that contrasts beautifully against the woody base. Clean amplification of the woody backbone without disturbing the sweet-spicy upper register.","sc":7,"se":"Spring/Fall","oc":"Date / upscale","ti":"night"},{"n":"Drowning in Bleu de Savage Fierce","h":"Dua Brand","ib":"Ani x Sauvage EDT x Fierce x BdC","fl":"DISTINCT","v":"YES","b":"AMP, PROJ","sp":3,"w":"Neck/chest","dna":"sweet spicy blue fresh, musky woods, club-ready hybrid","fam":["spicy","musk","woody"],"imp":"Already a loud, projecting fragrance. Iso E pushes it into beast-mode territory. The musky woods backbone is directly reinforced with cedarwood, creating more throw distance. The sweet-spicy top notes ride the expanded woody sillage trail like a surfer on a bigger wave. The ambroxan component and Iso E Super are the two most commonly used molecular enhancers in modern perfumery — stacking them is industry-standard practice for maximum impact.","sc":7,"se":"Fall/Winter","oc":"Night out / clubbing","ti":"night"},{"n":"Drowning in Vanilla","h":"Dua Brand","ib":"Nishane Ani","fl":"DISTINCT","v":"YES","b":"LONG, BIND, DEPTH","sp":2,"w":"Pulse points","dna":"creamy vanilla, blue ginger, pink pepper, blackcurrant, Turkish rose, leather-musk base","fam":["spicy","floral","vanilla","musk","fruity"],"imp":"The heavier sweet/resinous DNA gains modern lift from Iso E. Without overpowering the gourmand-amber direction, Iso E adds an airy projection halo that prevents the composition from feeling cloying.","sc":6,"se":"Fall/Winter","oc":"Date / cozy / evening","ti":"night"},{"n":"Dua Formula 003","h":"Dua Brand","ib":"PdM Greenley","fl":"DISTINCT","v":"YES","b":"AMP, LONG","sp":2,"w":"Pulse points","dna":"green apple, mandarin-bergamot citrus, mossy aromatic woods","fam":["green","citrus","aromatic","woody"],"imp":"The mossy aromatic woods in Greenley's DNA occupy the same molecular neighborhood as Iso E Super. Oakmoss-derived compounds and cedarwood share terpenoid structures, so adding Iso E is like adding more of the same family. The green apple and mandarin-bergamot citrus top notes are volatile — the fixative base extends their bright opening significantly. The overall effect is a greener, longer-lasting version of an already-pleasant aromatic composition.","sc":7,"se":"Spring/Summer","oc":"Casual / office / outdoors","ti":"day"},{"n":"Dua's SoHo","h":"Dua Brand","ib":"Bond No. 9 SoHo","fl":"DISTINCT","v":"YES","b":"LONG, DEPTH","sp":2,"w":"Chest","dna":"fruity floral amber, creative urban sweetness","fam":["fruity","floral","amber"],"imp":"The fruity floral amber DNA gets a woody anchor beneath it. Without Iso E, SoHo's urban sweetness can feel formless — pleasant but lacking architecture. The cedarwood molecule adds a structural column that the fruity and floral notes can lean against, creating a more three-dimensional scent experience. The amber base naturally absorbs the cedarwood. Think of it as adding a wooden frame to a watercolor painting.","sc":6,"se":"Spring/Fall","oc":"Urban casual / social","ti":"both"},{"n":"Dua's Water Primal Essence","h":"Dua Brand","ib":"Acqua di Gio Absolu","fl":"DISTINCT","v":"YES","b":"AMP, LONG, PROJ","sp":2,"w":"Full coverage","dna":"fruity aquatic woods, juicy marine sweetness","fam":["fruity","aquatic","woody","marine"],"imp":"Same molecular principle as Acqua Di DUA — light aquatic DNA anchored by Iso E's molecular weight. The fruity aquatic notes are small compounds that evaporate rapidly; Iso E bonds to skin lipids and creates a slow-release platform. The juicy marine sweetness doesn't change character but gains staying power and a wider projection radius. The woody facet in the Absolu DNA directly harmonizes with cedarwood for clean amplification.","sc":6,"se":"Spring/Summer","oc":"Office / casual / gym","ti":"day"},{"n":"Électrique Rendezvous Gingembre Attar","h":"Dua Brand","ib":"YSL La Nuit Bleu Électrique x Gingembre","fl":"DISTINCT","v":"YES","b":"AMP, PROJ","sp":2,"w":"Neck/chest","dna":"ginger lavender woods, spicy fresh musk, clean aromatic depth","fam":["spicy","aromatic","woody","musk"],"imp":"Woody aromatic DNA is Iso E Super's natural habitat — this is the molecular family where cedarwood belongs. The ginger note (zingerone) gains staying power from the fixative base. The lavender-woods heart is directly amplified because lavender and cedarwood are classic fougere partners used together for over a century. The spicy fresh musk harmonizes with Iso E's transparent aura-creating character. One of the better pairings in the collection.","sc":6,"se":"Spring/Fall","oc":"Office / smart casual / date","ti":"both"},{"n":"Elixir Of Poseidon's Classic Pineapple","h":"Dua Brand","ib":"Creed Aventus x D&G Pineapple","fl":"NEAR DUP","v":"YES","b":"AMP, LONG, PROJ","sp":3,"w":"Neck/chest","dna":"pineapple syrup, mandarin
