<style>
/* ── Google Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800&display=swap');

/* ══════════════════════════════════════════
   DESIGN TOKENS — single source of truth
   ══════════════════════════════════════════ */
:root {
  /* ── Palette ── */
  --bg:            #f4efe6;
  --bg2:           #e8decf;
  --panel:         rgba(255,252,246,.96);
  --panel2:        rgba(248,242,231,.88);
  --panel-strong:  #fffdf8;
  --panel-inset:   rgba(239,231,214,.86);
  --border:        rgba(82,54,18,.11);
  --border-strong: rgba(82,54,18,.18);
  --text:          #17120e;
  --muted:         #645748;

  /* ── Accent gold — all derivatives from one base ── */
  --accent:        #b78934;
  --accent-strong: #8f651d;
  --accent-light:  #e8c070;
  --accent-soft:   rgba(183,137,52,.13);
  --accent-mid:    rgba(183,137,52,.22);
  --accent-glow:   rgba(183,137,52,.28);
  --accent-text:   #7a5010;  /* kicker/label on all light surfaces — 5.7:1+ on panel-inset */

  /* ── Semantic ── */
  --good:          #347a50;
  --warn:          #8a5820;  /* darkened from #9d6426 — passes 4.5:1 on panel */
  --bad:           #ad3434;
  --good-strong:   #266040;  /* darkened good for use on panel-inset: 6.0:1 */
  --good-soft:     rgba(52,122,80,.12);
  --warn-soft:     rgba(157,100,38,.09);  /* lightened so warn text passes 4.5:1 */
  --bad-soft:      rgba(173,52,52,.12);

  /* ── Shadows ── */
  --shadow:        0 2px 6px rgba(48,30,8,.05), 0 14px 34px rgba(48,30,8,.10);
  --shadow-sm:     0 1px 3px rgba(48,30,8,.05), 0 6px 16px rgba(48,30,8,.07);
  --shadow-lg:     0 8px 18px rgba(48,30,8,.08), 0 24px 56px rgba(48,30,8,.16);

  /* ── Spacing scale (8px base) ── */
  --sp-1:  4px;
  --sp-2:  8px;
  --sp-3:  12px;
  --sp-4:  16px;
  --sp-5:  20px;
  --sp-6:  24px;
  --sp-7:  32px;
  --sp-8:  40px;
  --sp-9:  48px;

  /* ── Unified radii ── */
  --r-card:    22px;
  --r-inner:   16px;
  --r-control: 12px;
  --r-chip:    999px;
  --r-btn:     12px;
  --r-icon:    12px;

  /* ── Type scale (5 sizes, harmonic ratio ≈ 1.26) ── */
  --text-xs:   11px;   /* labels, micro-copy */
  --text-sm:   13px;   /* secondary body, muted */
  --text-base: 15px;   /* primary body */
  --text-lg:   19px;   /* sub-headings */
  --text-xl:   24px;   /* display numbers */
  --text-2xl:  32px;   /* hero numbers */

  /* ── Line heights ── */
  --lh-tight:  1.1;
  --lh-snug:   1.35;
  --lh-base:   1.5;
}

:root[data-theme="dark"] {
  --bg:            #100d09;
  --bg2:           #17120d;
  --panel:         rgba(30,24,17,.94);
  --panel2:        rgba(36,29,20,.84);
  --panel-strong:  rgba(34,28,20,.98);
  --panel-inset:   rgba(24,18,11,.78);
  --border:        rgba(220,185,120,.10);
  --border-strong: rgba(220,185,120,.18);
  --text:          #f2ebdf;
  --muted:         #b3a18e;
  --accent:        #d5a24c;
  --accent-strong: #f0c980;
  --accent-light:  #f5d898;
  --accent-soft:   rgba(213,162,76,.15);
  --accent-mid:    rgba(213,162,76,.24);
  --accent-glow:   rgba(213,162,76,.30);
  --good:          #63b07e;
  --warn:          #d09541;
  --bad:           #cb6868;
  --good-soft:     rgba(99,176,126,.12);
  --warn-soft:     rgba(208,149,65,.12);
  --bad-soft:      rgba(203,104,104,.12);
  --shadow:        0 4px 12px rgba(0,0,0,.32), 0 18px 42px rgba(0,0,0,.46);
  --shadow-sm:     0 2px 6px rgba(0,0,0,.26), 0 8px 20px rgba(0,0,0,.34);
  --shadow-lg:     0 8px 18px rgba(0,0,0,.36), 0 28px 60px rgba(0,0,0,.5);
}

/* ══════════════════════════════════════════
   GLOBAL RESET & BASE
   ══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: var(--text-base);
  line-height: var(--lh-base);
  color: var(--text);
  background:
    radial-gradient(700px 280px at 50% -6%, rgba(183,137,52,.11), transparent 55%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  padding-bottom: calc(90px + env(safe-area-inset-bottom));
}

h1, h2, h3, h4 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: var(--lh-tight);
  margin: 0;
}

h1 { font-size: clamp(var(--text-xl), 5.2vw, var(--text-2xl)); }
h2 { font-size: var(--text-xl); }
h3 { font-size: var(--text-lg); }
h4 { font-size: var(--text-base); font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: -.01em; }

p  { margin: 0; line-height: var(--lh-base); }

button, input, select, textarea { font: inherit; }

/* ══════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════ */
.app {
  max-width: 960px;
  margin: 0 auto;
  padding: var(--sp-5) var(--sp-4) var(--sp-5);
}

.top {
  position: relative;
  margin-bottom: var(--sp-5);
}

.grid   { display: grid; gap: var(--sp-4); }
.cols-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.cols-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.cols-4 { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
.row    { display: flex; gap: var(--sp-3); flex-wrap: wrap; }
.stack  { display: grid; gap: var(--sp-3); }

/* ══════════════════════════════════════════
   BRAND HEADER
   ══════════════════════════════════════════ */
.brand {
  padding: var(--sp-3) var(--sp-4) var(--sp-3);
  border-radius: 28px;
  background:
    radial-gradient(circle at top right, var(--accent-soft), transparent 55%),
    var(--panel);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow);
  backdrop-filter: blur(24px) saturate(1.12);
  -webkit-backdrop-filter: blur(24px) saturate(1.12);
  position: relative;
  overflow: hidden;
}

/* subtle grain texture on brand header */
.brand::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
  border-radius: inherit;
}

.brand-row  { display: flex; align-items: center; gap: 14px; }

.brandmark {
  width: 52px; height: 52px;
  border-radius: var(--r-inner);
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(145deg, var(--accent-light) 0%, #c49040 35%, #a87830 70%, #8a6020 100%);
  color: #fff;
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-xl);
  font-weight: 700;
  letter-spacing: -0.03em;
  box-shadow:
    0 2px 4px rgba(60,38,10,.28),
    0 8px 24px rgba(183,137,52,.50),
    inset 0 1px 0 rgba(255,255,255,.36),
    inset 0 -1px 0 rgba(0,0,0,.14);
  flex: 0 0 auto;
}

.brand small {
  display: block;
  font-size: var(--text-xs);
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 800;
  opacity: 1;
  margin-bottom: 2px;
}

.brand h1 {
  font-size: clamp(24px, 5.2vw, 34px);
  line-height: var(--lh-tight);
  color: var(--text);
  text-shadow: 0 1px 0 rgba(255,255,255,.28);
}

.brand p {
  margin: 4px 0 0;
  font-size: var(--text-sm);
  color: var(--muted);
}

/* ══════════════════════════════════════════
   BOTTOM TAB BAR
   ══════════════════════════════════════════ */
.tabs {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: max(10px, calc(env(safe-area-inset-bottom) + 4px));
  z-index: 999;
  width: min(430px, calc(100vw - 18px));
  display: flex;
  gap: 4px;
  padding: 5px;
  border-radius: 26px;
  /* Warm frosted parchment — matches the app surface */
  background: rgba(248,243,234,.94);
  border: 1px solid rgba(140,100,40,.14);
  box-shadow:
    0 1px 0 rgba(255,255,255,.90) inset,
    0 -1px 0 rgba(140,100,40,.06) inset,
    0 8px 24px rgba(60,38,10,.12),
    0 24px 56px rgba(60,38,10,.18);
  backdrop-filter: blur(40px) saturate(1.5);
  -webkit-backdrop-filter: blur(40px) saturate(1.5);
  transition: opacity .28s ease, transform .28s ease;
}

:root[data-theme="dark"] .tabs {
  background: rgba(22,16,10,.96);
  border-color: rgba(220,185,120,.12);
  box-shadow: 0 1px 0 rgba(255,220,140,.05) inset, 0 8px 24px rgba(0,0,0,.52), 0 24px 56px rgba(0,0,0,.48);
}

body.sheet-open .tabs {
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(14px);
}

/* ── Inactive tab ── */
.tab {
  flex: 1 1 0;
  min-width: 0;
  min-height: 52px;
  padding: 6px 3px 7px;
  border-radius: 20px;
  border: 1px solid transparent;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: var(--text-xs);
  font-weight: 700;
  color: rgba(80,58,34,.45);
  opacity: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color .18s ease, background .18s ease, border-color .18s ease, transform .18s ease;
}

.tab .tab-ico {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1);
}

.tab span:last-child { line-height: var(--lh-tight); }

.tab:hover { background: rgba(183,137,52,.08); color: rgba(80,58,34,.72); }
.tab:active { transform: scale(.88); transition: transform .06s ease; }
:root[data-theme="dark"] .tab {
  color: rgba(210,190,160,.50);
}
:root[data-theme="dark"] .tab:hover {
  background: rgba(255,255,255,.06);
  color: rgba(210,190,160,.80);
}

/* ── Active tab — per-view colour coding ── */
.tab.active {
  opacity: 1;
  -webkit-appearance: none;
  appearance: none;
  border-color: transparent;
}

.tab.active .tab-ico {
  transform: translateY(-1px) scale(1.08);
}

/* Home → Gold */
.tab.active[data-view="Home"] {
  background: linear-gradient(160deg, #e8c070 0%, #c49840 45%, #a07628 100%) !important;
  color: #1a0e02 !important;
  box-shadow: 0 4px 14px rgba(196,152,64,.50), 0 1px 0 rgba(255,255,255,.28) inset;
}
.tab.active[data-view="Home"] .tab-ico {
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.18));
}

/* Collection → Teal-green (knowledge/library) */
.tab.active[data-view="Collection"] {
  background: linear-gradient(160deg, #4ecfa0 0%, #2a9870 45%, #1a7050 100%) !important;
  color: #fff !important;
  box-shadow: 0 4px 14px rgba(42,152,112,.50), 0 1px 0 rgba(255,255,255,.22) inset;
}

/* Wear → Cobalt blue (action/today) */
.tab.active[data-view="Wear"] {
  background: linear-gradient(160deg, #6aaaf0 0%, #3378d8 45%, #1a58b8 100%) !important;
  color: #fff !important;
  box-shadow: 0 4px 14px rgba(51,120,216,.50), 0 1px 0 rgba(255,255,255,.22) inset;
}

/* Layer → Warm violet (creative/lab) */
.tab.active[data-view="Layer"] {
  background: linear-gradient(160deg, #b88ae0 0%, #8848c8 45%, #6030a8 100%) !important;
  color: #fff !important;
  box-shadow: 0 4px 14px rgba(136,72,200,.50), 0 1px 0 rgba(255,255,255,.22) inset;
}

/* More → Warm coral-rose (settings/extra) */
.tab.active[data-view="More"] {
  background: linear-gradient(160deg, #f09070 0%, #d86040 45%, #b84028 100%) !important;
  color: #fff !important;
  box-shadow: 0 4px 14px rgba(216,96,64,.50), 0 1px 0 rgba(255,255,255,.22) inset;
}

/* Dark mode active — same colours, slightly muted */
:root[data-theme="dark"] .tab.active[data-view="Home"]       { background: linear-gradient(160deg, #8a6018 0%, #6a4810 100%) !important; color: #fff !important; }
:root[data-theme="dark"] .tab.active[data-view="Collection"] { background: linear-gradient(160deg, #2a9870 0%, #1a6848 100%) !important; }
:root[data-theme="dark"] .tab.active[data-view="Wear"]       { background: linear-gradient(160deg, #3378d8 0%, #1a4898 100%) !important; }
:root[data-theme="dark"] .tab.active[data-view="Layer"]      { background: linear-gradient(160deg, #8848c8 0%, #5028a0 100%) !important; }
:root[data-theme="dark"] .tab.active[data-view="More"]       { background: linear-gradient(160deg, #d86040 0%, #982820 100%) !important; }

:root[data-theme="dark"] .home-hero-cta {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
  color: #fff;
}

/* ══════════════════════════════════════════
   CARDS
   ══════════════════════════════════════════ */
.card {
  background: linear-gradient(180deg, rgba(255,255,255,.14), transparent 26%), var(--panel);
  border: 1px solid rgba(82,54,18,.10);
  border-radius: var(--r-card);
  padding: 20px;
  box-shadow: 0 1px 4px rgba(48,30,8,.03), 0 8px 18px rgba(48,30,8,.05);
  backdrop-filter: blur(20px) saturate(1.08);
  -webkit-backdrop-filter: blur(20px) saturate(1.08);
  position: relative;
  overflow: hidden;
}

/* inner top highlight — stronger in light mode for depth */
.card::after {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,.70) 50%, transparent 95%);
  pointer-events: none;
}

/* inset panels within cards — use a sunken surface */
.sheety {
  background: var(--panel-inset);
  border: 1px solid var(--border);
  border-radius: var(--r-inner);
}

.frag-hero {
  padding: 26px;
  border-radius: var(--r-card);
  border: 1px solid rgba(82,54,18,.16);
  background:
    linear-gradient(180deg, rgba(183,137,52,.04), transparent 44%),
    radial-gradient(circle at top right, rgba(183,137,52,.26), transparent 36%),
    linear-gradient(180deg, rgba(255,255,255,.18), transparent 26%),
    var(--panel);
  box-shadow: 0 8px 18px rgba(48,30,8,.08), 0 28px 62px rgba(48,30,8,.16);
  position: relative;
  overflow: hidden;
}

.chart-card {
  padding: 14px;
  border-radius: var(--r-card);
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow);
}

/* ══════════════════════════════════════════
   STAT & ICONSTAT
   ══════════════════════════════════════════ */
.stat {
  padding: var(--sp-4);
  border-radius: var(--r-inner);
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow-sm);
}

.iconstat {
  display: flex;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-4);
  border: 1px solid rgba(82,54,18,.10);
  background: rgba(255,252,246,.94);
  border-radius: var(--r-inner);
  box-shadow: var(--shadow-sm);
}

.iconbubble, .icon-badge {
  width: 46px; height: 46px;
  border-radius: var(--r-control);
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(145deg, #dbb560 0%, #b78934 45%, #8f651d 100%);
  color: #fff;
  font-size: var(--text-xl);
  flex: 0 0 auto;
  box-shadow:
    0 2px 4px rgba(60,38,10,.28),
    0 6px 18px var(--accent-mid),
    inset 0 1px 0 rgba(255,255,255,.32),
    inset 0 -1px 0 rgba(0,0,0,.14);
  border: 1px solid rgba(143,101,29,.35);
}

/* .num defined in utilities below */

/* ══════════════════════════════════════════
   SHELF CARDS
   ══════════════════════════════════════════ */
.shelf-card {
  padding: var(--sp-4);
  border-radius: var(--r-inner);
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow-sm);
}

.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.frag-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.favorite-btn {
  padding: 6px 10px;
  border-radius: var(--r-control);
  min-width: 40px;
}

/* ══════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════ */
button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 42px;
  padding: 10px 16px;
  border-radius: var(--r-btn);
  border: 1px solid rgba(82,54,18,.17);
  background: linear-gradient(180deg, rgba(255,255,255,.54), rgba(255,255,255,.10)), rgba(255,251,244,.64);
  color: var(--text);
  font-size: var(--text-sm);
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: var(--shadow-sm);
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease;
}

:root[data-theme="dark"] button {
  background: var(--panel-inset);
}

button:hover  { transform: scale(1.012); box-shadow: var(--shadow); }
/* button:active handled in iOS transitions block */

button:focus-visible,
.tab:focus-visible,
.listbtn:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-soft), 0 0 0 5px rgba(183,137,52,.20);
}

/* ══════════════════════════════════════════
   LIST BUTTON
   ══════════════════════════════════════════ */
.listbtn {
  -webkit-tap-highlight-color: transparent;
  width: 100%;
  text-align: left;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-inner);
  padding: var(--sp-4);
  box-shadow: var(--shadow-sm);
  display: block;
  transition: transform .14s ease, box-shadow .14s ease;
}

.listbtn:hover { transform: none; box-shadow: var(--shadow); }

.listbtn * {
  white-space: normal !important;
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* ══════════════════════════════════════════
   FORM CONTROLS
   ══════════════════════════════════════════ */
input, select, textarea {
  width: 100%;
  min-height: 44px;
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-control);
  border: 1px solid rgba(82,54,18,.20);
  background: linear-gradient(180deg, rgba(255,255,255,.6), rgba(255,255,255,.16)), var(--panel-strong);
  color: var(--text);
  font-size: var(--text-sm);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.58);
  transition: border-color .22s ease, box-shadow .22s ease, background .22s ease;
}

textarea { min-height: 92px; resize: vertical; }

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: rgba(183,137,52,.58);
  box-shadow: 0 0 0 3px var(--accent-soft), 0 8px 18px rgba(183,137,52,.10);
  background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.2)), var(--panel-strong);
}

.field {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
  min-width: 200px;
  flex: 1;
}

label {
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ══════════════════════════════════════════
   TYPOGRAPHY UTILITIES
   ══════════════════════════════════════════ */
.kicker {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent-text);
  font-family: 'Outfit', sans-serif;
  opacity: 0.85;
}

.muted   { color: var(--muted); }
.small   { font-size: var(--text-sm); }
.subtle  { font-size: var(--text-sm); color: var(--muted); }
.hidden  { display: none; }

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: var(--lh-snug);
  margin: .1rem 0;
}

.section-desc, .section-subtitle, .mini-note, .acc-desc {
  color: var(--muted);
  font-size: var(--text-sm);
  line-height: var(--lh-base);
}

.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sp-3);
  flex-wrap: wrap;
}

.section-head .copy { min-width: 0; }
.section-head .title {
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.025em;
  margin: .1rem 0;
}

.ios-row-title    { font-size: var(--text-base); font-weight: 700; line-height: var(--lh-snug); letter-spacing: -.015em; color: var(--text); }
.ios-row-subtitle { font-size: var(--text-sm); color: var(--muted); line-height: var(--lh-base); }
.ios-row-meta     { display: flex; flex-wrap: wrap; gap: var(--sp-1); }
.ios-row-trailing { display: grid; justify-items: end; gap: var(--sp-1); min-width: 74px; }

/* ══════════════════════════════════════════
   PILLS, CHIPS, BADGES
   ══════════════════════════════════════════ */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: var(--r-chip);
  background: linear-gradient(135deg, rgba(183,137,52,.22), rgba(183,137,52,.12));
  color: var(--accent-text);
  font-size: var(--text-xs);
  font-weight: 800;
  border: 1px solid rgba(183,137,52,.32);
  margin: 2px 4px 2px 0;
  letter-spacing: .06em;
  text-transform: uppercase;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.32),
    0 1px 4px var(--accent-soft),
    0 0 0 0.5px rgba(183,137,52,.12);
}

.frag-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: var(--r-chip);
  border: 1px solid rgba(82,54,18,.18);
  background: linear-gradient(135deg, rgba(183,137,52,.14), rgba(183,137,52,.05));
  color: #856018;
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 1px 4px rgba(48,30,8,.07);
}

.frag-chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--r-chip);
  border: 1px solid rgba(82,54,18,.10);
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
}

.badge.good  { color: var(--good-strong);  background: var(--good-soft); border-color: rgba(52,122,80,.30); box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 0 0 1px rgba(52,122,80,.10); }
.badge.warn  { color: var(--warn);  background: var(--warn-soft); border-color: rgba(138,88,32,.26); box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 0 0 1px rgba(138,88,32,.10); }
.badge.bad   { color: var(--bad);   background: var(--bad-soft); border-color: rgba(173,52,52,.26); box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 0 0 1px rgba(173,52,52,.10); }

.badge-soft  {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px;
  border-radius: var(--r-chip);
  font-size: var(--text-xs);
  font-weight: 700;
  border: 1px solid rgba(82,54,18,.10);
  background: rgba(242,234,218,.90);
}

:root[data-theme="dark"] .badge-soft { background: var(--panel-inset); }

.ios-mini-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 22px;
  padding: 0 9px;
  border-radius: var(--r-chip);
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  background: linear-gradient(135deg, rgba(183,137,52,.18), rgba(183,137,52,.12));
  color: var(--accent-strong);
  border: 1px solid rgba(183,137,52,.24);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
}

.good  { color: var(--good); }
.warn  { color: var(--warn); }
.bad   { color: var(--bad); }

/* ══════════════════════════════════════════
   METERS / PROGRESS BARS
   ══════════════════════════════════════════ */
.meter, .score-meter {
  height: 8px;
  border-radius: var(--r-chip);
  background: rgba(128,100,60,.1);
  border: 1px solid var(--border);
  overflow: hidden;
}

.meter > span, .score-meter > span {
  display: block;
  height: 100%;
  border-radius: var(--r-chip);
  background: linear-gradient(90deg, var(--accent) 0%, #c49840 100%);
}

.meter.good  > span { background: linear-gradient(90deg, var(--good), #4a9468); }
.meter.warn  > span { background: linear-gradient(90deg, var(--warn), #a07040); }
.meter.bad   > span { background: linear-gradient(90deg, var(--bad),  #c05050); }

/* ══════════════════════════════════════════
   BAR CHART
   ══════════════════════════════════════════ */
.bar-list   { display: grid; gap: 10px; }
.bar-row    { display: grid; grid-template-columns: minmax(90px, 130px) 1fr 34px; align-items: center; gap: 10px; }
.bar-label  { font-size: var(--text-sm); color: var(--muted); }
.bar-track  { height: 8px; border-radius: var(--r-chip); background: rgba(128,100,60,.1); overflow: hidden; }
.bar-fill   { height: 100%; border-radius: var(--r-chip); background: linear-gradient(90deg, var(--accent) 0%, #c49840 100%); }

/* ══════════════════════════════════════════
   TABS / SUBNAV (top, not bottom bar)
   ══════════════════════════════════════════ */
.subnav { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

.ios-segment {
  display: flex;
  gap: 6px;
  padding: 5px;
  border-radius: var(--r-inner);
  background: var(--panel-inset);
  border: 1px solid var(--border);
  width: 100%;
  overflow: auto;
}

:root[data-theme="dark"] .ios-segment { background: var(--panel-inset); }
.ios-segment::-webkit-scrollbar { display: none; }
.ios-segment { touch-action: pan-x; }

.subnav button, .ios-segment button {
  min-height: 36px;
  border-radius: var(--r-control);
  font-size: var(--text-sm);
  font-weight: 600;
  padding: 0 14px;
  box-shadow: none;
  background: transparent;
  border-color: transparent;
}

.subnav button.active, .ios-segment button.active {
  background: var(--panel-strong);
  color: var(--accent);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

/* ══════════════════════════════════════════
   IOS LIST ROWS
   ══════════════════════════════════════════ */
.ios-list  { display: grid; gap: 10px; touch-action: pan-y; }

.ios-row {
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: var(--sp-3);
  align-items: center;
  width: 100%;
  text-align: left;
  padding: var(--sp-4);
  border-radius: var(--r-inner);
  border: 1px solid rgba(82,54,18,.10);
  background: rgba(255,252,246,.96);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .18s ease, transform .16s ease;
}

.ios-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.ios-row:active { transform: scale(0.98); box-shadow: var(--shadow-sm); transition: transform 0.08s ease, box-shadow 0.08s ease; }

.ios-row-main    { min-width: 0; display: grid; gap: 5px; }
.ios-row-title   { font-size: var(--text-base); font-weight: 800; line-height: var(--lh-snug); letter-spacing: -.015em; color: var(--text); }
.ios-row-subtitle{ font-size: var(--text-sm); color: #5a4e43 10%); line-height: var(--lh-base); }
.ios-row-meta    { display: flex; flex-wrap: wrap; gap: 6px; }
.ios-row-trailing{ display: grid; justify-items: end; gap: 6px; min-width: 74px; }
.ios-chevron     { color: var(--muted); font-size: var(--text-lg); line-height: var(--lh-tight); opacity: .6; }

/* ══════════════════════════════════════════
   SHEETS & OVERLAY
   ══════════════════════════════════════════ */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(20,14,8,.25);
  z-index: 1290;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 1300;
  max-height: 86vh;
  overflow: auto;
  border-top-left-radius: 30px;
  border-top-right-radius: 30px;
  background: var(--panel-strong);
  border: 1px solid var(--border-strong);
  border-bottom: none;
  box-shadow: 0 -4px 16px rgba(0,0,0,.08), 0 -16px 48px rgba(0,0,0,.14);
  padding: 20px 18px calc(22px + env(safe-area-inset-bottom));
  touch-action: pan-y;
  will-change: transform;
  transition: transform .28s cubic-bezier(.32,0,.67,0);
}

/* drag handle */
.sheet::before {
  content: "";
  display: block;
  width: 40px; height: 4px;
  border-radius: var(--r-chip);
  background: rgba(82,54,18,.28);
  margin: 0 auto 16px;
}

.action-row-sticky {
  position: sticky;
  bottom: 0;
  padding-top: 10px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: linear-gradient(180deg, transparent, var(--panel) 38%);
}

/* ══════════════════════════════════════════
   TOASTS
   ══════════════════════════════════════════ */
.toast-wrap {
  position: fixed; left: 50%; bottom: 90px;
  transform: translateX(-50%);
  z-index: 1400;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: none;
}

.toast {
  min-width: 220px; max-width: min(92vw, 400px);
  background: var(--panel);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: var(--r-inner);
  padding: 12px 16px;
  color: var(--text);
  font-size: var(--text-sm);
  font-weight: 600;
  pointer-events: auto;
}

.toast.success { border-color: rgba(52,122,80,.30); }
.toast.warn    { border-color: rgba(138,88,32,.30); }
.toast.error   { border-color: rgba(173,52,52,.30); }

/* ══════════════════════════════════════════
   EMPTY STATES
   ══════════════════════════════════════════ */
.empty-state, .empty-card {
  text-align: center;
  padding: 24px 18px;
  border: 1px dashed var(--border-strong);
  border-radius: var(--r-inner);
  background: var(--panel-inset);
  color: var(--muted);
  font-size: var(--text-sm);
}

:root[data-theme="dark"] .empty-state,
:root[data-theme="dark"] .empty-card {
  background: var(--panel-inset);
}

/* ══════════════════════════════════════════
   ACCORDIONS
   ══════════════════════════════════════════ */
.acc-card   { overflow: hidden; }

.acc-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  width: 100%; background: transparent; border: none; box-shadow: none; padding: 0;
  text-align: left; min-height: auto;
}

.acc-head:hover { transform: none; box-shadow: none; }
.acc-copy  { min-width: 0; }
.acc-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-base);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: .15rem 0 .1rem;
}

.acc-toggle {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, rgba(183,137,52,.10), transparent);
  border: 1px solid rgba(82,54,18,.19);
  color: var(--accent);
  font-size: var(--text-base);
  font-weight: 700;
  flex: 0 0 auto;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.24), 0 1px 3px rgba(48,30,8,.06);
  min-height: auto;
  padding: 0;
  transition: background .14s ease, border-color .14s ease, box-shadow .14s ease;
}

.acc-head:hover .acc-toggle {
  background: linear-gradient(135deg, rgba(183,137,52,.18), rgba(183,137,52,.08));
  border-color: rgba(183,137,52,.44);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.28), 0 2px 6px rgba(183,137,52,.16);
}

.acc-body { margin-top: 14px; animation: fadeUp .18s ease both; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

/* Staggered list entry — applied to ios-rows and shelf-cards */
.ios-list .ios-row,
.shelf-grid .shelf-card,
.grid > .card {
  animation: fadeUp .28s cubic-bezier(.22,1,.36,1) both;
}

.ios-list .ios-row:nth-child(1)  { animation-delay: 0ms; }
.ios-list .ios-row:nth-child(2)  { animation-delay: 30ms; }
.ios-list .ios-row:nth-child(3)  { animation-delay: 60ms; }
.ios-list .ios-row:nth-child(4)  { animation-delay: 90ms; }
.ios-list .ios-row:nth-child(5)  { animation-delay: 120ms; }
.ios-list .ios-row:nth-child(6)  { animation-delay: 150ms; }
.ios-list .ios-row:nth-child(7)  { animation-delay: 180ms; }
.ios-list .ios-row:nth-child(8)  { animation-delay: 210ms; }

/* Tab press — instant scale down, spring back */
.tab:active { transform: scale(.92); transition: transform .08s ease; }

.skeleton {
  border-radius: var(--sp-2);
  background: linear-gradient(90deg,
    var(--accent-soft) 25%,
    var(--accent-glow) 50%,
    var(--accent-soft) 75%
  );
  background-size: 800px 100%;
  animation: shimmer 1.6s infinite linear;
}

/* Favorite star highlight in ios-rows */
.ios-row-title .fav-star {
  color: var(--accent);
  font-size: var(--text-xs);
  vertical-align: middle;
  opacity: .85;
}

/* Collection story — structured list items */
.story-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--text-sm);
}

.story-row:last-child { border-bottom: none; }
.story-row .story-label { color: var(--accent-text); font-size: var(--text-xs); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
.story-row .story-val   { font-weight: 700; text-align: right; min-width: 0; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: var(--text-base); letter-spacing: -.02em; }

/* Wear log date badge */
.wear-date-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: var(--r-chip);
  background: linear-gradient(135deg, rgba(183,137,52,.18), rgba(183,137,52,.06));
  color: var(--accent-strong);
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  border: 1px solid rgba(183,137,52,.28);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
}

/* Chart card h spacing */
.chart-card .kicker { margin-bottom: 10px; display: block; }

/* Hero stat label → use kicker sizing */
.hero-stat .label {
  font-size: var(--text-xs);
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
}

/* Tight section spacing inside cards */
.card > .kicker:first-child { margin-bottom: 4px; }

/* Feedback inline text */
.feedback-inline {
  font-size: var(--text-sm);
  color: var(--muted);
  line-height: var(--lh-base);
  margin-top: 4px;
}

/* Layering ratio display */
.layer-ratio-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-top: 6px;
}

/* Section card (plain surface no extra padding) */
.section-card {
  border-radius: var(--r-inner);
  padding: 14px;
}

/* ══════════════════════════════════════════
   SECTION LIST SHELL
   ══════════════════════════════════════════ */
.section-list-shell { display: grid; gap: 12px; }
/* ══════════════════════════════════════════
   COLLECTION FRAGRANCE CARD
   ══════════════════════════════════════════ */
.collection-fragrance-card {
  display: grid;
  grid-template-columns: minmax(0,1.2fr) minmax(0,0.9fr) minmax(0,1.1fr) minmax(0,1.6fr);
  gap: 12px;
  align-items: start;
}

.collection-fragrance-card .cf-block   { min-width: 0; }
.collection-fragrance-card .cf-label   {
  font-size: var(--text-xs); color: var(--accent); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .08em; font-weight: 700;
}
.collection-fragrance-card .cf-name   { font-weight: 700; font-size: var(--text-base); line-height: var(--lh-snug); }
.collection-fragrance-card .cf-house,
.collection-fragrance-card .cf-meta   { color: var(--muted); }
.collection-fragrance-card .cf-value  { white-space: normal; overflow-wrap: anywhere; word-break: break-word; }

/* ══════════════════════════════════════════
   HERO SUMMARY GRID
   ══════════════════════════════════════════ */
.frag-hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 2.5vw, 1.9rem);
  line-height: var(--lh-tight);
  letter-spacing: -0.04em;
  font-weight: 700;
  margin: 0;
}

.frag-hero-house { color: var(--muted); margin-top: 6px; font-size: var(--text-base); }

.frag-hero-grid  {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.hero-summary    {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.hero-stat {
  padding: 14px;
  border-radius: var(--r-inner);
  border: 1px solid rgba(82,54,18,.13);
  background: linear-gradient(180deg, rgba(183,137,52,.04), transparent 48%), var(--panel-inset);
}

:root[data-theme="dark"] .hero-stat { background: var(--panel-inset); }
.hero-stat .label { font-size: var(--text-xs); letter-spacing: .16em; text-transform: uppercase; color: var(--accent-text); font-weight: 700; }
.hero-stat .value { margin-top: 8px; font-weight: 700; }

.detail-mini {
  padding: 12px;
  border-radius: var(--r-inner);
  background: var(--panel-inset);
  border: 1px solid var(--border);
}
:root[data-theme="dark"] .detail-mini { background: var(--panel-inset); }
.detail-mini .kicker { font-size: var(--text-xs); }
.detail-mini .val    { margin-top: 8px; font-weight: 700; }

/* ══════════════════════════════════════════
   LAYERING UI
   ══════════════════════════════════════════ */
.layer-compact-card   { padding: 18px; border-radius: var(--r-card); }

.layer-select-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.layer-controls-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.layer-weather-strip {
  padding: 12px 14px;
  border-radius: var(--r-inner);
  border: 1px solid var(--border);
  background: var(--panel-inset);
  box-shadow: var(--shadow-sm);
  margin-top: 14px;
}

:root[data-theme="dark"] .layer-weather-strip {
  background: var(--panel-inset);
}

.layer-weather-line {
  margin-top: 4px;
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: var(--lh-tight);
}

.layer-weather-note { margin-top: 6px; color: var(--muted); font-size: var(--text-sm); line-height: var(--lh-base); }

.layer-weather-chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

.layer-weather-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border-radius: var(--r-icon);
  background: var(--accent-soft);
  color: var(--accent);
  font-size: var(--text-base);
  font-weight: 800;
}

.layer-mini-stat { padding: 12px; border-radius: var(--r-control); }

/* ══════════════════════════════════════════
   VAULT ADVISOR
   ══════════════════════════════════════════ */
.vault-advisor-card {
  margin-top: 14px;
  border: 1px solid rgba(82,54,18,.19) !important;
  background:
    linear-gradient(135deg, rgba(183,137,52,.09) 0%, transparent 42%),
    radial-gradient(circle at top right, rgba(183,137,52,.17), transparent 50%),
    var(--panel) !important;
  box-shadow: 0 1px 4px rgba(48,30,8,.04), 0 8px 24px rgba(48,30,8,.08), inset 0 1px 0 rgba(255,255,255,.38) !important;
}

.vault-advisor-head  { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
.vault-advisor-mark  {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border-radius: var(--r-icon);
  background: linear-gradient(135deg, #e8c070 0%, #b78934 55%, #8f651d 100%);
  color: #fff;
  font-size: var(--text-sm); font-weight: 900;
  box-shadow: 0 2px 8px rgba(183,137,52,.40), inset 0 1px 0 rgba(255,255,255,.3);
}

.vault-advisor-grid  {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 10px;
  margin-top: 12px;
}

.vault-advisor-result {
  padding: 13px 15px;
  border-radius: var(--r-inner);
  border: 1px solid rgba(82,54,18,.13);
  background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.04) 60%), var(--panel-inset);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.24);
}

:root[data-theme="dark"] .vault-advisor-result { background: var(--panel-inset); }

.vault-advisor-title { font-size: var(--text-sm); font-weight: 700; letter-spacing: -0.01em; }
.vault-advisor-copy  { margin-top: 5px; font-size: var(--text-sm); line-height: var(--lh-base); color: var(--muted); }

.vault-divider {
  height: 1px;
  margin: 12px 0;
  background: linear-gradient(90deg, transparent 5%, rgba(183,137,52,.42) 35%, rgba(183,137,52,.58) 50%, rgba(183,137,52,.42) 65%, transparent 95%);
  opacity: .7;
}

/* ══════════════════════════════════════════
   ANALYZER
   ══════════════════════════════════════════ */
.analyzer-grid {
  display: grid;
  grid-template-columns: 1.15fr .85fr;
  gap: 12px;
}

.analyzer-box {
  border: 1px solid var(--border);
  border-radius: var(--r-inner);
  padding: 14px;
  background: var(--panel-inset);
}

:root[data-theme="dark"] .analyzer-box { background: var(--panel-inset); }

.analyzer-note  { color: var(--muted); font-size: var(--text-sm); margin-top: 8px; line-height: var(--lh-base); }
.analyzer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.analyzer-primary { font-weight: 700; }

.confidence-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: var(--r-chip);
  font-size: var(--text-xs); font-weight: 700;
  border: 1px solid var(--border);
  background: var(--panel-inset);
  margin-right: 6px; margin-top: 4px;
}

:root[data-theme="dark"] .confidence-chip { background: var(--panel-inset); }

.source-list { display: grid; gap: 8px; margin-top: 10px; }

.source-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 12px;
  border-radius: var(--r-control);
  border: 1px solid var(--border);
  background: var(--panel-inset);
  color: inherit;
  text-decoration: none;
  font-size: var(--text-sm);
  transition: box-shadow .14s ease;
}

:root[data-theme="dark"] .source-link { background: var(--panel-inset); }
.source-link:hover { box-shadow: var(--shadow-sm); }

/* ══════════════════════════════════════════
   ONBOARDING
   ══════════════════════════════════════════ */
.onboard-grid  { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.onboard-step  {
  border-radius: var(--r-inner);
  padding: 14px;
  border: 1px solid var(--border);
  background: var(--panel-inset);
}

:root[data-theme="dark"] .onboard-step { background: var(--panel-inset); }
.onboard-step /* .num defined in utilities below */

/* ══════════════════════════════════════════
   EXPLAIN LIST (Buy / Skip)
   ══════════════════════════════════════════ */
.explain-list { display: grid; gap: 10px; margin-top: 12px; }
.explain-row  {
  padding: 11px 14px;
  border-radius: var(--r-control);
  border: 1px solid var(--border);
  background: var(--panel-inset);
  font-size: var(--text-sm);
}
:root[data-theme="dark"] .explain-row { background: var(--panel-inset); }


/* ══════════════════════════════════════════
   EXPLAINABILITY POLISH
   ══════════════════════════════════════════ */
.score-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-1);
  margin-top: var(--sp-3);
  align-items: center;
}

/* Base chip — all are equal by default */
.score-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-height: 24px;
  padding: 0 9px;
  border-radius: var(--r-chip);
  border: 1px solid rgba(82,54,18,.16);
  background: linear-gradient(135deg,
    rgba(183,137,52,.09),
    rgba(183,137,52,.04) 60%),
    var(--panel-inset);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--muted);
  transition: opacity .18s ease;
}

/* First chip in the row — the standout (highest scoring) */
.score-chip-row .score-chip:first-child {
  min-height: 28px;
  padding: 0 12px;
  font-size: var(--text-xs);
  font-weight: 800;
  color: var(--accent-strong);
  border-color: rgba(183,137,52,.32);
  background: linear-gradient(135deg,
    rgba(183,137,52,.18),
    rgba(183,137,52,.09) 60%),
    var(--panel-inset);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.38), 0 1px 6px rgba(183,137,52,.14);
}

/* Chips after the first — step down in presence */
.score-chip-row .score-chip:not(:first-child) {
  opacity: .72;
}

.score-chip .score-chip-label { color: var(--accent-text); font-weight: 700; letter-spacing: .05em; }
.score-chip .score-chip-value { font-weight: 900; color: var(--accent-text); }

.score-chip.good {
  color: var(--good-strong);
  background: linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.04) 60%), var(--good-soft);
  border-color: rgba(52,122,80,.30);
}
.score-chip.warn {
  color: var(--warn);
  background: linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.04) 60%), var(--warn-soft);
  border-color: rgba(138,88,32,.28);
}
.score-chip.bad {
  color: var(--bad);
  background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.04) 60%), var(--bad-soft);
  border-color: rgba(173,52,52,.24);
}

/* Score badge — total score pill on pick cards */
.score-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 60px;
  min-height: 34px;
  padding: 0 var(--sp-3);
  border-radius: var(--r-chip);
  border: 1px solid rgba(82,54,18,.20);
  background: linear-gradient(135deg, rgba(255,255,255,.52), rgba(255,255,255,.10) 55%), var(--panel-strong);
  box-shadow: 0 6px 16px rgba(48,30,8,.10), 0 2px 4px rgba(48,30,8,.06), inset 0 1px 0 rgba(255,255,255,.82);
  font-size: var(--text-sm);
  font-weight: 800;
  letter-spacing: -.01em;
}
.score-badge.good { color: var(--good); border-color: rgba(52,122,80,.34); box-shadow: 0 6px 16px var(--good-soft), inset 0 1px 0 rgba(255,255,255,.82); }
.score-badge.warn { color: var(--warn); border-color: rgba(138,88,32,.34); box-shadow: 0 6px 16px var(--warn-soft), inset 0 1px 0 rgba(255,255,255,.82); }
.score-badge.bad  { color: var(--bad);  border-color: rgba(173,52,52,.30); box-shadow: 0 6px 16px var(--bad-soft), inset 0 1px 0 rgba(255,255,255,.78); }

.explain-note {
  margin-top: var(--sp-2);
  padding: var(--sp-3);
  border-radius: var(--r-control);
  border: 1px solid rgba(82,54,18,.10);
  background: linear-gradient(180deg, rgba(255,255,255,.14), transparent 65%), var(--panel-inset);
  color: var(--muted);
  font-size: var(--text-sm);
  line-height: var(--lh-base);
}
.explain-note strong { color: var(--text); font-weight: 700; }

.explain-card-soft {
  border: 1px solid rgba(82,54,18,.15);
  background: linear-gradient(180deg, rgba(183,137,52,.05), transparent 44%), var(--panel);
  border-radius: var(--r-card);
}

:root[data-theme="dark"] .score-chip,
:root[data-theme="dark"] .score-badge,
:root[data-theme="dark"] .explain-note { box-shadow: none; }
:root[data-theme="dark"] .score-chip.good { color: var(--good); }
:root[data-theme="dark"] .badge.good { color: var(--good); }

/* ══════════════════════════════════════════
   SURFACE CARD / INLINE ICON
   ══════════════════════════════════════════ */
.surface-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
}

/* ══════════════════════════════════════════
   LUXURY SIMPLIFICATION PASS
   ══════════════════════════════════════════ */
.brand {
  padding: 22px 24px 18px;
}

.tab:not(.active) {
  opacity: .8;
}

.tab:not(.active) .tab-ico {
  opacity: .82;
}

.stat,
.iconstat,
.shelf-card,
.chart-card,
.section-card,
.explain-row,
.onboard-step,
.analyzer-box,
.vault-advisor-result,
.detail-mini,
.layer-weather-strip {
  box-shadow: none;
  border-color: rgba(82,54,18,.10);
}

.frag-chip-row > .frag-chip:nth-child(n+4),
.row > .pill:nth-child(n+4) {
  opacity: .78;
}

.story-row {
  padding: 10px 0;
}

button:hover {
  border-color: rgba(82,54,18,.15);
}

@media (max-width: 760px) {
  .card { padding: 18px; }
  .frag-hero { padding: 20px; }
  .brand { padding: 18px 18px 14px; }
}

.inline-icon {
  display: inline-flex; width: 28px; height: 28px;
  align-items: center; justify-content: center;
  border-radius: 9px;
  background: var(--accent-soft);
  color: var(--accent);
}


/* ══════════════════════════════════════════
   POLISH PASS — hierarchy, forms, actions
   ══════════════════════════════════════════ */
.chart-card,
.section-card,
.analyzer-box,
.detail-mini,
.hero-stat,
.layer-weather-strip,
.vault-advisor-result,
.onboard-step,
.explain-row {
  background: linear-gradient(180deg, rgba(255,255,255,.12), transparent 40%), var(--panel-inset);
  border-color: rgba(82,54,18,.19);
  box-shadow: var(--shadow-sm);
}

.kicker,
label,
.hero-stat .label,
.ai-fit-label,
.ai-meta-label,
.story-row .story-label {
  color: #7a5a30;
}

.section-title,
.section-head .title,
.acc-title,
.ios-row-title,
.collection-fragrance-card .cf-name,
.vault-advisor-title {
  letter-spacing: -.025em;
}

.subtle,
.section-desc,
.section-subtitle,
.muted,
.small,
.brand p,
.ai-fit-val,
.ai-meta-val,
.collection-fragrance-card .cf-house,
.collection-fragrance-card .cf-meta {
  color: var(--muted);
}

.frag-chip-row .pill:nth-child(n+5),
.frag-chip-row .frag-chip:nth-child(n+5) {
  display: none;
}

button.primary,
#saveWear,
#quickLogWear,
.ai-run-btn {
  background: linear-gradient(135deg, #dbb560 0%, var(--accent) 56%, var(--accent-strong) 100%) !important;
  color: #fff !important;
  border-color: transparent !important;
  font-weight: 800 !important;
  letter-spacing: .01em;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 24px rgba(183,137,52,.38), inset 0 1px 0 rgba(255,255,255,.26) !important;
}

button.primary::after,
#saveWear::after,
#quickLogWear::after,
.ai-run-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.18), transparent 42%);
  pointer-events: none;
}

button.primary:hover,
#saveWear:hover,
#quickLogWear:hover,
.ai-run-btn:hover {
  box-shadow: 0 14px 28px rgba(183,137,52,.46), inset 0 1px 0 rgba(255,255,255,.30) !important;
}

.manual-log-card {
  border-color: rgba(82,54,18,.17);
  box-shadow: var(--shadow-lg);
}

.manual-log-grid {
  display: grid;
  grid-template-columns: 1.05fr .95fr;
  gap: 14px;
  margin-top: 14px;
}

.manual-log-group {
  padding: 14px;
  border-radius: var(--r-inner);
  border: 1px solid rgba(82,54,18,.20);
  background: linear-gradient(180deg, rgba(255,255,255,.12), transparent 45%), var(--panel-inset);
}

.manual-log-summary {
  display: grid;
  gap: 10px;
  align-content: start;
}

.manual-log-meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 10px;
}

.manual-log-stat {
  padding: 12px;
  border-radius: var(--r-control);
  border: 1px solid var(--border);
  background: rgba(255,255,255,.16);
}

.manual-log-stat .stat-label {
  font-size: var(--text-xs);
  letter-spacing: .14em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--muted);
}

.manual-log-stat .stat-value {
  margin-top: 6px;
  font-weight: 700;
  line-height: var(--lh-snug);
}

.manual-log-actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-top: 14px;
}

.page-shell-tight > .card + .card,
.section-list-shell > .card + .card {
  margin-top: 2px;
}

@media (max-width: 760px) {
  .manual-log-grid,
  .manual-log-meta,
  .manual-log-actions {
    grid-template-columns: 1fr;
  }
}


/* ══════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════ */
@media (max-width: 760px) {
  .app { padding: 12px 12px 124px; }
  .brand { padding: 16px 16px 12px; }
  .brand h1 { font-size: clamp(20px, 7vw, 26px); }
  .brand p  { font-size: var(--text-sm); }

  .tabs { width: calc(100vw - 14px); bottom: max(6px, calc(env(safe-area-inset-bottom) + 2px)); border-radius: var(--r-inner); padding: 5px; }
  .tab  { min-height: 50px; font-size: var(--text-xs); }
  .tab .tab-ico { font-size: var(--text-base); }

  .card  { border-radius: var(--r-inner); padding: 16px; }
  .frag-hero { border-radius: var(--r-inner); padding: 16px; }
  .stat, .iconstat { border-radius: var(--r-inner); }
  .listbtn { border-radius: 18px; }

  .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; }
  .field { min-width: 100%; }
  /* .num defined in utilities below */
  h3 { font-size: 1.18rem; }

  .collection-fragrance-card { grid-template-columns: 1fr; gap: 10px; }
  .collection-fragrance-card .cf-name { font-size: 1.06rem; }

  .hero-summary, .frag-hero-grid { grid-template-columns: 1fr 1fr; }

  .onboard-grid    { grid-template-columns: 1fr 1fr; }
  .analyzer-grid   { grid-template-columns: 1fr; }
  .layer-select-grid   { grid-template-columns: 1fr; }
  .layer-controls-grid { grid-template-columns: 1fr 1fr; }

  .ios-row { padding: 12px 14px; border-radius: var(--r-inner); }
  .ios-row-title    { font-size: var(--text-sm); }
  .ios-row-subtitle { font-size: var(--text-sm); }
  .sheet { border-top-left-radius: 26px; border-top-right-radius: 26px; }
  .sotd-canvas-wrap { max-width: 100%; }
  [style*="grid-template-columns:minmax(0,220px)"] { grid-template-columns: 1fr !important; }
}

/* ══════════════════════════════════════════
   AI ANALYZER
   ══════════════════════════════════════════ */
.ai-analyzer-hero {
  background:
    radial-gradient(circle at top right, rgba(183,137,52,.18), transparent 40%),
    var(--panel);
  border-color: rgba(82,54,18,.16);
}

.ai-mark {
  width: 36px; height: 36px;
  border-radius: var(--r-control);
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(145deg, var(--accent-light) 0%, #c49040 35%, #a87830 70%, #8a6020 100%);
  color: #fff;
  font-size: var(--text-base);
  font-weight: 900;
  flex: 0 0 auto;
  box-shadow:
    0 2px 4px rgba(60,38,10,.28),
    0 6px 18px rgba(183,137,52,.44),
    inset 0 1px 0 rgba(255,255,255,.34),
    inset 0 -1px 0 rgba(0,0,0,.12);
}

.ai-run-btn { min-width: 180px; }
.ai-run-btn:disabled { opacity: .72; cursor: not-allowed; }

@keyframes spin { to { transform: rotate(360deg); } }
.ai-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

@keyframes pulse-ring {
  0%   { transform: scale(.85); opacity: .6; }
  50%  { transform: scale(1.12); opacity: .18; }
  100% { transform: scale(.85); opacity: .6; }
}
.ai-pulse-wrap { display: flex; align-items: center; justify-content: center; height: 56px; }
.ai-pulse {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--accent-soft);
  border: 2px solid rgba(183,137,52,.35);
  animation: pulse-ring 1.4s ease-in-out infinite;
  position: relative;
}
.ai-pulse::after {
  content: "✦";
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-lg); color: var(--accent);
}

.ai-error {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: var(--r-control);
  border: 1px solid rgba(173,52,52,.28);
  background: rgba(173,52,52,.08);
  color: var(--bad);
  font-size: var(--text-sm);
  font-weight: 600;
}

.ai-result-grid {
  display: grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 14px;
}
@media (max-width: 760px) { .ai-result-grid { grid-template-columns: 1fr; } }

.ai-verdict-card { border-color: rgba(82,54,18,.17); }
.ai-verdict-main { margin-top: 10px; }

.ai-fit-rows { display: grid; gap: 0; margin-top: 10px; }
.ai-fit-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.ai-fit-row:last-child { border-bottom: none; }
.ai-fit-row--stacked { flex-direction: column; align-items: flex-start; }

.ai-fit-label, .ai-meta-label {
  font-size: var(--text-xs); font-weight: 700; letter-spacing: .10em;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}

.ai-fit-val { font-size: var(--text-sm); color: var(--text); line-height: var(--lh-base); }

.ai-meta-row {
  display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.ai-meta-row:last-child { border-bottom: none; }
.ai-meta-row--stacked { flex-direction: column; align-items: flex-start; }

.ai-meta-label { white-space: nowrap; }
.ai-meta-val {
  font-size: var(--text-sm); font-weight: 600; color: var(--text);
  text-align: right; line-height: var(--lh-base);
}
.ai-meta-row--stacked .ai-meta-val { text-align: left; font-weight: 400; margin-top: 4px; }
/* ══════════════════════════════════════════
   VIEW TRANSITION (crossfade between tabs)
   ══════════════════════════════════════════ */
@keyframes viewIn {
  from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
  to   { opacity: 1; transform: translateY(0);   filter: blur(0);   }
}

.view-content {
  animation: viewIn .34s cubic-bezier(.22,1,.36,1) both;
}

/* ══════════════════════════════════════════
   PRESSED STATES (stronger, more physical)
   ══════════════════════════════════════════ */
button:active, .tab:active, .listbtn:active, .ios-row:active {
  transform: scale(.985) !important;
  opacity: .94;
  transition: transform .12s ease, opacity .12s ease !important;
}

/* ══════════════════════════════════════════
   DARK MODE DEPTH
   ══════════════════════════════════════════ */
:root[data-theme="dark"] body {
  background:
    radial-gradient(650px 240px at 50% -5%, rgba(183,137,52,.10), transparent 55%),
    radial-gradient(500px 380px at 85% 70%, rgba(183,137,52,.05), transparent 65%),
    radial-gradient(400px 300px at 15% 80%, rgba(40,28,12,.6), transparent 70%),
    linear-gradient(160deg, #110f0c 0%, #141008 50%, #0e0c08 100%) !important;
}

:root[data-theme="dark"] .card,
:root[data-theme="dark"] .stat,
:root[data-theme="dark"] .iconstat,
:root[data-theme="dark"] .listbtn,
:root[data-theme="dark"] .shelf-card {
  background: linear-gradient(160deg,
    rgba(255,235,175,.045),
    rgba(255,220,140,.022)
  ) !important;
  border-color: rgba(220,185,120,.08) !important;
}

:root[data-theme="dark"] .card::after {
  background: linear-gradient(90deg, transparent 5%, rgba(255,220,140,.07) 50%, transparent 95%);
}

:root[data-theme="dark"] .sheety {
  background: rgba(10,8,5,.50);
  border-color: rgba(220,185,120,.07);
}

/* ══════════════════════════════════════════
   ANIMATED BAR CHART FILLS
   ══════════════════════════════════════════ */
@keyframes barGrow {
  from { width: 0 !important; }
}

.bar-fill {
  animation: barGrow .55s cubic-bezier(.22,1,.36,1) both;
}

/* Stagger each bar */
.bar-row:nth-child(1) .bar-fill { animation-delay: .05s; }
.bar-row:nth-child(2) .bar-fill { animation-delay: .10s; }
.bar-row:nth-child(3) .bar-fill { animation-delay: .15s; }
.bar-row:nth-child(4) .bar-fill { animation-delay: .20s; }
.bar-row:nth-child(5) .bar-fill { animation-delay: .25s; }
.bar-row:nth-child(6) .bar-fill { animation-delay: .30s; }

/* ══════════════════════════════════════════
   SVG BRANDMARK
   ══════════════════════════════════════════ */
.brandmark svg {
  width: 28px;
  height: 28px;
  display: block;
}

/* ══════════════════════════════════════════
   HOME HERO CTA
   ══════════════════════════════════════════ */
.home-hero-cta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 18px 24px;
  border-radius: 22px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 48%, var(--accent-strong) 100%);
  color: #1a0e02;
  font-weight: 700;
  font-size: var(--text-base);
  letter-spacing: .08em;
  text-transform: uppercase;
  border: none;
  box-shadow:
    0 2px 6px rgba(60,38,10,.18),
    0 12px 28px rgba(183,137,52,.32),
    inset 0 1px 0 rgba(255,255,255,.40);
  width: 100%;
  justify-content: center;
  transition: transform .18s ease, box-shadow .18s ease;
}

.home-hero-cta:hover {
  transform: translateY(-1px);
  box-shadow:
    0 2px 6px rgba(60,38,10,.18),
    0 18px 38px rgba(183,137,52,.52),
    inset 0 1px 0 rgba(255,255,255,.34);
}

.home-hero-cta-ico { font-size: var(--text-lg); line-height: 1; }


.frag-hero::before,
.brand::after {
  content: "";
  position: absolute;
  left: 18px;
  right: 18px;
  top: 0;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, #c9a050, transparent);
  opacity: .92;
  pointer-events: none;
}

input, select, textarea {
  border: 1px solid rgba(82,54,18,.16);
  background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.60));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.52), 0 1px 2px rgba(48,30,8,.03);
}

:root[data-theme="dark"] input,
:root[data-theme="dark"] select,
:root[data-theme="dark"] textarea {
  background: linear-gradient(180deg, rgba(42,34,24,.92), rgba(31,25,18,.92));
}

.home-hero-cta {
  position: relative;
  overflow: hidden;
}

/* .home-hero-cta::after removed — was overlapping text */

.frag-chip-row,
.ios-row-meta {
  row-gap: 4px;
}

.frag-chip-row .frag-chip:nth-child(n+5),
.ios-row-meta .pill:nth-child(n+5) {
  opacity: .72;
}

.kicker {
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: .24em;
}

.section-desc, .section-subtitle, .mini-note, .acc-desc, .muted, .subtle {
  color: #5e5040;
}

/* Journal score dot press animation */
.journal-dot:active {
  transform: scale(0.82) !important;
  opacity: .85;
  transition: transform .08s ease, opacity .08s ease !important;
}
.journal-dot.active {
  transform: scale(1.08);
}

/* ══════════════════════════════════════════
   SOTD CARD
   ══════════════════════════════════════════ */
.sotd-canvas-wrap {
  border-radius: var(--r-inner);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  background: var(--panel);
}

.sotd-preview {
  width: 100%;
  max-width: 380px;
  display: block;
  border-radius: 18px;
}

.sotd-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

/* ══════════════════════════════════════════
   COST PER WEAR
   ══════════════════════════════════════════ */
.cpw-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) 52px 64px;
  gap: 10px;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}

.cpw-row:last-child { border-bottom: none; }
.cpw-name { font-size: var(--text-sm); font-weight: 600; line-height: 1.2; }
.cpw-wears { font-size: var(--text-sm); color: var(--muted); text-align: right; }
.cpw-cost {
  font-size: var(--text-sm);
  font-weight: 700;
  text-align: right;
  color: var(--accent);
}
.cpw-cost.no-price { color: var(--muted); font-weight: 400; font-size: var(--text-sm); }

/* Price input grid */
.price-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.price-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: var(--r-control);
  border: 1px solid var(--border);
  background: var(--panel2);
}

.price-row label {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0;
  text-transform: none;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.price-row input {
  width: 72px;
  min-height: 34px;
  padding: 6px 8px;
  font-size: var(--text-sm);
  flex-shrink: 0;
  border-radius: 10px;
}

/* ══════════════════════════════════════════
   JOURNAL TAB (replaces "More" label)
   ══════════════════════════════════════════ */
.journal-subnav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 5px;
  border-radius: var(--r-inner);
  background: var(--panel-inset);
  border: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  margin-top: 8px;
}

:root[data-theme="dark"] .journal-subnav {
  background: var(--panel-inset);
}

.journal-subnav::-webkit-scrollbar { display: none; }

.journal-subnav button {
  flex: 0 0 auto;
  min-height: 36px;
  border-radius: var(--r-control);
  font-size: var(--text-sm);
  font-weight: 600;
  padding: 0 14px;
  box-shadow: none;
  background: transparent;
  border-color: transparent;
  white-space: nowrap;
}

.journal-subnav button.active {
  background: var(--panel-strong);
  color: var(--accent);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

/* === Collection approval pass === */
.collection-summary-strip{
  display:grid;
  grid-template-columns:repeat(5, minmax(0,1fr));
  gap:10px;
  margin-top:14px;
}
.collection-summary-chip{
  padding:12px 12px 10px;
  border-radius:18px;
  border:1px solid rgba(82,54,18,.13);
  background:linear-gradient(180deg, rgba(255,255,255,.22), transparent 62%), var(--panel-inset);
  box-shadow: var(--shadow-sm);
}
.collection-summary-chip .label{
  font-size:var(--text-xs);
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:800;
}
.collection-summary-chip .value{
  margin-top:6px;
  font-family:'Cormorant Garamond', serif;
  font-size:var(--text-xl);
  font-weight:700;
  line-height:1;
}

.collection-mode-intro{
  margin-top:14px;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(82,54,18,.13);
  background:linear-gradient(180deg, rgba(183,137,52,.05), transparent 56%), var(--panel);
}
.collection-mode-intro .title{
  font-family:'Cormorant Garamond', serif;
  font-size:1.15rem;
  font-weight:700;
  letter-spacing:-.02em;
}
.collection-mode-intro .copy{
  margin-top:4px;
  color:var(--muted);
  font-size:var(--text-sm);
  line-height:1.45;
}

.collection-fragrance-card{
  grid-template-columns:minmax(0,1.2fr) minmax(0,.95fr) minmax(0,1.1fr);
  gap:10px;
}
.collection-fragrance-card .cf-block:last-child{
  display:none;
}
.collection-fragrance-card .cf-name{
  font-size:1rem;
}
.collection-fragrance-card .cf-house,
.collection-fragrance-card .cf-meta{
  font-size:var(--text-sm);
  line-height:1.4;
}
.collection-fragrance-card .cf-value{
  font-size:var(--text-sm);
  line-height:1.4;
}

.collection-manage-shell .card,
.collection-manage-shell .sheety{
  margin-top:14px !important;
}
.collection-manage-shell .section-desc{

}
.collection-manage-shell .row button{
  min-height:40px;
}

.collection-admin-card{
  border:1px solid rgba(82,54,18,.10);
  background:linear-gradient(180deg, rgba(255,255,255,.14), transparent 50%), var(--panel);
}
.collection-admin-card .kicker{

}
.collection-admin-collapse{

}
.collection-admin-collapse.open{
  display:block;
}

.collection-admin-toggle{
  min-height:38px;
  padding:0 14px;
}

@media (max-width: 760px){
  .collection-summary-strip{
    grid-template-columns:repeat(2, minmax(0,1fr));
  }
  .collection-fragrance-card{
    grid-template-columns:1fr;
    gap:8px;
  }
  .collection-fragrance-card .cf-block{
    display:block !important;
  }
  .collection-fragrance-card .cf-block:last-child{
    display:block;
  }
}


/* === 1-10 refinement pass === */
.wear-summary-strip{

}
.wear-summary-chip{

.wear-summary-chip .value{

.explain-chip .sym{ color:var(--accent); }

.more-tool-grid{

.recent-maint-grid{

.collection-fragrance-card .cf-chiprow{

.collection-fragrance-card .cf-chiprow .pill:nth-child(n+3){

}
.manage-compress-shell .card,
.manage-compress-shell .sheety{

.detail-info-card .label{

/* === tiny build/version label pass === */

}
.build-version-line .sep{
