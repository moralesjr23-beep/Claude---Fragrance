const TAB_ORDER = ["Home", "Collection", "Wear Today", "Layering", "Display",
  "Buy or Skip", "Hobby Lab", "AI Analyzer", "SOTD", "Cost Per Wear"];
const PRIMARY_TAB_ORDER = ["Home", "Collection", "Wear Today", "Layering", "More"];

function getPrimaryTab(view) {
  if (view === "Home") return "Home";
  if (view === "Collection") return "Collection";
  if (["Wear Today"].includes(view)) return "Wear Today";
  if (["Layering"].includes(view)) return "Layering";
  return "More";
}

function getViewAnimClass(newView, prevView) {
  const newPrimary = getPrimaryTab(newView);
  const prevPrimary = getPrimaryTab(prevView);
  if (newPrimary === prevPrimary) return "view-anim-fade";
  const ni = PRIMARY_TAB_ORDER.indexOf(newPrimary);
  const pi = PRIMARY_TAB_ORDER.indexOf(prevPrimary);
  return ni > pi ? "view-anim-forward" : "view-anim-back";
}

function navigateToView(v){
  syncBuyDraftFromDOM();
  state._prevView = state.view;
  if (v === "Wear") state.view = "Wear Today";
  else if (v === "Layer") state.view = "Layering";
  else if (v === "More") state.view = getCurrentMoreSection();
  else if (v === "Collection") state.view = "Collection";
  else if (v === "Home") state.view = "Home";
  else state.view = v;
  if (getMoreSections().includes(state.view)) state.lastMoreSection = state.view;
  render();
  // Scroll to top on view change
  try { document.querySelector(".app")?.scrollTo({top:0, behavior:"instant"}); } catch(_){}
}

function updateJournalPhotoPreview(value){
  const wrap = document.getElementById("journalPhotoPreviewWrap");
  const img = document.getElementById("journalPhotoPreview");
  const err = document.getElementById("journalPhotoPreviewError");
  if (!wrap || !img || !err) return;

  const url = String(value || "").trim();
  if (!url){
    wrap.classList.add("hidden");
    img.removeAttribute("src");
    err.classList.add("hidden");
    return;
  }

  wrap.classList.remove("hidden");
  err.classList.add("hidden");
  img.src = url;

  img.onload = () => {
    wrap.classList.remove("hidden");
    err.classList.add("hidden");
  };
  img.onerror = () => {
    wrap.classList.remove("hidden");
    err.classList.remove("hidden");
  };
}

function getElementsById(id){

function bindValue(id, fn){

  els.forEach(el=>{

  });
}
function bindClickAll(id, handler){

function bindEvents(){
  // ── Keyboard dismiss on tap-outside (iPad fix) ─────────────────────────────
  if (!window.__vaultKeyboardDismissBound){
    document.addEventListener("touchstart", (e)=>{
      const el = e.target;
      const isInput = el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.tagName === "SELECT";
      if (!isInput && document.activeElement && (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA")){
        document.activeElement.blur();
      }
    }, {passive: true});
    window.__vaultKeyboardDismissBound = true;
  }

  // ── Toast Undo button (delegated, registered once) ─────────────────────────
  if (!window.__vaultToastActionBound){
    document.addEventListener("click", (e)=>{
      const btn = e.target.closest("[data-toast-action]");
      if (!btn) return;
      e.preventDefault();
      const toastId = btn.dataset.toastAction;
      const toast = (state.toasts||[]).find(t => t.id === toastId);
      const actionFn = toast && toast.action && toast.action.fn;
      if (state._toastTimers && state._toastTimers[toastId]){
        clearTimeout(state._toastTimers[toastId]);
        delete state._toastTimers[toastId];
      }
      state.toasts = (state.toasts||[]).filter(t => t.id !== toastId);
      if (actionFn === "undoLastDelete") undoLastDelete();
      else render();
    });

  if (sheetRunAnalyzerBtn) sheetRunAnalyzerBtn.onclick = ()=>{
    const nameEl  = document.getElementById("newFragranceName");
    const houseEl = document.getElementById("newFragranceHouse");
    const notesEl = document.getElementById("sheetAiAnalyzerNotes") || document.getElementById("aiAnalyzerNotes");
    if (nameEl)  { state.aiAnalyzer.name  = nameEl.value.trim();  state.newFragrance.name  = nameEl.value.trim(); }
    if (houseEl) { state.aiAnalyzer.house = houseEl.value.trim(); state.newFragrance.house = houseEl.value.trim(); }
    if (notesEl) { state.aiAnalyzer.notes = notesEl.value.trim(); }
    if (!state.aiAnalyzer.name){ pushToast("Enter a fragrance name first","error"); return; }
    runAIAnalyzer();
  };

  const aiClearBtn = document.getElementById("aiClearResult");
  if (aiClearBtn) aiClearBtn.onclick = ()=>{
    state.aiAnalyzer.result = null;
    state.aiAnalyzer.error = "";
    state.newFragrance = {house:"",name:"",inspiration:"",dna:"",occasions:"Casual",season:"Year-round",rating:"4"};
    render();
  };

  const aiAddBtn = document.getElementById("aiAddToCollection");
  if (aiAddBtn) aiAddBtn.onclick = ()=>{
    state.view = "Collection";
    state.collectionSubview = "Manage";
    state.expandedSections.collectionAdd = true;
    render();
    setTimeout(()=>{ const el=document.getElementById("openAddFragranceSheet"); if(el) el.click(); }, 100);
  };

  // API key management
  ["toggleApiKeyInputOpen","toggleApiKeyInputClose"].forEach(id=>{
    const btn = document.getElementById(id);
    if (btn) btn.onclick = ()=>{
      state.aiAnalyzer.showKeyInput = !state.aiAnalyzer.showKeyInput;
      render();
    };
  });

  const saveApiKey = document.getElementById("saveApiKey");
  if (saveApiKey) saveApiKey.onclick = ()=>{
    const input = document.getElementById("apiKeyInput");
    const val = (input ? input.value : "").trim();
    if (val && !val.startsWith("sk-ant-")){
      pushToast("That doesn't look like an Anthropic key (should start with sk-ant-)","error");
      return;
    }
    state.apiKey = val;
    localStorage.setItem(API_KEY_KEY, val ? _vaultObfuscate(val) : "");
    state.aiAnalyzer.showKeyInput = false;
    haptic("medium");
    pushToast(val ? "API key saved ✦ Claude AI mode active" : "Key removed", "success");
    render();
  };

  const clearApiKey = document.getElementById("clearApiKey");
  if (clearApiKey) clearApiKey.onclick = ()=>{
    state.apiKey = "";
    localStorage.removeItem(API_KEY_KEY);
    state.aiAnalyzer.showKeyInput = false;
    pushToast("API key removed", "warn");
    render();
  };

  // Wear log search/filter — debounced
  const wearLogSearchEl = document.getElementById("wearLogSearch");
  if (wearLogSearchEl){
    wearLogSearchEl.oninput = (e)=>{
      state.wearLogSearch = e.target.value;
      clearTimeout(window._wearSearchDebounce);
      window._wearSearchDebounce = setTimeout(()=>render(), 120);
    };
  }
  const wearLogOccEl = document.getElementById("wearLogOccFilter");
  if (wearLogOccEl){
    wearLogOccEl.onchange = (e)=>{
      state.wearLogOccFilter = e.target.value;
      clearTimeout(window._wearOccDebounce);
      window._wearOccDebounce = setTimeout(()=>render(), 120);
    };
  }

  // SOTD bindings
  bindValue("sotdFrag", v=>{ state.sotdFrag=v; setTimeout(renderSOTDCanvas,50); });
  bindValue("sotdOccasion", v=>{ state.sotdOccasion=v; state.sotdSprays=""; render(); setTimeout(renderSOTDCanvas,50); });
  bindValue("sotdSprays", v=>{ state.sotdSprays=v; setTimeout(renderSOTDCanvas,50); });
  bindValue("sotdMood", v=>{ state.sotdMood=v; setTimeout(renderSOTDCanvas,50); });
  bindValue("sotdNote", v=>{ state.sotdNote=v; setTimeout(renderSOTDCanvas,50); });

  const sotdLogWear = document.getElementById("sotdLogWear");
  if (sotdLogWear) sotdLogWear.onclick = ()=>{
    const f = getFragranceByKey(state.sotdFrag);
    if (!f) return;
    state.wearLog.unshift({
      date: new Date().toISOString().slice(0,10),
      fragranceKey: getFragranceKey(f),
      fragrance: f.n,
      house: f.h,
      amount: state.sotdSprays || getSprayAdvice(f, state.sotdOccasion||"Casual"),
      occasion: state.sotdOccasion || "Casual",
      notes: [state.sotdMood, state.sotdNote].filter(Boolean).join(" · ")
    });
    saveWearLog();
    rememberRecommendations("wear", [f]);
    haptic("medium");
    pushToast("Wear logged ✦", "success");
    render();
  };

  const sotdDownload = document.getElementById("sotdDownload");
  if (sotdDownload) sotdDownload.onclick = ()=>{
    renderSOTDCanvas();
    setTimeout(()=>{
      const canvas = document.getElementById("sotdCanvas");
      if (!canvas) return;
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `SOTD-${getFragranceNameByKey(state.sotdFrag||"vault").replace(/\s+/g,"-")}-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
      haptic("light");
      pushToast("Card saved", "success");
    }, 80);
  };

  const sotdCopyCard = document.getElementById("sotdCopyCard");
  if (sotdCopyCard) sotdCopyCard.onclick = ()=>{
    const f = getFragranceByKey(state.sotdFrag);
    if (!f) return;
    const dna = displayDNAList(f).slice(0,4).join(", ");
    const txt = [
      `✦ SOTD: ${f.n}`,
      `House: ${f.h}`,
      `DNA: ${dna}`,
      `Occasion: ${state.sotdOccasion||"Casual"}`,
      state.sotdSprays ? `Sprays: ${state.sotdSprays}` : "",
      state.sotdMood ? `Mood: ${state.sotdMood}` : "",
      state.sotdNote ? `"${state.sotdNote}"` : "",
      `Date: ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}`
    ].filter(Boolean).join("\n");
    navigator.clipboard && navigator.clipboard.writeText(txt).then(()=>{ haptic("light"); pushToast("Copied to clipboard","success"); });
  };

  // Cost Per Wear sort
  bindValue("cpwSort", v=>{ state.cpwSort=v; render(); });
  bindValue("cpwHouseFilter", v=>{ state.cpwHouseFilter=v; render(); });
  const cpwSearchEl = document.getElementById("cpwSearch");
  if (cpwSearchEl){
    cpwSearchEl.oninput = (e)=>{
      state.cpwSearch = e.target.value;
      clearTimeout(window._cpwSearchDebounce);
      window._cpwSearchDebounce = setTimeout(()=>render(), 120);
    };
  }

  // Cost Per Wear — price input bindings (delegated)
  document.querySelectorAll(".price-input").forEach(inp => {
    inp.onchange = ()=>{
      const fragKey = normalizeFragranceKey(inp.dataset.frag);
      const val = inp.value.trim();
      state.prices = state.prices || {};
      if (fragKey && val && !isNaN(Number(val))) state.prices[fragKey] = Number(val);
      else if (fragKey) delete state.prices[fragKey];
      savePrices();
      render();
    };
  });

  // ── Swipe-to-dismiss sheet ─────────────────────────────────────────────────
  (()=>{
    const sheet = document.querySelector(".sheet");
    if (!sheet) return;
    if (sheet.__vaultSwipeHandlers) {
      sheet.removeEventListener("touchstart", sheet.__vaultSwipeHandlers.start);
      sheet.removeEventListener("touchmove",  sheet.__vaultSwipeHandlers.move);
      sheet.removeEventListener("touchend",   sheet.__vaultSwipeHandlers.end);
    }
    let startY = 0, currentY = 0, dragging = false;
    const onStart = (e)=>{
      if (sheet.scrollTop > 0) return;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      currentY = startY;
      dragging = true;
      sheet.style.transition = "none";
    };
    const onMove = (e)=>{
      if (!dragging) return;
      currentY = e.touches ? e.touches[0].clientY : e.clientY;
      const dy = Math.max(0, currentY - startY);
      sheet.style.transform = `translateY(${dy}px)`;
    };
    const onEnd = ()=>{
      if (!dragging) return;
      dragging = false;
      const dy = currentY - startY;
      sheet.style.transition = "";
      if (dy > 100){
        sheet.style.transform = `translateY(100%)`;
        setTimeout(()=>{ closeSheet(); render(); }, 280);
      } else {
        sheet.style.transform = "";
      }
    };
    sheet.__vaultSwipeHandlers = { start: onStart, move: onMove, end: onEnd };
    sheet.addEventListener("touchstart", onStart, {passive:true});
    sheet.addEventListener("touchmove",  onMove,  {passive:true});
    sheet.addEventListener("touchend",   onEnd,   {passive:true});

})();
}

window.__vaultNav = function(v){
  syncBuyDraftFromDOM();
  if (v === "Wear") state.view = "Wear Today";
  else if (v === "Layer") state.view = "Layering";
  else if (v === "More") state.view = getCurrentMoreSection();
  else if (v === "Collection") state.view = "Collection";
  else if (v === "Home") state.view = "Home";
  else state.view = v;
  if (getMoreSections().includes(state.view)) state.lastMoreSection = state.view;
  render();
  // Scroll to top on view change
  try { document.querySelector(".app")?.scrollTo({top:0, behavior:"instant"}); } catch(_){}
};

async function loadWeather(){
  state.weather={loading:true,error:"",temp:null,code:null,wind:null,humidity:null,city:state.weatherPref.mode==="manual"?(state.weatherPref.city||"Manual city"):"Your area"};
  render();
  state.weather=await fetchWeather(state.weatherPref);
  render();
}
if (!state.sotdFrag && getAllCollection().length) state.sotdFrag = getFragranceKey(getAllCollection()[0]);
function bootVault(){
  try{
    render();
    setTimeout(function(){
      try { loadWeather(); } catch(inner){ if(window.__vaultShowBootError) window.__vaultShowBootError(inner && (inner.stack || inner.message) ? (inner.stack || inner.message) : String(inner)); }
    }, 0);

    // Keyboard avoidance
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        var focused = document.activeElement;
        if (focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA' || focused.tagName === 'SELECT')) {
          setTimeout(function() { focused.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 80);
        }
      });
    }

    // Sheet drag-to-close
    if (!window.__vaultSheetDragBound) {
      window.__vaultSheetDragBound = true;
      var _sdStart = null, _sdEl = null, _sdScrolled = false;
      document.addEventListener('touchstart', function(e) {
        var sheet = e.target.closest('.sheet');
        if (!sheet) return;
        var rect = sheet.getBoundingClientRect();
        if (e.touches[0].clientY - rect.top > 72) return;
        _sdStart = e.touches[0].clientY; _sdEl = sheet; _sdScrolled = false;
      }, { passive: true });
      document.addEventListener('touchmove', function(e) {
        if (!_sdEl || _sdStart === null) return;
        var delta = e.touches[0].clientY - _sdStart;
        if (delta > 8 && !_sdScrolled) {
          _sdEl.style.transform = 'translateY(' + Math.max(0, delta) + 'px)';
          _sdEl.style.transition = 'none';
        }
      }, { passive: true });
      document.addEventListener('touchend', function(e) {
        if (!_sdEl) return;
        var delta = e.changedTouches[0].clientY - _sdStart;
        _sdEl.style.transition = '';
        if (delta > 90) {
          _sdEl.style.transform = 'translateY(110%)';
          var el = _sdEl; _sdEl = null; _sdStart = null;
          setTimeout(function() {
            var btn = el.querySelector('[id^="closeSheet"],[id^="toggleApiKeyInputClose"],[id^="toggleSheet"]');
            if (btn) btn.click();
            else { document.body.classList.remove('sheet-open'); if (el.parentNode) el.parentNode.removeChild(el); }
            el.style.transform = '';
          }, 300);
        } else {
          _sdEl.style.transform = '';
          _sdEl = null; _sdStart = null;
        }
      }, { passive: true });
    }

    // localStorage quota guard
    if (!window.__vaultStorageGuardBound) {
      window.__vaultStorageGuardBound = true;
      function checkStorageQuota() {
        try {
          var total = 0;
          for (var k in localStorage) {
            if (Object.prototype.hasOwnProperty.call(localStorage, k)) total += (localStorage.getItem(k) || '').length * 2;
          }
          var pct = total / (5 * 1024 * 1024);
          if (pct > 0.80 && !window.__vaultStorageWarnShown) {
            window.__vaultStorageWarnShown = true;
            pushToast('Storage ' + Math.round(pct * 100) + '% full — export a backup soon.', 'warn');
          }
        } catch(_){}
      }
      setTimeout(checkStorageQuota, 2500);
    }

    // Safe localStorage write with quota catch
    var _origSetItem = Storage.prototype.setItem;
    Storage.prototype.setItem = function(k, v) {
      try { _origSetItem.call(this, k, v); }
      catch(e) {
        if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
          pushToast('Storage full — please export a backup and clear some data.', 'error');
        }
      }
    };

    // Error boundary around render
    if (!window.__vaultErrorBoundaryBound) {
      window.__vaultErrorBoundaryBound = true;
      var _origRender = render;
      render = function() {
        try {
          return _origRender.apply(this, arguments);
        } catch(e) {
          console.error('[Vault] render error:', e);
          var banner = document.getElementById('__vaultInlineErr');
          if (!banner) {
            banner = document.createElement('div');
            banner.id = '__vaultInlineErr';
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;padding:14px 18px;background:#8f1c1c;color:#fff;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.4)';
            var msg = (e && e.message ? e.message : String(e)).slice(0, 100);
            banner.innerHTML = '<span>⚠ ' + msg + '</span><button onclick="var b=document.getElementById(\'__vaultInlineErr\');if(b)b.remove();try{_origRender();}catch(x){}" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;min-height:32px">Retry</button>';
            document.body.appendChild(banner);
          }
        }
      };
    }

  }catch(e){
    if(window.__vaultShowBootError) window.__vaultShowBootError(e && (e.stack || e.message) ? (e.stack || e.message) : String(e));
    throw e;
  }
}
if (!window.__vaultTestMode) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootVault, { once:true });
  } else {
    bootVault();
  }
}
// Signal test runner that app is ready (and expose test surface)
try { window.parent.postMessage('vault:ready', '*'); } catch(_) {}

// ── Vault test surface (depth=0, always runs) ─────────────────────────────
window.__vault = {
  esc, safeArray, safeLocalStorageJSON, clampScore, roundScore,
  getAllCollection, getFavoriteItems, getFragranceKey, getFragranceByKey,
  getNormalizedScoreModel, getWearExplainability, scoreDisplay,
  scoreOccasionAlignment, scoreEnvironmentFit,
  getWearTodayPicks, getNeglectedFragrances, getWearPickLabel, getPlaneSafetyLevel,
  displayDNAList, getWhyWear, getWearTodayReason, getSprayAdvice,
  getLastWornDate, getSeasonLabel, getWeatherLabel,
  simplifyOccasionList, getFragranceFitSummary,
  renderScoreChips, getDashboardCharts, homeView, wearTodayView,
  saveFavorites, state,
};

// ── Service Worker (inline blob — no separate file needed) ──────────────────
if ('serviceWorker' in navigator && !window.__vaultTestMode) {
  const swCode = `
    const CACHE = 'vault-v1';
    const ASSETS = [self.location.href.replace(/sw.*/, '')];
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache =>
          fetch(self.registration.scope).then(r => cache.put(self.registration.scope, r))
        ).catch(()=>{})
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(cached => {
          const fresh = fetch(e.request).then(r => {
            if (r.ok) caches.open(CACHE).then(c=>c.put(e.request,r.clone()));
            return r;
          }).catch(()=>cached);
          return cached || fresh;
        })
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'}).catch(()=>{});
}

// Signal that scripts have fully loaded and __vault is ready
window.__vaultScriptsLoaded = true;
try { document.dispatchEvent(new CustomEvent('vault:loaded')); } catch(_) {}
</script>
