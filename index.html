function isoEListHTML(){
  let list=isoEAllFrags();
  // Apply tab filter
  const tab=state.isoE.tab;
  if(tab==='favs')list=list.filter(isoEIsFav).filter(f=>!isoEIsHidden(f));
  else if(tab==='distinct')list=list.filter(f=>(f.fl||'').includes('DISTINCT')).filter(f=>!isoEIsHidden(f));
  else if(tab==='caution')list=list.filter(f=>isoEIsTrueCaution(f)||isoEScore(f)<=4).filter(f=>!isoEIsHidden(f));
  else if(tab==='watch')list=list.filter(f=>['OVERLAP','NEAR DUP','EXACT DUP','MUTED'].some(x=>(f.fl||'').includes(x))&&!isoEIsTrueCaution(f)&&isoEScore(f)>4).filter(f=>!isoEIsHidden(f));
  else if(tab==='hidden')list=list.filter(isoEIsHidden);
  else if(tab==='trash'){
    const deleted=new Set(state.isoE.deleted);
    list=state.collection.map(isoEEnrich).filter(f=>deleted.has(isoEKey(f)));
  }
  else list=list.filter(f=>!isoEIsHidden(f));
  // Search
  if(state.isoE.search){
    const q=state.isoE.search.toLowerCase();
    list=list.filter(f=>[f.n,f.h,f.ib,f.dna,(f.fam||[]).join(' ')].join(' ').toLowerCase().includes(q))
  }
  // Sort
  if(state.isoE.sort==='score'){list.sort((a,b)=>isoEScore(b)-isoEScore(a))}
  else if(state.isoE.sort==='name'){list.sort((a,b)=>a.n.localeCompare(b.n))}
  else if(state.isoE.sort==='sprays'){list.sort((a,b)=>(a.sp||2)-(b.sp||2))}
  if(!list.length)return `<div class="card empty">No fragrances match this filter.</div>`;
  // House grouping
  if(state.isoE.sort==='house'){
    const groups={};list.forEach(f=>(groups[f.h]=groups[f.h]||[]).push(f));
    return Object.keys(groups).sort().map(h=>{
      const isDefaultCollapsed=!state.isoE.search&&state.isoE.tab==='all';
      const openHouses=Array.isArray(state.isoE.openHouses)?state.isoE.openHouses:[];
      const collapsed=isDefaultCollapsed?!openHouses.includes(h):false;
      const entries=groups[h];
      const houseAvg=entries.length?(entries.reduce((s,f)=>s+isoEScore(f),0)/entries.length).toFixed(1):'—';
      return `<div class="isoe-house">
        <button class="isoe-house-h" data-action="isoeCollapseHouse" data-house="${esc(h)}">
          <span class="isoe-collapse-tri">${collapsed?'+':'−'}</span>
          <b>${esc(h)}</b><span class="small">${entries.length}</span>
          <span class="isoe-house-avg ${parseFloat(houseAvg)>=8?'high':parseFloat(houseAvg)<=4?'low':''}">avg ${houseAvg}</span>
        </button>
        ${collapsed?'':`<div class="isoe-cards">${entries.map(isoECard).join('')}</div>`}
      </div>`
    }).join('')
  }
  return `<div class="isoe-cards">${list.map(isoECard).join('')}</div>`
}
function isoECard(f){
  const sc=isoEScore(f);
  const adj=isoEWxAdj(f,state.weather);
  const scClass=sc>=8?'high':sc<=4?'low':'';
  const tier=isoETier(sc);
  const trueCaution=isoEIsTrueCaution(f)||sc<=4;
  const fav=isoEIsFav(f);
  const inTrash=state.isoE.tab==='trash';
  const inHidden=state.isoE.tab==='hidden';
  const breakdown=isoEScoreBreakdown(f);
  return `<div class="isoe-card ${f._inferred?'inferred':''}">
    <div class="isoe-card-head">
      <div style="flex:1;min-width:0">
        <div class="row" style="gap:6px;flex-wrap:wrap"><span class="isoe-flag ${trueCaution?'caution':tier.cls==='pass'?'distinct':''}">${trueCaution?'CAUTION':esc(tier.label)}</span>${(f.fl||'').split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="isoe-flag ${t.replace(/[^a-z]/gi,'').toLowerCase()}">${esc(t)}</span>`).join('')}${f._inferred?'<span class="isoe-flag inferred">INFERRED</span>':''}</div>
        <h4 style="margin:6px 0 2px;font-size:16px">${esc(f.n)}</h4>
        <p class="small" style="margin:0">${esc(f.h)}${f.ib?' · '+esc(f.ib):''}</p>
      </div>
      <button class="isoe-score-pill ${scClass}" data-action="isoeScoreInfo" data-n="${esc(f.n)}" data-h="${esc(f.h)}" title="Tap for breakdown">
        <span class="isoe-score-num">${sc}</span>
        ${adj!==0?`<span class="isoe-score-delta">${adj>0?'+':''}${adj}</span>`:''}
      </button>
    </div>
    ${!inHidden&&!inTrash?`<div class="isoe-card-actions">
      <button class="isoe-act-btn ${fav?'on':''}" data-action="isoeFav" data-n="${esc(f.n)}" data-h="${esc(f.h)}">${fav?'★ Faved':'☆ Fav'}</button>
      <button class="isoe-act-btn" data-action="isoeHide" data-n="${esc(f.n)}" data-h="${esc(f.h)}">Hide</button>
      <button class="isoe-act-btn danger" data-action="isoeDelete" data-n="${esc(f.n)}" data-h="${esc(f.h)}">Trash</button>
    </div>`:`<div class="isoe-card-actions"><button class="isoe-act-btn" data-action="isoeRestore" data-n="${esc(f.n)}" data-h="${esc(f.h)}">↺ Restore</button></div>`}
    <details class="isoe-details">
      <summary>Procedure & breakdown</summary>
      <div class="isoe-procedure">
        <p><b>Iso E Super first</b> — ${f.sp||2} sprays on ${esc(f.w||'chest')}, let dry 30 sec.</p>
        <p><b>Then ${esc(f.n)}</b> — your normal application on top.</p>
        ${f.dna?`<p class="sub" style="margin-top:6px"><b>DNA:</b> ${esc(f.dna)}</p>`:''}
        ${f.b&&f.b!=='—'?(()=>{const bs=isoEParseBenefits(f.b);return bs.length?`<div class="isoe-benefits-block"><p class="sub" style="margin:8px 0 4px;font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--accent2);text-transform:uppercase">What Iso E does for this bottle</p>${bs.map(b=>`<div class="isoe-benefit"><span class="isoe-benefit-pill ${b.cls}">${esc(b.label)}</span><span class="isoe-benefit-desc">${esc(b.desc)}</span></div>`).join('')}</div>`:''})():f.b==='—'?`<p class="sub" style="margin-top:6px;color:var(--danger)"><b>⚠ No benefit:</b> Iso E may clash with this composition. Test first.</p>`:''}
        ${f.imp?`<p class="sub" style="margin-top:6px;line-height:1.55">${esc(f.imp)}</p>`:''}
      </div>
      <div class="isoe-breakdown">
        <p style="margin:0 0 4px;font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--accent2);text-transform:uppercase">Score breakdown</p>
        <div class="isoe-bd-row"><span>Base</span><b>${breakdown.base}</b></div>
        <div class="isoe-bd-row"><span>Weather</span><b>${breakdown.adj>0?'+':''}${breakdown.adj}</b></div>
        <div class="isoe-bd-row total"><span>Final</span><b>${breakdown.final}</b></div>
        <p class="sub" style="margin:8px 0 0;font-size:11.5px"><i>${esc(breakdown.baseReason)}</i></p>
        <p class="sub" style="margin:4px 0 0;font-size:11.5px"><i>Weather: ${esc(breakdown.wxReason)}</i></p>
      </div>
    </details>
  </div>`
}

on class="btn secondary sm" data-action="syncOccasions">Sync occasion tags</button><button class="btn secondary sm" data-action="loadSourceTruth">Sync source truth</button><button class="btn danger sm" data-action="clear">Clear all data</button></div></div><div class="card"><h3>Privacy</h3><p class="sub">Collection data stays on this device. Weather lookup sends the typed city or device coordinates to Open-Meteo only when you request weather. Google Fonts may load from Google unless hosted locally.</p><p class="small" style="margin-top:10px">Build: ${VERSION}<br>Collection Archive: ${esc(SOURCE_TRUTH.version)} · ${SOURCE_TRUTH.label}</p></div></section>`

function wireInputs(){
  document.querySelectorAll('[data-input="search"]').forEach(i=>i.oninput=e=>A.search({value:e.target.value}));
  document.querySelectorAll('[data-input="city"]').forEach(i=>i.oninput=e=>{state.city=e.target.value; if(state.weather){state.weather.fetchedAt=0;state.weather.stale=true;state.weather.reason='Weather changed — tap Update';} save()});
  document.querySelectorAll('[data-input="isoeSearch"]').forEach(i=>i.oninput=e=>A.isoeSearch({value:e.target.value}));
  document.querySelectorAll('[data-file="fileImport"]').forEach(i=>i.onchange=e=>{A.fileImport({files:e.target.files}); e.target.value=''});
  // Buy eval inputs - just persist, no re-render until Evaluate is tapped
  document.querySelectorAll('[data-input="buyEvalName"]').forEach(i=>i.oninput=e=>{state.buyEval.name=e.target.value;state.buyEval.verdict=null;save()});
  document.querySelectorAll('[data-input="buyEvalInspiration"]').forEach(i=>i.oninput=e=>{state.buyEval.inspiration=e.target.value;state.buyEval.verdict=null;save()});
  document.querySelectorAll('[data-input="buyEvalPrice"]').forEach(i=>i.oninput=e=>{state.buyEval.price=e.target.value;save()});
  // Lab picker search: debounce, re-render when search crosses 2-char threshold (toggles search vs house mode)
  ['labSearchA','labSearchB'].forEach(key=>{
    document.querySelectorAll(`[data-input="${key}"]`).forEach(i=>{
      let t=null;
      i.oninput=e=>{
        const v=e.target.value;
        const prev=state[key]||'';
        const wasMode=prev.trim().length>=2;
        const nowMode=v.trim().length>=2;
        state[key]=v;
        // Only re-render if mode toggled or active search changed
        if(wasMode!==nowMode){
          save();render();
          // Restore focus to the same field after render
          setTimeout(()=>{const f=document.querySelector(`[data-input="${key}"]`);if(f){f.focus();f.setSelectionRange(v.length,v.length)}},0);
        } else if(nowMode){
          // Both before and after are search mode — debounced re-render to refresh result list
          clearTimeout(t);
          t=setTimeout(()=>{save();render();setTimeout(()=>{const f=document.querySelector(`[data-input="${key}"]`);if(f){f.focus();f.setSelectionRange(v.length,v.length)}},0)},250);
        } else {
          save();
        }
      };
    });
  });
}
