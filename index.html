 losing its smoky pineapple signature. The fruity top notes get fixative support from the heavy molecular base. One of the cleanest amplifications because the entire DNA is built around terpenoid wood compounds that Iso E reinforces directly.","sc":8,"se":"Year-round","oc":"Smart casual / office / date","ti":"both"},{"n":"Poseidon's Cologne","h":"Dua Brand","ib":"Creed Aventus Cologne","fl":"JUSTIFIED","v":"YES","b":"AMP, LONG, PROJ, BIND","sp":3,"w":"Neck/chest","dna":"sparkling pineapple grapefruit, ambroxan musk, lighter airy Aventus DNA","fam":["citrus","fruity","musk","woody"],"imp":"Major improvement target. Aventus Cologne is the lighter, sparklier interpretation — the volatile grapefruit-pineapple top dominates with much less base than regular Aventus. Iso E Super's molecular weight (234 g/mol) anchors the bright citrus to skin and creates a sustained projection radius. The ambroxan in the DNA stacks naturally with cedarwood — both synthetic enhancers from the same era. Transforms a 4-hour skin scent into a 6-hour noticeable performer while preserving the bright Aventus DNA character.","sc":7,"se":"Spring/Summer","oc":"Casual / office / outdoors","ti":"day"},{"n":"Chilling By The Pacific","h":"Dua Brand","ib":"LV Pacific Chill","fl":"OVERLAP","v":"YES","b":"BIND, LONG, AMP","sp":3,"w":"Full coverage","dna":"citrus splash, mint, black currant, apricot, fig, cooling musky woods","fam":["citrus","fruity","aromatic","musk"],"imp":"Major improvement target. Same Pacific Chill DNA family as Jean Lowe Vibe — every component is volatile and fast-evaporating. Mint (menthol), citrus terpenes, and fruit esters all benefit from Iso E Super's lipophilic anchor. The cooling musky woods base merges naturally with cedarwood since both are woody compounds. Transforms from a fleeting 2-3 hour spa-fresh experience into a wearable 5-hour fragrance with the same juicy airy character preserved. The musky woods component absorbs the cedarwood without conflict.","sc":7,"se":"Spring/Summer","oc":"Casual / daytime / social","ti":"day"},{"n":"Imperialé Poseidon","h":"Dua Brand","ib":"Creed Aventus × Creed Millesime Imperial","fl":"NEAR DUP","v":"YES","b":"AMP, LONG, BIND","sp":2,"w":"Neck/chest","dna":"bergamot, black currant, apple, pineapple, green mandarin, lemon, iris, birch, patchouli, jasmine, oakmoss, sandalwood, musk, amber, ambergris, vanilla","fam":["fruity","citrus","aquatic","woody","amber","chypre"],"imp":"The woody-aromatic profile combined with the heavier base notes makes this a strong candidate for Iso E layering. The synthetic cedrene character of Iso E reinforces the woody backbone (sandalwood, patchouli, birch) while extending the heavier elements into a longer, more rounded trail. The marine-sweet character from the Millesime Imperial side gains fixative support, and the Aventus pineapple-chypre top notes ride the expanded woody sillage trail. Strong DNA overlap with cedarwood across multiple base notes.","sc":7,"se":"Spring/Summer","oc":"Smart casual / office / date","ti":"day"},{"n":"Poseidon's Invasion","h":"Dua Brand","ib":"Creed Aventus × MDCI Invasion Barbare","fl":"JUSTIFIED","v":"YES","b":"AMP, LONG, PROJ","sp":2,"w":"Neck/chest","dna":"apple, pineapple, bergamot, lavender, violet, birch, black currant, rose, cardamom, vanilla, thyme, musk, patchouli, cedar, oakmoss, ambergris","fam":["fruity","aromatic","fougere","woody","amber"],"imp":"Fougère structure + cedarwood is the foundational pairing in modern perfumery dating to Fougère Royale (1882). Lavender (linalool) and cedarwood are classic partners — the addition reinforces the aromatic-fougère heart directly. The Aventus pineapple-blackcurrant-apple top notes get fixative support. The cedar, patchouli, and oakmoss base notes are all terpenoid compounds from the same molecular family as Iso E Super, creating direct amplification at the base. Clean across the entire composition because every layer harmonizes with cedarwood.","sc":8,"se":"Fall/Winter","oc":"Date / evening / smart casual","ti":"night"}];
const FRAG_DESC={
  '#Candy':'Liz Claiborne Candies For Men (DDL) dupe. Watermelon and green leaves up top give way to a chypre-musk woody base — surprisingly grown-up for something built around a fruit accord. Wears like a casual woody fougère with sweet edges; reads as effortless rather than candied.',
  '#FierceAttar':'A&F Fierce vintage intensified dupe. Petitgrain and cardamom open sharp before the fougère core (vetiver, fir, oakmoss, sandalwood) settles into a vintage barbershop drydown. Loud and clean — gym-friendly but holds up at the office.',
  '#Imagine':'LV Imagination dupe. Citron and ginger open bright and airy, cinnamon and black tea carry the heart, ambrox closes warm and skin-clinging. Hot-weather signature material; one of the few attars that genuinely reads upscale.',
  '1 & Only Jazz Club':'D&G The One x MMM Jazz Club dupe. Tobacco, vanilla, and aromatic sage layered over warm spicy amber — cozy lounge scent without the cloying sweetness those notes usually drag in. Evening and date weather only.',
  'Abadi Opulent':'YSL Y Elixir dupe. Rich blue aromatic core, sweet woody amber base — denser and more polished than standard Y EDP. Punches above its price for upscale evenings; one of the better Y Elixir clones in this tier.',
  'Acqua Di DUA':'Acqua di Gio OG dupe. Marine citrus opening fades into watery woods — the AdG signature done faithfully. Skin scent within 3 hours unless layered; honest dupe, not a beast.',
  'Amazonas Avalanche':'Dior Homme Intense dupe. Iris and cacao over velvety powder, sandalwood drydown — formal evening territory. Powdery in a refined way, not soapy; works specifically for cocktail and date occasions, less so casual.',
  'Ameer Al Oudh Intense':'MMM By the Fireplace dupe. Burnt woods and vanilla over a smoky cozy fireside accord — the campfire-marshmallow scent done well. Pairs perfectly with Jean Lowe Immortal (2:1) for the JLI+AAO evening combo. ★ Vault anchor.',
  'Ana Abiyedh':'I Am White-style. Soft white musk and vanilla, airy clean sweetness — a true skin scent, intentionally minimal. Wear close, layer or apply heavy; quiet by design.',
  'Aphrodisiac':'Initio Psychedelic Love dupe. Hedione gives the floral-resinous lift, sandalwood and patchouli ground the base — supposed to read sensual and ethereal. Inconsistent performer; can lean either luxurious or muddy depending on humidity.',
  'Aquatica':'Creed Virgin Island Water dupe. Lime, coconut, and rum freshness over tropical breezy sweetness — vacation-energy compliment-getter built specifically for hot weather. Light projection but dependable; one to wear when other aquatics fail in heat.',
  'Aroma of Heaven':'Hermès Terre d\'Hermès vintage dupe. Citrus over vetiver and mineral woods — mature, earthy, and unmistakably masculine. The vintage TdH character (heavier orange, drier vetiver) restored at a fraction of the cost; year-round office staple.',
  'Bade\'e Al Oud Amethyst':'Initio Atomic Rose dupe. Lush rose, vanilla, and amber — pretty floral richness, not difficult or complex. Use for date or floral evening; rose dominates throughout, so wear it when you want to be perceived through that lens.',
  'Bade\'e Al Oud For Glory':'Initio Oud for Greatness dupe. Saffron, oud, and lavender create a bold dark niche aura. Statement piece — won\'t go unnoticed, won\'t blend into a room.',
  'Bade\'e Al Oud Honor & Glory':'House style original. Pineapple and crème brûlée over woods — sweet creamy statement scent that reads more dessert than fragrance for the first hour. Settles into something more wearable; evening only.',
  'Bade\'e Al Oud Sublime':'Kayali Eden Juicy Apple dupe. Bright juicy apple sweetness — playful and modern. Better than the original\'s mediocre longevity makes you expect; daytime fun scent with no pretense.',
  'Bet On 67':'Ralph Lauren Polo 67 dupe. Sporty citrus over clean aromatic woods — easy daytime fresh, the kind of scent that wears you instead of the other way around. Versatile gym/casual/outdoor pick.',
  'Black Origami':'Tom Ford Black Orchid dupe. Dark florals and truffle patchouli — the signature gothic Black Orchid sensuality, opaque and mysterious. Genuinely unisex; reads as a statement scent regardless of who\'s wearing it.',
  'Black Widow':'Kilian Black Phantom dupe. Rum, dark chocolate, coffee, almond, and caramel over sandalwood-tonka — pirate-cake gourmand at its most decadent. Cold-weather evening; will turn heads in a confined space.',
  'Bleu de Casino Elixir Extrait':'BdC × Aventus × BR540 Extrait hybrid. Blue incense woods get a fruity smoky amber overlay and the BR540 sweet extrait sheen on top — three signatures stacked into one denser composition. Holds the BdC backbone but with much more warmth and projection.',
  'Bleu de Chanel EDT':'In-house original. Citrus, incense, and woods — crisp blue freshness, polished and versatile. The reference point the BdD lineage clones; lighter and brighter than the Parfum or L\'Exclusif.',
  'Bleu de Dua Attar':'Bleu de Chanel Parfum dupe. Deep blue woods, incense, and citrus over smooth ambered masculinity — the BdC Parfum DNA done faithfully and at significantly higher concentration. The reference attar of the vault: pairs cleanly with Ottoman Breeze, His Perspective, and most blue-aromatic territory. ★ Vault anchor.',
  'Bleu de Dua Exclusive Extrait':'Bleu de Chanel L\'Exclusif dupe. Elegant blue woods and refined incense, creamier and more polished than the Parfum — quieter projection but more depth. Business formal and special-occasion territory; restraint is the whole point.',
  'Casino Royale Nights Extrait':'Baccarat Rouge 540 Extrait dupe. Saffron-amberwood with the airy sweetness intact, glowing woody sugar drydown — the BR540 Extrait magic at a tenth of the cost. Cocktail and date weather; loud enough that two sprays is the ceiling. ★ Vault anchor.',
  'Chilling By The Pacific':'LV Pacific Chill dupe. Citrus splash, mint, black currant, apricot, fig, and cooling musky woods — spa-fresh and minty, designed for heat. Wears more like a cold-pressed juice than a fragrance; daytime only.',
  'City of Dua':'LV City of Stars dupe. Blood orange and lemon up top, tiare flower at the heart, soft musk-sandalwood drydown — bright opening that lasts maybe 90 minutes before settling close to skin. Smart casual evening territory.',
  'Club de Nuit Milestone':'Creed Millesime Imperial dupe. Salty melon and musk over metallic marine freshness — the beach-luxury vibe done at a Creed-cologne price. Smart casual and beach occasions; respects the original\'s character without trying to push it harder.',
  'Cola Fizz Of Tonka Beans':'Mancera Tonka Cola dupe. Cherry cola fizz on top, tonka warmth in the base — fun sweet aromatic that doesn\'t take itself seriously. Year-round social/casual scent; the opening is the show.',
  'Cotton Candy de Dua':'House style original. Spun sugar vanilla and white musk — airy cotton candy gourmand executed without becoming sticky. Casual, playful, polarizing; some skins love it, others find it juvenile.',
  'Crater':'MFK Grand Soir dupe. Benzoin, labdanum, and tonka over amber and vanilla — resinous sweet warmth that wears like opulent comfort food. One of the cleanest Grand Soir clones; date and special-occasion evening territory.',
  'D Le Attar':'YSL Y Le Parfum dupe. Dark blue aromatic with apple-ginger top notes over smooth sweet woods — between Y EDP and Y Elixir in weight. Office to date night transition scent.',
  'D Le Parfum Intense':'YSL Y EDP Intense dupe. Vibrant blue aromatic with crisp woods, richer and more modern than the standard EDP — projects confidently for a full work day. Year-round office and evening anchor; one of the most reliable performers in the vault. ★ Vault anchor.',
  'Daring Blue For Life':'D&G Light Blue Forever dupe. Grapefruit and citrus woods over breezy marine freshness — the original\'s lightness at the same low projection. Beach and gym territory; layer for any longevity.',
  'Dark Cherry & Amber':'In-house original. Dark cherry over smooth amber sweetness — cozy evening warmth without the boozy edge most cherry scents lean into. Date and lounge occasions; reads polished rather than playful.',
  'Davidoff Cool Water':'In-house original. Minty aquatic over lavender and marine freshness — the 1988 reference itself, classic sporty clean. Reformulated and lighter than vintage; wear young or wear with knowledge of why you\'re wearing it.',
  'Desert Reflection Extrait':'Amouage Reflection Man dupe. Creamy white florals (neroli, jasmine) over sandalwood with soapy refinement — masterclass in delicate balance, the elegance depends on softness winning over weight. Special-occasion formal; cool weather only.',
  'Detour Noir':'PdM Layton dupe. Apple and vanilla spice over smooth woods — versatile cool-weather richness, the Layton signature done faithfully. Date or office; one of the most useful fall/winter signatures here. ★ Vault anchor.',
  'Dior Sauvage EDP':'In-house original. Ambroxan-driven spice with bergamot and woods — bold, versatile, mass-appealing. The blueprint everyone clones; works because it sets a single expectation and meets it. ★ Vault anchor.',
  'Dolce Poseidon':'Aventus × Profumum Roma Dulcis in Fundo. Citrus-bergamot top, pineapple-apple-blackcurrant heart, jasmine-rose-birch midbase, vanilla-musk-oakmoss drydown — Aventus given a creamsicle vanilla overlay. Justified within the Aventus cluster because the sweet-creamy direction is genuinely distinct from every other Poseidon. ✓ Justified addition.',
  'Drowning in Bleu de Dua Attar':'Nishane Ani × BdC Parfum hybrid. Vanillic spicy citrus over blue woods with creamy incense sweetness — Ani\'s vanillic hum sits beautifully against the BdC backbone. Date and upscale evening; wears smarter than the name suggests.',
  'Drowning in Bleu de Savage Fierce':'Ani × Sauvage EDT × Fierce × BdC quadbrid. Sweet-spicy blue freshness with musky woods — club-ready hybrid that combines four loud signatures into something cohesive. Falls between dressy and casual; works for night out and high-energy social.',
  'Drowning in Vanilla':'Nishane Ani dupe. Creamy vanilla, blue ginger, pink pepper, blackcurrant, Turkish rose over a leather-musk base — the Ani DNA done at a fraction of the cost. Cozy evening territory; the rose-vanilla axis stays prominent throughout.',
  'Dua Formula 003':'PdM Greenley dupe. Green apple and mandarin-bergamot over mossy aromatic woods — fresh and bright in a smart-casual way, distinctly green-leaning. Spring and summer office staple; one of the better PdM dupes in the lineup.',
  'Dua\'s SoHo':'Bond No. 9 SoHo dupe. Fruity florals over amber — creative urban sweetness with a New York edge. Urban casual; works in social settings where you want presence without dressing up.',
  'Dua\'s Water Primal Essence':'Acqua di Gio Absolu dupe. Fruity aquatic over juicy marine sweetness — the Absolu version of AdG\'s lineage, denser than the original. Office and casual; reasonable projection for an aquatic.',
  'Ebony Fume':'Tom Ford Ebene Fume dupe. Incense and palo santo woods with smoky meditative warmth — quiet, contemplative, cool-weather formal. Special-occasion evening; not for crowded rooms.',
  "Elixir Of Poseidon's Classic Pineapple":'Aventus × D&G Pineapple. Pineapple syrup and mandarin-bergamot up top, ripe pineapple chunks at the heart, jasmine-birch and ambergris-cedar-oakmoss base — pineapple-forward Aventus variant. Distinct on its own but flagged near-dup against the Aventus core cluster. ⚠ Near dup.',
  'Epoque Artistique':'Invictus Victory / Victory Elixir dupe. Sweet vanilla and amber with sporty freshness — bold night-out energy. Functionally identical to Victorioso Nero in this collection. ⚠ Exact dup.',
  'Error 410':'1M Absolutely Gold dupe. Sweet gold amber with rich spice, warm evening gloss — denser and more luxurious than standard 1M. Cold-weather date and evening; wears like dressed-up 1M.',
  'Error 413':'1M Lucky dupe. Hazelnut and plum sweetness over woody amber — playful night-out vibe, the most gourmand of the 1M flankers. Use for casual evening and social.',
  'Evoke Gold':'Prada L\'Homme dupe. Clean neroli and iris over powdery soapiness — refined office elegance, quiet but well-mannered. Year-round office; performs exactly as advertised, no surprises.',
  'Fattan':'Hermès Terre d\'Hermès dupe. Orange and vetiver over dry mineral earthiness — smart casual elegance, the TdH signature with maybe slightly less depth than the original. Year-round daily wear staple.',
  'Fierce Savage':'Abercrombie Fierce × Sauvage EDT hybrid. Musky fresh citrus and ambroxan over casual loud clean masculinity — combines two compliment-getters into one. Spring and summer casual; the dual ambroxan core means it projects loud and lasts.',
  'Fortune':'Xerjoff Naxos dupe. Honey and tobacco over lavender, sweet aromatic richness with elegant comfort — the Naxos warmth done faithfully but with shorter reach. Date and evening; cozy without being heavy.',
  'Gentleman\'s Club':'Givenchy Gentleman Society dupe. Sage and cardamom up top, vetiver woods at the heart, narcissus-vanilla-palo santo-cedar drydown — sophisticated woody-aromatic with surprising depth. Business casual and date; one of the more grown-up scents here.',
  'Glacier Bold':'JPG Le Beau Le Parfum dupe. Coconut woods over sweet tropical amber — playful sensual freshness, lighter than expected for "Le Parfum" branding. Casual and gym; tropical without being beachy.',
  'Glacier Le Noir':'JPG Le Male Le Parfum dupe. Cardamom and vanilla over woods — dark sweet barbershop vibe, the Le Male DNA at higher concentration. Date and club evening; reliable cold-weather club scent.',
  'Gladiator':'Argos Triumph of Bacchus dupe. Fruity boozy tobacco over dense vanilla amber — grand dramatic richness in proper Triumph of Bacchus tradition. Statement evening only; not subtle, not trying to be.',
  'Gone Swimming':'LV Afternoon Swim dupe. Bergamot, orange, and ginger citrus splash — clean bright summer in liquid form. Loud and cheerful for the first 90 minutes, then very close to skin. Beach/poolside default.',
  'Grape Cigarillo':'DDL original. Red grape, vanilla, tobacco, amber, and musk — fruity-tobacco gourmand that drinks instead of wears. Cool weather and evening; punches well above the budget tier.',
  'Grassland':'Creed GIT-style dupe. Green aromatic woods with grassy clean upscale freshness — true GIT character at fraction of the cost. Smart casual and office; spring/summer staple.',
  'Haven Eclipse':'Xerjoff Torino 22 dupe. Minty aromatic woods with bright freshness — upscale sporty elegance, the Torino 22 signature credibly recreated. Smart casual and date; reads dressy without forcing it.',
  'Hawas Ice':'In-house original. Icy fruity aquatic with musky freshness — loud sporty summer energy, designed for heat. Sport, gym, and casual; one of the best summer beasts here.',
  'Hawas Kobra':'LV Imagination dupe. Soapy citrus-tea over musky freshness — bright modern easy wear, the Imagination DNA hit faithfully. Spring/summer casual; better daytime longevity than most LV dupes.',
  'Hayaati Gold Elixir':'Armani Code Profumo dupe. Sweet tonka amber, spicy mandarin, seductive depth — the Code Profumo signature at much lower cost. Date and evening; cold-weather only.',
  'Hercules':'PdM Herod dupe. Tobacco, cinnamon, and vanilla — warm regal sweetness in proper Herod tradition. Evening, formal, and date; cozy beast for cold weather.',
  'His Aspiration Extreme Sport':'Allure Homme Sport Eau Extreme dupe. Minty tonka citrus over sporty woods — versatile masculine freshness, AHSEE signature done well. Sport and casual; year-round daily option.',
  'His Ideal: Private Platinum':'Guerlain L\'Homme Idéal Platine Privé (DDL) dupe. Grapefruit-bergamot citrus, green almond, neroli over clean musk-woods — refined daytime elegance with a green almond signature that\'s genuinely distinct. Smart casual and office; one of the more interesting picks here.',
  'His Intense Aspiration':'Allure Blanche × AHSE hybrid. Creamy lemon freshness over sporty woods with smooth musky citrus — combines two Allure references. Office and smart casual; lemon character holds longer than expected.',
  'His Loyalty':'D&G Devotion Pour Homme dupe. Citrus and gourmand aromatic over smooth woods — modern sweet masculine, fits the casual social bracket cleanly. Spring and summer; pleasant rather than memorable.',
  'His OG Aspiration':'Chanel Allure Homme 1999 dupe. Classic citrus woods with spicy creamy freshness — vintage Allure DNA, polished masculine in proper 1999 fashion. Office and smart casual; year-round.',
  'His Perspective':'Prada Paradigme dupe. Musky bergamot over green geranium, resinous ambery woods, balsamic depth — the Paradigme signature recreated with full character intact. Pairs cleanly with Ottoman Breeze (2+2 spring daily driver). One of the most layerable scents in the vault. ★ Vault anchor.',
  'His Royalty':'Prada L\'Homme L\'Eau dupe. Neroli, ginger, iris over amber, powdery woods, and sandalwood-cedar drydown — refined office and light-date territory. Spring and summer; the iris note carries the elegance.',
  'Iconic Built':'YSL Bleu Électrique dupe. Lavender and cardamom over woods — blue-night sensuality, smooth evening freshness. Club and night-out territory; bold without being loud.',
  'Iconic Greenwich Village':'BN9 Greenwich Village dupe. Fruity musky amber over urban sweet woods — stylish modern scent with the Bond No. 9 New York attitude. Urban casual and social.',
  'Iconic Plums By The Fire':'BN9 Andy Warhol × MMM By the Fireplace hybrid. Plum sweetness over smoky chestnut woods — cozy artistic warmth, the fireplace character with a fruit accent. Cold-weather evening; lounge-friendly.',
  'Imagine Chilling By The Pacific':'LV Pacific Chill × Phero\'moan Citrus Musk hybrid. Citrus splash, mint, black currant, apricot, fig, ambrette over pheromone-infused musky freshness — Pacific Chill done with more longevity. Casual and daytime; spring/summer.',
  'Imagine Poseidon Chilling At The Pacific With Fire God':'Aventus × Imagination × Pacific Chill × God of Fire quadbrid. Pineapple-bergamot-citron, mango-mandarin-ginger heart, mint-coriander-basil, jasmine-oud-amber, vanilla-ambergris drydown — four signatures in one bottle that genuinely cohere. Year-round versatile statement; the rare quadbrid that works. ✓ Justified addition.',
  'Imperial Blue':'BdC × Creed Millesime Imperial hybrid. Blue incense meets salty melon musk — refined fresh luxury, the BdC backbone with marine sparkle on top. Spring and summer upscale casual; one of the more polished blue marines available. ✓ Justified addition.',
  'Imperiale Casino Elixir':'Millesime × Aventus × BR540 Extrait triple-hybrid. Fruity marine amber with metallic sweetness — luxe hybrid sheen, three signatures stacked into one composition. Special-occasion formal; spring/fall.',
  'Imperiale Matrix':'Creed Millesime × Xerjoff Nio hybrid. Citrus marine musk with green neroli sparkle over polished luxury freshness — combines Millesime\'s salty marine with Nio\'s transparent elegance. Office and smart casual; spring/summer.',
  'Imperialé Poseidon':'Creed Aventus × Creed Millesime Imperial hybrid. Bergamot-blackcurrant-apple-pineapple top, iris-jasmine-birch-patchouli heart, sandalwood-musk-amber-ambergris-vanilla base — Aventus pineapple-chypre signature crossed with Millesime\'s marine luxury. Spring/summer smart casual, office, and date; flagged near-dup with Imperiale Casino Elixir which leads the Millesime Imperial cluster. ⚠ Near dup.',
  'Infamous Ginger':'Goldfield & Banks Ingenious Ginger (DDL) dupe. Australian ginger flower over jasmine-rose florals, mandarin-bergamot, sandalwood-vanilla-amber — the original\'s singular ginger signature recreated. DDL pricing makes this one of the most defensible niche dupes here.',
  'Intense Peach':'Tom Ford Bitter Peach dupe. Ripe peach, rum, and woods — bold sweet fruit, the Bitter Peach character done loud. Cool-weather evening and bold social; the peach is the entire point.',
  'Intoxicating Bliss':'Initio Narcotic Delight dupe. Cherry and cognac over pepper, with rose-hedione lift over vanilla-tobacco woods — dense and complex, the Narcotic Delight DNA recreated. Date and lounge evening; cold weather only, divisive even then.',
  'Intuition Vision':'Acqua di Gio Profumo dupe. Marine incense and aromatic notes over dark mineral freshness — elegant masculinity with the Profumo signature intact. Smart casual and office; spring/summer signature material. ★ Vault anchor.',
  'Invasion Of The Leopard':'Bvlgari Tygar variation. Woody aromatic with citrus freshness, ginger, and musky ambroxan — modern masculine that wears smarter than the name suggests. Casual and date; spring/summer.',
  'Island Dreams':'LV Symphony dupe. Sparkling citrus and musk over bright luxury freshness — clean upscale airiness, the Symphony signature done at a fraction of the cost. Upscale casual and daytime date.',
  'Itqan Noir':'YSL MYSLF dupe. Clean orange blossom woods over smooth ambrox freshness — modern ease, the MYSLF DNA done correctly (orange blossom forward, not patchouli forward). Smart casual and date; year-round.',
  'Jazz':'Maison Margiela Jazz Club dupe. Boozy tobacco and vanilla over cozy amber — intimate lounge scent, the Jazz Club DNA at much lower cost. Evening, bar, and lounge.',

// Plane fitness: lower = better for flights. Penalizes loud, projecting, polarizing scents.
// 0 = perfect plane scent (oil or skin-close musk, won't bother seatmates)
// 10+ = avoid (gourmand bombs, oud, heavy florals, beast-mode projection)
function planeFitness(f){
  if(!f)return 99;
  const dna=(f.dna||[]).map(d=>String(d).toLowerCase());
  const name=(f.name||'').toLowerCase();
  const house=(f.house||'').toLowerCase();
  const insp=(f.inspiration||'').toLowerCase();
  const isOil=/yom & layl|miris oils|al-rehab|crown/i.test(house)||/\(oil\)$/.test(name);
  const isMusk=dna.some(d=>d.includes('musk'))||dna.some(d=>d.includes('powder'));
  
  let score=6;
  
  // Heavy penalties — never wear on a plane
  if(dna.some(d=>d.includes('gourmand')))score+=5;
  if(dna.some(d=>d.includes('oud')))score+=5;
  if(dna.some(d=>d.includes('tobacco')))score+=4;
  if(dna.some(d=>d.includes('smoke')))score+=4;
  if(dna.some(d=>d.includes('leather')))score+=4;
  // Sweet/vanilla/amber are softened if musk-led (skin-close composition)
  if(dna.some(d=>d.includes('sweet')))score+=isMusk?1:2;
  if(dna.some(d=>d.includes('vanilla')))score+=isMusk?1:2;
  if(dna.some(d=>d.includes('amber')))score+=isMusk?1:2;
  if(dna.some(d=>d.includes('spicy'))&&!isMusk)score+=1;
  if(dna.some(d=>d.includes('floral'))&&!isMusk)score+=2;
  if(dna.some(d=>d.includes('chypre')))score+=2;
  // High-projection ANCHOR/known-projector inspirations are NOT plane bottles even if "fresh"
  if(/aventus|sauvage|allure homme|le male|jpg|invictus|y edp|y le parfum|paradigme|pegasus|herod/i.test(insp))score+=3;
  if(/aventus|sauvage|fierce|imperial|profumo|hacivat|millesime/i.test(name+' '+insp))score+=2;
  // Dua "Attar" bottles are projection-amplified sprays (not true oils) — common misread
  if(/\battar\b/i.test(name)&&!isOil)score+=2;
  if((f.rating||0)>=5)score+=1; // 5/5 bottles tend to be statement-y
  
  // Big bonuses for skin-close, plane-appropriate
  if(isOil)score-=5; // oils = TSA-friendly + skin-close
  if(isMusk&&!dna.some(d=>d.includes('amber'))&&!dna.some(d=>d.includes('gourmand')))score-=4;
  // Very specific known-quiet picks
  if(/musk therapy|silver mountain|i am white|musk melody|cool water|grand masters|lionora|queening|j'adoube|blockade/i.test(insp))score-=3;
  if(/ana abiyedh|musk melody|silver \(oil\)|nor\b|wazir|raazi|rayees|limitless|gladiator/i.test(name))score-=2;
  
  return Math.max(0,score)
}

  if(bDense)return {a:2,b:1};
  return {a:2,b:2}
}
function seasonMatch(sa,sb){return sa==='Year-round'||sb==='Year-round'||sa===sb||(sa.includes('Spring')&&sb.includes('Spring'))||(sa.includes('Fall')&&sb.includes('Fall'))}
function redundant(a,b){
  const flags=['ANCHOR','NEAR DUP','EXACT DUP'];
  const ca=clusterOf(a),cb=clusterOf(b);
  if(ca&&ca===cb)return `Both in the ${ca} cluster — redundant, you're wasting sprays.`;
  if(flags.includes(a.flag)&&flags.includes(b.flag)){return 'Both marked as reference profiles — redundant.';}
  return ''
}
function comboTag(a,b){const all=[...a.dna,...b.dna];if(all.includes('Tobacco')||all.includes('Vanilla')||all.includes('Gourmand'))return 'Cozy Evening';if(all.includes('Oud')||all.includes('Leather')||all.includes('Spicy'))return 'Bold Statement';if(all.includes('Aquatic')||all.includes('Citrus'))return 'Fresh Daily';if(all.includes('Amber')||all.includes('Sweet'))return 'Date Night';return 'Daily Driver'}
function whyWorks(a,b,shared){let add=b.dna.find(x=>!a.dna.includes(x))||primary(b);let sh=shared[0]?`shared ${shared[0].toLowerCase()} keeps it coherent`:'different lanes create contrast';return `${a.name} brings ${primary(a).toLowerCase()}; ${b.name} adds ${add.toLowerCase()}. ${sh.charAt(0).toUpperCase()+sh.slice(1)}.`}
function bestAlt(a,badB){let best=null,res=null;for(const x of state.collection){if(x.id===a.id||x.id===badB.id)continue;const r=compatibleCore(a,x);if(r&&!r.clash&&a.dna.some(t=>x.dna.includes(t))&&r.score>(res?.score||0)){best=x;res=r}}return best?`${a.name} + ${best.name} (${res.score}/100)`:''}
function compatibleCore(a,b){if(!a||!b||a.id===b.id)return null;const def=defaultSprays(a,b);const r=compatible(a,b,def.a,def.b);return r?{score:r.score,clash:r.clash}:null}

// Anchor scoring (PDF April 2026 system)
// Helpers for v2 derivation
// Role key: defines what 'role' a bottle plays in the collection. Used for Anchor scoring's
// Role Coverage pillar. Combines primary DNA, season, primary occasion, and rating bucket
// (4-5 vs 1-3) so a 5-rated office anchor doesn't share its role bucket with a 3-rated dust
// bottle in the same DNA/season lane.
function _roleKey(f){
  const dna=(f.dna||[])[0]||'';
  const s=(f.season||'').replace(/\s|·/g,'');
  const occ=((f.occasions||[])[0]||'').toLowerCase();
  const tier=(f.rating||0)>=4?'h':'l';
  return dna+'|'+s+'|'+occ+'|'+tier;
}
let _roleCountsCache=null;
function _roleCounts(){
  if(_roleCountsCache)return _roleCountsCache;
  const out={};
  for(const b of state.collection){const k=_roleKey(b);out[k]=(out[k]||0)+1}
  _roleCountsCache=out;return out;
}
function _invalidateRoleCache(){_roleCountsCache=null;_invalidateRecCache()}

// Derive each pillar 1-5 from bottle data.
// Each pillar can be overridden by f.scores={projection,longevity,composition,distinctiveness,role,signature}
function pillarScores(f){
  const o=f.scores||{};
  const dna=f.dna||[];
  const rating=f.rating||3;
  const flag=f.flag||'';
  const insp=(f.inspiration||'').toLowerCase();
  const desc=((typeof FRAG_DESC!=='undefined'&&FRAG_DESC[f.name])||'').toLowerCase();

  // 1. Projection: loud DNA biases up, intimate DNA down
  let proj;
  if(o.projection!=null)proj=o.projection;
  else{
    proj=2.5+(rating-3)*0.5;
    if(dna.some(d=>['Amber','Gourmand','Tobacco','Oud','Sweet','Spicy'].includes(d)))proj+=.7;
    if(dna.some(d=>['Aquatic','Musk / Powdery','Fresh'].includes(d))&&!dna.some(d=>['Amber','Gourmand'].includes(d)))proj-=.5;
    if(/extrait|elixir|absolu|intense|parfum|attar/.test(insp))proj+=.5;
    proj=Math.max(1,Math.min(5,proj));
  }

  // 2. Longevity: DENSE DNA + concentration cues
  let lon;
  if(o.longevity!=null)lon=o.longevity;
  else{
    lon=2.5+(rating-3)*0.4;
    const denseHits=dna.filter(d=>DENSE.includes(d)).length;
    lon+=denseHits*0.4;
    if(/extrait|absolu|parfum|attar/.test(insp))lon+=.7;
    else if(/elixir|intense/.test(insp))lon+=.5;
    if(dna.some(d=>['Aquatic','Fresh','Citrus'].includes(d))&&!denseHits)lon-=.4;
    lon=Math.max(1,Math.min(5,lon));
  }

  // 3. Composition Quality: flag is the strongest signal (ANCHOR/JUSTIFIED = curated quality)
  let comp;
  if(o.composition!=null)comp=o.composition;
  else{
    if(flag==='ANCHOR')comp=5;
    else if(flag==='JUSTIFIED')comp=4.5;
    else if(flag==='EXACT DUP')comp=2.5;
    else if(flag==='NEAR DUP')comp=3;
    else if(flag==='OVERLAP')comp=3.5;
    else comp=4; // DISTINCT or no flag
    // rating modifier
    comp+=(rating-4)*0.3;
    comp=Math.max(1,Math.min(5,comp));
  }

  // 4. DNA Distinctiveness: combines clone-fidelity (for cluster members) and uniqueness (for singletons)
  let dist;
  if(o.distinctiveness!=null)dist=o.distinctiveness;
  else{
    const cluster=clusterOf(f);
    const cCount=cluster?(clusterCounts()[cluster]||1):0;
    if(!cluster)dist=4; // original / niche target
    else if(cCount===1)dist=4.5;
    else if(cCount<=3)dist=4;
    else if(cCount<=6)dist=3;
    else dist=2.5; // saturated cluster
    if(flag==='EXACT DUP')dist=Math.min(dist,2);
    if(flag==='NEAR DUP')dist=Math.min(dist,2.5);
    if(flag==='OVERLAP')dist=Math.min(dist,3);
    if(flag==='ANCHOR')dist=Math.max(dist,4);
    dist=Math.max(1,Math.min(5,dist));
  }

  // 5. Role Coverage: how essential is this bottle to its role
  let role;
  if(o.role!=null)role=o.role;
  else{
    const rc=_roleCounts()[_roleKey(f)]||1;
    if(rc===1)role=5;
    else if(rc<=3)role=4;
    else if(rc<=6)role=3;
    else role=2;
    if(flag==='EXACT DUP')role=Math.min(role,2);
    if(flag==='NEAR DUP')role=Math.min(role,2.5);
    if(flag==='ANCHOR')role=Math.max(role,4);
    role=Math.max(1,Math.min(5,role));
  }

  // 6. Signature Potential: distinctive enough to be "yours"
  let sig;
  if(o.signature!=null)sig=o.signature;
  else{
    if(flag==='ANCHOR')sig=4.5;
    else if(flag==='JUSTIFIED')sig=4;
    else if(flag==='EXACT DUP')sig=1.5;
    else if(flag==='NEAR DUP')sig=2;
    else if(flag==='OVERLAP')sig=2.5;
    else sig=3;
    if(rating===5)sig+=.3;
    sig=Math.max(1,Math.min(5,sig));
  }

  return {projection:+proj.toFixed(2),longevity:+lon.toFixed(2),composition:+comp.toFixed(2),distinctiveness:+dist.toFixed(2),role:+role.toFixed(2),signature:+sig.toFixed(2)}
}

function qualityScore(f){
  // Intrinsic bottle quality - no Role Coverage. Stable across collection changes.
  // Used for: purchase evaluation, ratings, comparing bottles independent of collection state.
  const p=pillarScores(f);
  const totalRaw=p.projection*QUALITY_WEIGHTS.projection
              +p.longevity*QUALITY_WEIGHTS.longevity
              +p.composition*QUALITY_WEIGHTS.composition
              +p.distinctiveness*QUALITY_WEIGHTS.distinctiveness
              +p.signature*QUALITY_WEIGHTS.signature;
  const total=Math.round(totalRaw*20); // 0-100 display
  const floors=QUALITY_FLOORS;
  const floorViolations=[];
  if(p.composition<floors.composition)floorViolations.push('Composition');
  if(p.signature<floors.signature)floorViolations.push('Signature');
  const meetsFloors=floorViolations.length===0;
  // Tier labels: 90+ Excellent, 80-89 Strong, 70-79 Solid, 60-69 Average, <60 Weak
  let tier;
  if(total>=90)tier='Excellent';
  else if(total>=80)tier='Strong';
  else if(total>=70)tier='Solid';
  else if(total>=60)tier='Average';
  else tier='Weak';
  return {pillars:{projection:p.projection,longevity:p.longevity,composition:p.composition,distinctiveness:p.distinctiveness,signature:p.signature},total,totalRaw:+totalRaw.toFixed(2),tier,floorViolations,meetsFloors}
}

function anchorScore(f){
  const p=pillarScores(f);
  // Weighted total on 1-5 scale, multiplied by 20 for 0-100 display
  const totalRaw=p.projection*ANCHOR_WEIGHTS_V2.projection
              +p.longevity*ANCHOR_WEIGHTS_V2.longevity
              +p.composition*ANCHOR_WEIGHTS_V2.composition
              +p.distinctiveness*ANCHOR_WEIGHTS_V2.distinctiveness
              +p.role*ANCHOR_WEIGHTS_V2.role
              +p.signature*ANCHOR_WEIGHTS_V2.signature;
  const total=Math.round(totalRaw*20);
  // Role-based threshold
  const rc=_roleCounts()[_roleKey(f)]||1;
  let thresholdRaw,thresholdLabel;
  if(rc===1){thresholdRaw=3.75;thresholdLabel='sole rep'}
  else if(rc<=3){thresholdRaw=4.00;thresholdLabel='1-2 competitors'}
  else{thresholdRaw=4.25;thresholdLabel='3+ competitors'}
  const threshold=Math.round(thresholdRaw*20);
  // Per-pillar floor enforcement
  const floors=ANCHOR_FLOORS_V2;
  const floorViolations=[];
  if(p.composition<floors.composition)floorViolations.push('Composition');
  if(p.role<floors.role)floorViolations.push('Role');
  if(p.signature<floors.signature)floorViolations.push('Signature');
  const meetsFloors=floorViolations.length===0;
  const pass=total>=threshold&&meetsFloors;
  // For backwards compatibility with existing callers, also expose old-style fields
  const cluster=clusterOf(f);
  const cCount=cluster?(clusterCounts()[cluster]||1):1;
  return {
    pillars:p,
    total,thresholdRaw,threshold,thresholdLabel,
    roleCount:rc,
    floorViolations,meetsFloors,
    pass,
    cluster,cCount,
    // legacy:
    reach:Math.round(p.projection*20),performance:Math.round(p.composition*20),trueness:Math.round(p.distinctiveness*20),versatility:Math.round(p.role*20)
  }
}

// ELITE SCORING — unified rubric across bottles, combos, and collection slots.
// Five pillars (1-10 each, 50 max → ×2 for 0-100 percentile):
//   Composition · Performance · Distinctiveness · Versatility · Signature
// Tier mapping: S 90+ · A 80-89 · B 70-79 · C 60-69 · D <60
// Flag adjustments preserve the established taxonomy: ANCHOR/JUSTIFIED reward,
// OVERLAP/NEAR DUP/EXACT DUP penalize.
const ELITE_FLAG_DELTA={'ANCHOR':5,'JUSTIFIED':2,'DISTINCT':0,'OVERLAP':-3,'NEAR DUP':-5,'EXACT DUP':-15};
const ELITE_TIERS=[{min:90,grade:'S',label:'Elite',color:'#e8b84a'},{min:80,grade:'A',label:'Strong',color:'#b89a5a'},{min:70,grade:'B',label:'Solid',color:'#7da890'},{min:60,grade:'C',label:'Functional',color:'#9d8fbf'},{min:0,grade:'D',label:'Destash watch',color:'#b85a5a'}];
function _eliteTier(score){for(const t of ELITE_TIERS){if(score>=t.min)return t}return ELITE_TIERS[ELITE_TIERS.length-1]}

function eliteScore(f){
  // Bottle elite: blend of intrinsic quality and collection-context (anchor).
  // 60/40 weighting because intrinsic should lead — a great bottle stays great
  // even in a saturated cluster, just with adjustments downstream.
  const q=qualityScore(f);
  const a=anchorScore(f);
  const blend=q.total*0.6+a.total*0.4;
  // Five-pillar normalization for the breakdown display (1-10 scale).
  // Map the existing pillarScores (1-5 scale) to 1-10 by ×2.
  const p=pillarScores(f);
  const breakdown={
    composition:Math.round(p.composition*2*10)/10,
    performance:Math.round((p.projection+p.longevity)*10)/10, // average of two perf pillars, scaled
    distinctiveness:Math.round(p.distinctiveness*2*10)/10,
    versatility:Math.round(p.role*2*10)/10,
    signature:Math.round(p.signature*2*10)/10
  };
  // Flag adjustment
  const flagDelta=ELITE_FLAG_DELTA[f.flag]||0;
  // Cluster context: singletons get a small boost, saturated clusters take a hit.
  // This is the "is this slot worth the shelf space?" lens.
  const cluster=clusterOf(f);
  const cCount=cluster?(clusterCounts()[cluster]||1):1;
  let clusterDelta=0;
  if(cCount>=6)clusterDelta=-6;
  else if(cCount>=4)clusterDelta=-3;
  else if(cCount===1&&!cluster)clusterDelta=0; // unclassified
  else if(cCount===1)clusterDelta=+4; // sole rep
  // Anchor exemption: a confirmed ANCHOR is the justification for its cluster's
  // existence — it should not pay the saturation penalty it itself created.
  // JUSTIFIED bottles get half-rate (they earned their slot but aren't anchors).
  // Everything else takes the full hit.
  let clusterExemptNote=null;
  if(clusterDelta<0){
    if(f.flag==='ANCHOR'){
      clusterExemptNote=`anchor exempt from ${cCount}-bottle saturation`;
      clusterDelta=0;
    }else if(f.flag==='JUSTIFIED'){
      const halved=Math.ceil(clusterDelta/2); // -6 → -3, -3 → -1 (Math.ceil toward zero for negatives)
      clusterExemptNote=`${halved} ${cCount}-bottle saturation (justified, half-rate)`;
      clusterDelta=halved;
    }
  }
  const adjusted=Math.max(0,Math.min(100,Math.round(blend+flagDelta+clusterDelta)));
  const tier=_eliteTier(adjusted);
  // Reasoning notes for the UI
  const notes=[];
  if(flagDelta>0)notes.push(`+${flagDelta} ${f.flag}`);
  else if(flagDelta<0)notes.push(`${flagDelta} ${f.flag}`);
  if(clusterExemptNote)notes.push(clusterExemptNote);
  else if(clusterDelta>0)notes.push(`+${clusterDelta} sole rep in cluster`);
  else if(clusterDelta<0)notes.push(`${clusterDelta} ${cCount}-bottle cluster saturation`);
  if(!q.meetsFloors)notes.push('Quality floor: '+q.floorViolations.join('+'));
  return {score:adjusted,base:Math.round(blend),tier,breakdown,flagDelta,clusterDelta,notes,cluster,cCount,quality:q,anchor:a}
}

function eliteComboScore(combo,bottleA,bottleB){
  // Combo elite: starts from the layering compatibility score (0-100), adjusts
  // for shared DNA depth, distinctiveness against existing combos, and occasion fit.
  if(!bottleA||!bottleB)return null;
  const r=compatible(bottleA,bottleB,combo&&combo.sprayA,combo&&combo.sprayB);
  if(!r||r.clash)return {score:0,tier:_eliteTier(0),breakdown:null,notes:['Clash — do not layer'],compat:r};
  const sharedDNA=(r.shared||[]).length;
  const totalDNA=new Set([...(bottleA.dna||[]),...(bottleB.dna||[])]).size;
  const sharedDepth=totalDNA?(sharedDNA/totalDNA):0;
  // Sub-scores 1-10
  const harmony=Math.round(Math.min(10,r.score/10)*10)/10;
  const longevityTogether=Math.round(((pillarScores(bottleA).longevity+pillarScores(bottleB).longevity))*10)/10;
  const newAccord=Math.round(Math.min(10,sharedDepth*10+(sharedDNA>=3?2:0))*10)/10;
  const occasionFit=(()=>{const oa=new Set(bottleA.occasions||[]);const ob=new Set(bottleB.occasions||[]);let overlap=0;oa.forEach(o=>{if(ob.has(o))overlap++});return Math.round(Math.min(10,overlap*2.5)*10)/10})();
  const memorability=Math.round(((pillarScores(bottleA).signature+pillarScores(bottleB).signature))*10)/10;
  const breakdown={harmony,longevity:longevityTogether,distinctiveness:newAccord,versatility:occasionFit,signature:memorability};
  // Bonuses
  let bonus=0;
  const notes=[];
  if(sharedDNA>=3){bonus+=5;notes.push('+5 deep DNA overlap')}
  else if(sharedDNA>=2){bonus+=2;notes.push('+2 shared DNA core')}
  if(sharedDNA===0&&!r.clash){notes.push('No shared DNA — risky pairing')}
  // Distinctiveness vs other combos: penalize if a near-duplicate combo exists
  const dupCombo=state.combos&&state.combos.find(c=>c.id!==(combo&&combo.id)&&((c.a===bottleA.id&&c.b===bottleB.id)||(c.a===bottleB.id&&c.b===bottleA.id)));
  if(dupCombo){bonus-=3;notes.push('-3 duplicate combo exists')}
  const adjusted=Math.max(0,Math.min(100,r.score+bonus));
  const tier=_eliteTier(adjusted);
  return {score:adjusted,base:r.score,tier,breakdown,bonus,notes,compat:r,sharedDNA}
}

function eliteCollectionVerdict(){
  // Roll up: distribution across tiers, anchor health, destash count.
  const scored=state.collection.map(f=>({f,e:eliteScore(f)}));
  const dist={S:0,A:0,B:0,C:0,D:0};
  scored.forEach(s=>dist[s.e.tier.grade]++);
  const total=scored.length||1;
  // Collection elite score: weighted average leaning on the top tier, since
  // a collection is judged by its peaks not its mean.
  const top10pct=Math.max(1,Math.round(total*0.1));
  const sortedDesc=scored.slice().sort((x,y)=>y.e.score-x.e.score);
  const peakAvg=sortedDesc.slice(0,top10pct).reduce((s,x)=>s+x.e.score,0)/top10pct;
  const overallAvg=sortedDesc.reduce((s,x)=>s+x.e.score,0)/total;
  const collectionScore=Math.round(peakAvg*0.5+overallAvg*0.5);
  const tier=_eliteTier(collectionScore);
  return {score:collectionScore,tier,distribution:dist,total,peakAvg:Math.round(peakAvg),overallAvg:Math.round(overallAvg),scored:sortedDesc}
}



// HASH ROUTING — browser Back/Forward support
const ROUTE_ALIASES={home:'wear',wear:'wear',vault:'collection',collection:'collection',layer:'lab',lab:'lab',tools:'tools',settings:'settings',set:'settings',shelf:'shelf',display:'shelf',rotation:'shelf',compare:'compare',clusters:'clusters',cluster:'clusters','buy-skip':'buyEval',buy:'buyEval',buyskip:'buyEval','iso-e':'isoe',isoe:'isoe',dna:'wheel',wheel:'wheel',stats:'stats',elite:'elite'};
function safeRouteId(id){return encodeURIComponent(String(id||''))}
function routeForState(){
  if(state.view==='collection'&&state.selected&&getF(state.selected))return '#/vault/bottle/'+safeRouteId(state.selected);
  if(state.view==='collection')return '#/vault';
  if(state.view==='lab')return '#/layer';
  if(state.view==='shelf')return '#/shelf';
  if(state.view==='tools')return '#/insights';
  if(state.view==='compare')return '#/insights/compare';
  if(state.view==='clusters')return '#/insights/clusters';
  if(state.view==='buyEval')return '#/insights/buy';
  if(state.view==='isoe')return '#/insights/isoe';
  if(state.view==='wheel')return '#/insights/dna';
  if(state.view==='stats')return '#/insights/stats';
  if(state.view==='elite')return '#/insights/elite';
  if(state.view==='settings')return '#/settings';
  return '#/wear';
}
function parseRoute(hash){
  let raw=String(hash||'').replace(/^#\/?/,'');
  const parts=raw.split('/').filter(Boolean).map(x=>decodeURIComponent(x));
  let view='wear',selected=null;
  if(!parts.length)return {view,selected,valid:false};
  const root=(parts[0]||'').toLowerCase();
  if(root==='vault'||root==='collection'){
    view='collection';
    if((parts[1]||'').toLowerCase()==='bottle'&&parts[2])selected=parts.slice(2).join('/');
  }else if(root==='tools'||root==='insights'){
    const sub=(parts[1]||'').toLowerCase();
    view=sub?ROUTE_ALIASES[sub]||'tools':'tools';
    if(!['tools','isoe','wheel','stats','compare','clusters','buyEval'].includes(view))view='tools';
  }else{
    view=ROUTE_ALIASES[root]||'wear';
  }
  if(root==='shelf')view='shelf';
  if(view==='collection'&&selected&&!getF(selected))selected=null;
  if(view!=='collection')selected=null;
  return {view,selected,valid:!!ROUTE_ALIASES[root]||root==='vault'||root==='collection'||root==='tools'||root==='insights'||root==='shelf'};
}
function routeWeatherIfNeeded(view){
  if(view==='isoe'||view==='wear'||view==='tools'){
    const stale=!state.weather||state.weather.error||!state.weather.fetchedAt||(Date.now()-state.weather.fetchedAt)>20*60*1000;
    if(stale&&(state.city||state.weather?.source==='city'||state.weather?.source==='fallback')){fetchSharedWeather(true,false).then(()=>render()).catch(()=>{})}
  }
}
function syncRoute(replace=false){
  const route=routeForState();
  if(location.hash===route)return;
  try{history[replace?'replaceState':'pushState']({route},'',route)}catch(e){location.hash=route}
}
function navigateTo(view,{selected=null,wheelTag=null,replace=false,scroll=true}={}){
  state.view=view||'wear';
  state.selected=selected||null;
  if(wheelTag!==undefined)state.wheelTag=wheelTag;

}

  syncOccasions(){

  evaluatePurchase(){
    const ev=state.buyEval;
    if(!ev.name?.trim())return toast('Enter a bottle name');
    if(!ev.dna||!ev.dna.length)return toast('Pick at least one DNA');
    // Build a candidate bottle shape so it can be processed by clusterOf, redundancy, etc.
    const candidate={name:ev.name.trim(),inspiration:(ev.inspiration||'').trim(),house:'(candidate)',dna:ev.dna.slice(),season:ev.season,occasions:[],rating:4,flag:'',notes:{top:'',heart:'',base:''}};
    const cluster=clusterOf(candidate);
    // Cluster impact
    const clusterMembers=cluster?state.collection.filter(f=>clusterOf(f)===cluster):[];
    const clusterAnchors=clusterMembers.filter(f=>f.flag==='ANCHOR');
    const clusterSize=clusterMembers.length;
    // DNA position: how many bottles share each tag, and which tags are gaps
    const dnaCoverage=ev.dna.map(d=>{
      const count=state.collection.filter(f=>(f.dna||[]).includes(d)).length;
      return {dna:d,count,gap:count===0,thin:count<=2,saturated:count>=15};
    });
    // Leather filter
    const leatherFlag=ev.leather;
    // Redundancy: most-similar bottles by DNA overlap
    const overlapList=state.collection.map(f=>{
      const overlap=ev.dna.filter(d=>(f.dna||[]).includes(d)).length;
      const seasonOverlap=seasonMatch(f.season,ev.season)?1:0;
      // sameCluster only applies when BOTH have a cluster and they match — null=null doesn't count
      const fCluster=clusterOf(f);
      const sameCluster=cluster&&fCluster===cluster?1:0;
      const score=overlap*10+seasonOverlap*5+sameCluster*15;
      return {f,overlap,sameCluster:!!sameCluster,score};
    }).filter(x=>x.score>=15).sort((a,b)=>b.score-a.score).slice(0,5);
    // Verdict logic
    let verdict='consider';let verdictReason='';
    const fullOverlapCount=overlapList.filter(o=>o.overlap>=ev.dna.length).length;
    // DDL detection: $33 or DDL keyword in price field — relaxes some CAUTION verdicts since the lower stake makes redundancy more forgivable
    const isDDL=/\b(ddl|33|\$33)\b/i.test(ev.price||'');
    if(leatherFlag){verdict='skip';verdictReason='Leather-forward — you consistently avoid this lane.'}
    else if(clusterSize>=8){verdict='skip';verdictReason=`Cluster "${cluster}" already over-saturated at ${clusterSize} bottles. New buys here need genuine DNA novelty.${isDDL?' DDL pricing helps but the lane is too crowded.':''}`}
    else if(clusterSize>=5&&clusterAnchors.length>=2&&!isDDL){verdict='caution';verdictReason=`Cluster "${cluster}" is saturated (${clusterSize} bottles, ${clusterAnchors.length} anchors). Justify by hybrid character or DDL pricing.`}
    else if(clusterSize>=5&&clusterAnchors.length>=2&&isDDL){verdict='buy';verdictReason=`Cluster "${cluster}" is saturated (${clusterSize} bottles), but DDL pricing makes this a low-stake addition. Treat as flanker tier.`}
    else if(dnaCoverage.some(d=>d.gap)){verdict='buy';verdictReason=`Fills DNA gap${dnaCoverage.filter(d=>d.gap).length>1?'s':''}: ${dnaCoverage.filter(d=>d.gap).map(d=>d.dna).join(', ')}.${isDDL?' DDL pricing makes this a no-brainer.':''}`}
    else if(fullOverlapCount>=2&&!isDDL){verdict='caution';verdictReason=`${fullOverlapCount} bottles already cover all candidate DNA tags (${overlapList.filter(o=>o.overlap>=ev.dna.length).slice(0,2).map(o=>o.name).join(', ')}). Strong redundancy.`}
    else if(fullOverlapCount>=2&&isDDL){verdict='consider';verdictReason=`${fullOverlapCount} bottles already cover all candidate DNA tags, but DDL pricing softens the redundancy concern. Decide by smell, not strategy.`}
    else if(fullOverlapCount===1&&overlapList[0].sameCluster&&!isDDL){verdict='caution';verdictReason=`${overlapList[0].name} already covers all DNA tags AND lands in the same cluster. Likely redundant.`}
    else if(cluster&&clusterSize===0){verdict='buy';verdictReason=`First in cluster "${cluster}" — fills lane structure.`}
    else if(!cluster){verdict='buy';verdictReason='Distinct composition, no cluster overlap.'}
    else if(dnaCoverage.every(d=>d.thin)){verdict='buy';verdictReason='All candidate DNA tags are thinly represented. Adds depth without saturation.'}
    else {verdict='consider';verdictReason='No strong signal either way. Evaluate by performance and personal fit.'}
    state.buyEval.verdict={candidate,cluster,clusterSize,clusterAnchors:clusterAnchors.map(f=>f.name),dnaCoverage,overlapList:overlapList.map(x=>{const sigil=isoESigilFor(x.f);return{name:x.f.name,house:x.f.house,overlap:x.overlap,sameCluster:x.sameCluster,flag:x.f.flag||'',isoE:sigil?sigil.score:null}}),verdict,verdictReason,leather:leatherFlag};
    save();render();
  },

// Centralized tier system for Iso E scores. Used everywhere a tier label or threshold is needed.
// Single collection archive so Today banner, sigil, detail card, and stats all agree.
// Tiers:
//   9-10 EXCEPTIONAL — anchor-tier synergies, top of the heap
//   7-8  STRONG SYNERGY — sigil threshold, banner threshold
//   5-6  MODERATE — works fine but not a standout
//   1-4  LIMITED — minimal benefit, often skip-tier
// Threshold for "this bottle benefits from Iso E" is score >= 7 AND verdict !== NO/CAUTION.
const ISOE_TIER_SIGIL=7;       // sigil shows, today banner fires, "synergy partner" status
const ISOE_TIER_HIGH=9;        // exceptional — gets brighter sigil, leads stats
function isoETier(score){
  if(score>=9)return {label:'EXCEPTIONAL',cls:'pass',color:'#7fc4e8'};
  if(score>=7)return {label:'STRONG SYNERGY',cls:'pass',color:'#9ed4ee'};
  if(score>=5)return {label:'MODERATE',cls:'',color:'#b8c8d2'};
  return {label:'LIMITED',cls:'',color:'#8da4b6'};
}
// Iso E sigil helper: returns {score, high} if a bottle is a strong Iso E synergy partner, else null.
// Uses lazy access to ISO_E_NORM/ALIASES/FUZZY which are defined further down in the module.
function isoESigilFor(f){
  if(!f||!f.name)return null;
  const norm=(f.name||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  // Try direct lookup
  let entry=ISO_E_NORM[norm];
  if(!entry){const aliased=ISO_E_ALIASES[norm];if(aliased)entry=ISO_E_NORM[aliased]}
  if(!entry){
    // Fuzzy fallback
    const noise=new Set(['the','of','at','in','by','with','a','an','de','le','la']);
    const k=(f.name||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!noise.has(t)).sort().join('');
    entry=ISO_E_FUZZY[k];
  }
  if(!entry)return null;
  if((entry.v||'').toUpperCase().startsWith('CAUTION'))return null;
  if(!entry.v||entry.v.toUpperCase()==='NO')return null;
  const score=entry.sc||6;
  if(score<ISOE_TIER_SIGIL)return null;
  return {score,high:score>=ISOE_TIER_HIGH};
}
// Centralized tier system for Iso E scores. Used everywhere a tier label or threshold is needed.
// Single collection archive so Today banner, sigil, detail card, and stats all agree.

function isoEDetailCardHTML(f){
  if(!f||!f.name)return '';
  const norm=(f.name||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  let entry=ISO_E_NORM[norm];
  if(!entry){const aliased=ISO_E_ALIASES[norm];if(aliased)entry=ISO_E_NORM[aliased]}
  if(!entry){
    const noise=new Set(['the','of','at','in','by','with','a','an','de','le','la']);
    const k=(f.name||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!noise.has(t)).sort().join('');
    entry=ISO_E_FUZZY[k];
  }
  if(!entry)return '';
  const score=entry.sc||6;
  const verdict=(entry.v||'').toUpperCase();
  const isCaution=verdict.startsWith('CAUTION');
  const isSkip=verdict==='NO';
  // Build the meter (10 cells, filled to score)
  const meter=Array.from({length:10},(_,i)=>`<div class="bar ${i<score?'on':''}"></div>`).join('');
  // Verdict badge color
  const badgeColor=isSkip?'#d97757':isCaution?'#e8b84a':score>=8?'#7fc4e8':score>=6?'#9ed4ee':'#b8c8d2';
  const tier=isoETier(score);
  const badgeText=isSkip?'AVOID':isCaution?'CAUTION':tier.label;
  const benefits=(entry.b||'').split(/[,\s]+/).filter(Boolean).map(b=>b.replace(/^./,c=>c.toUpperCase())).slice(0,4);
  return `<div class="isoe-detailCard">
    <div class="between" style="align-items:flex-start;margin-bottom:8px">
      <div><p class="label" style="margin:0 0 2px">Iso E Super synergy</p><h3 style="margin:0;font-size:18px">${score}/10 · ${badgeText}</h3></div>
      <div style="text-align:right"><div style="font-family:var(--display);font-size:11px;letter-spacing:.18em;color:#7fc4e8;font-weight:600;text-transform:uppercase">C₁₆H₂₆O</div><div style="font-size:10px;color:#8da4b6;margin-top:2px">234 g/mol cedrene</div></div>
    </div>
    <div class="isoe-meter" style="margin:6px 0 12px">${meter}</div>
    ${entry.imp?`<p style="margin:0;line-height:1.55;font-size:13.5px">${esc(entry.imp)}</p>`:''}
    <div class="row" style="gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed rgba(127,196,232,.25);flex-wrap:wrap">
      ${entry.sp&&entry.sp>0?`<span class="seasonPill" style="background:rgba(127,196,232,.12);border-color:rgba(127,196,232,.3);color:#cfe9f5"><b>${entry.sp}</b> sprays Iso E</span>`:''}
      ${entry.w?`<span class="seasonPill" style="background:rgba(127,196,232,.08);border-color:rgba(127,196,232,.22);color:#a8c0d0">Apply: ${esc(entry.w)}</span>`:''}
      ${benefits.map(b=>`<span class="seasonPill" style="background:rgba(127,196,232,.06);border-color:rgba(127,196,232,.18);color:#9ed4ee">${esc(b)}</span>`).join('')}

function animateScore(target){
  const el=document.getElementById('scoreNum');
  if(!el)return;
  const final=Math.max(0,Math.min(100,parseInt(target,10)||0));
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){el.textContent=String(final);return}
  const start=0;
  const duration=650;
  const t0=performance.now();
  function easeOutCubic(t){return 1-Math.pow(1-t,3)}
  function step(now){
    const t=Math.min(1,(now-t0)/duration);
    el.textContent=String(Math.round(start+(final-start)*easeOutCubic(t)));
    if(t<1)requestAnimationFrame(step);
    else{
      el.textContent=String(final);
      el.classList.remove('scorePulse');
      void el.offsetWidth;
      el.classList.add('scorePulse');
    }
  }
  requestAnimationFrame(step);
}

function climateScoreFromWeather(w){

}

const MOOD_BEAST=['Loud'];
// Memoization cache for recommendWear. Keyed on inputs that affect scoring.
// Invalidated when collection or wearHistory changes (via _invalidateRecCache below).
let _recCache=null;
function _invalidateRecCache(){_recCache=null}
function recommendWear(occasion,mood,dna){
  let w=state.weather||{temp:70,humidity:45};
  // Cache key: round temp/humidity to coarse buckets so small fluctuations don't bust cache
  const tempBucket=Math.round((w.temp||70)/3)*3;
  const humBucket=Math.round((w.humidity||45)/10)*10;
  const recentIds=state.wearHistory.slice(0,5).map(x=>x.id||'').join(',');
  const cacheKey=[occasion,mood,dna||'Auto',tempBucket,humBucket,recentIds,state.collection.length].join('|');
  if(_recCache&&_recCache.key===cacheKey)return _recCache.value;
  const value=_recommendWearImpl(occasion,mood,dna,w);
  _recCache={key:cacheKey,value};
  return value;
}
function _recommendWearImpl(occasion,mood,dna,w){
  let target,reason;
  if(w.temp>=78||w.humidity>=70){target=['Fresh','Aquatic','Citrus','Green','Musk / Powdery'];reason=`warm humid ${Math.round(w.temp)}°F → fresh aquatic`}
  else if(w.temp<=55){target=['Amber','Tobacco','Vanilla','Spicy','Woody','Gourmand','Oud'];reason=`cool ${Math.round(w.temp)}°F → cozy amber`}
  else if(w.temp>=68){target=['Blue','Aromatic','Woody','Fresh','Green','Citrus'];reason=`mild ${Math.round(w.temp)}°F → blue aromatic`}
  else{target=['Aromatic','Woody','Fresh','Fougere','Green'];reason=`cool mild ${Math.round(w.temp)}°F → aromatic fougere`}
  if(occasion&&occasion!=='Auto'){reason+=` · ${occasion.toLowerCase()}`}
  if(mood&&mood!=='Auto'){reason+=` · ${mood.toLowerCase()} mood`}
  if(dna&&dna!=='Auto'){reason+=` · ${dna.toLowerCase()} DNA`}
  const moodDna=mood&&mood!=='Auto'?(MOOD_DNA[mood]||[]):[];
  const isBeast=MOOD_BEAST.includes(mood);
  const recentIds=state.wearHistory.slice(0,5).map(w=>w.id);
  const scored=state.collection.filter(f=>!f.unavailable).map(f=>{
    const dnaFit=f.dna.filter(d=>target.includes(d)).length;
    const seasonFit=seasonForTemp(f,w.temp)?1:0;
    const recentPenalty=recentIds.includes(f.id)?-15:0;
    let occBoost=0;
    if(occasion&&occasion!=='Auto'){
      const has=(f.occasions||[]).includes(occasion);
      occBoost=has?25:-40;
    }
    let moodBoost=0;
    if(moodDna.length){
      const overlap=f.dna.filter(d=>moodDna.includes(d)).length;
      moodBoost=overlap*12-(overlap===0?20:0);
    }
    if(isBeast){

async function geocodeCity(name){
  const q=(name||'').trim();
  if(!q)return null;
  const url=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`;
  const data=await fetch(url).then(r=>{if(!r.ok)throw new Error('geocode failed');return r.json()});
  const hit=data&&data.results&&data.results[0];
  if(!hit)return null;

  return {lat:hit.latitude,lon:hit.longitude,label};
}

function collectionHealth(){
  const total=state.collection.length||0;
  const dua=state.collection.filter(f=>f.house==='The Dua Brand').length;
  const anchors=state.collection.filter(f=>(f.flag||'').toUpperCase()==='ANCHOR').length;
  const dupes=state.collection.filter(f=>['EXACT DUP','NEAR DUP'].includes((f.flag||'').toUpperCase())).length;
  const saturated=Object.values(clusterCounts()).filter(v=>v>=5).length;
  const dnaCovered=DNA.filter(d=>state.collection.some(f=>(f.dna||[]).includes(d))).length;
  let score=72+Math.min(12,anchors)+Math.round((dnaCovered/DNA.length)*10)-Math.min(14,dupes*2)-Math.min(10,saturated*2);
  score=Math.max(0,Math.min(100,score));
  const status=score>=86?'Excellent':score>=76?'Strong, needs pruning':score>=66?'Useful but crowded':'Needs cleanup';
  const canonical=total===SOURCE_TRUTH.bottles&&dua===SOURCE_TRUTH.dua&&new Set(state.collection.map(f=>f.house)).size===SOURCE_TRUTH.houses;
  return {total,dua,anchors,dupes,saturated,dnaCovered,score,status,canonical}
}

function wheelView(){
  let counts=DNA.map(d=>({d,c:state.collection.filter(f=>f.dna.includes(d)).length}));
  let total=counts.reduce((s,x)=>s+x.c,0)||1;
  let start=-Math.PI/2,cx=210,cy=210,r=190;
  let paths=counts.map(x=>{
    let ang=x.c/total*Math.PI*2;
    let p=arc(cx,cy,r,start,start+ang);
    start+=ang;
    return `<path class="wedge ${state.wheelTag===x.d?'selected':''}" d="${p}" fill="${DNA_COLOR[x.d]}" data-action="wheel" data-tag="${esc(x.d)}"><title>${esc(x.d)}: ${x.c}</title></path>`
  }).join('');
  let selected=state.wheelTag;
  let bottles=selected?state.collection.filter(f=>f.dna.includes(selected)):[];
  // Best partners for this lane (bottles outside the lane that pair well with bottles in it)
  let partners=[];
  if(selected&&bottles.length){
    const m=new Map();
    for(const inLane of bottles){
      for(const out of state.collection){
        if(out.id===inLane.id||out.dna.includes(selected))continue;
        const r=compatibleCore(inLane,out);
        if(r&&!r.clash&&r.score>=70){
          const key=out.id;
          if(!m.has(key)||m.get(key).score<r.score)m.set(key,{f:out,with:inLane,score:r.score})
        }
      }
    }
    partners=[...m.values()].sort((a,b)=>b.score-a.score).slice(0,4)
  }
  return `<section class="view active">
    <div class="card">
      <h2>DNA Wheel</h2>
      <p class="sub">Tap a slice to see what's in that lane and find layering partners.</p>
      <div class="wheelWrap"><svg class="wheel" viewBox="0 0 420 420">${paths}<circle cx="210" cy="210" r="82" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/><text x="210" y="206" text-anchor="middle" fill="var(--text)" font-size="22" font-family="Cormorant Garamond" font-weight="600">${state.collection.length}</text><text x="210" y="228" text-anchor="middle" fill="var(--muted)" font-size="11" letter-spacing="2">BOTTLES</text></svg></div>
      <div class="legendGrid">${counts.map(x=>`<button class="chip ${x.c===0?'gap':''} ${state.wheelTag===x.d?'active':''}" data-action="wheel" data-tag="${esc(x.d)}"><span style="width:10px;height:10px;border-radius:50%;background:${DNA_COLOR[x.d]};display:inline-block;flex-shrink:0"></span>${esc(x.d)} · ${x.c}</button>`).join('')}</div>
    </div>
    ${selected?`
      <div class="card">
        <div class="between"><h3>${esc(selected)} (${bottles.length})</h3><button class="btn sm secondary" data-action="wheel" data-tag="${esc(selected)}">✕</button></div>
        ${bottles.length?bottles.map(f=>`<div class="lineItem" style="margin-bottom:6px"><div class="between"><b>${esc(f.name)}</b><button class="btn sm secondary" data-action="openBottle" data-id="${escAttr(f.id)}">Open</button></div><span class="small">${esc(f.house)} · ${esc(f.season)} · ${'★'.repeat(f.rating)}</span></div>`).join(''):'<div class="empty">Gap: 0 bottles in this lane.<br><br><button class="btn sm secondary" data-action="openAdd">+ Add a bottle</button></div>'}
      </div>
      ${partners.length?`<div class="card"><h3>Best partners outside this lane</h3>${partners.map(p=>`<div class="lineItem" style="margin-bottom:6px"><div class="between"><b>${esc(p.f.name)}</b><span class="anchorScore">${p.score}</span></div><span class="small">Pairs with: ${esc(p.with.name)}</span></div>`).join('')}</div>`:''}
    `:''}
  </section>`
}
function arc(cx,cy,r,a0,a1){if(a1-a0<.001)return'';let x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);let large=a1-a0>Math.PI?1:0;return`M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} Z`}

function statsView(){
  const total=state.collection.length;
  const unavailableCount=state.collection.filter(f=>f.unavailable).length;
  const availableTotal=total-unavailableCount;
  const houses=new Set(state.collection.map(f=>f.house)).size;
  const totalWears=state.wearHistory.length;
  const anchorBottles=state.collection.filter(f=>f.flag==='ANCHOR').length;
  const wearCounts={};
  state.wearHistory.forEach(w=>{if(w.id)wearCounts[w.id]=(wearCounts[w.id]||0)+1});

function calcStreak(){
  if(!state.wearHistory.length)return 0;
  const days=new Set(state.wearHistory.map(w=>new Date(w.date).toDateString()));
  let streak=0;
  let d=new Date();
  while(days.has(d.toDateString())){streak++;d.setDate(d.getDate()-1)}
  return streak
}

// ============ ISO E SUPER LAYERING INTELLIGENCE ============
// Reads from state.collection (source truth: 202 bottles / 102 Dua), enriches with ISO_E_DATA by name match,
// and adds Iso E-specific scoring, weather, and layering UX. All scoped to .isoe-* CSS.
const ISO_E_NORM=Object.fromEntries(ISO_E_DATA.map(d=>[d.n.toLowerCase().replace(/[^a-z0-9]/g,''),d]));
// Manual aliases for known Sillage↔Iso E name divergences (typos, abbreviations, accents)
const ISO_E_ALIASES={
  'silver':'silveroil',
  'yourtouchsandal':'yourtouchsantal',
  'elixirposeidonclassicpineapple':'elixirofposeidonsclassicpineapple',
  'imperialematrix':'imperialematrix', // canonicalize é→e
  'imperialmatrix':'imperialematrix'
};
const ISO_E_FUZZY=Object.fromEntries(ISO_E_DATA.map(d=>{
  const noise=new Set(['the','of','at','in','by','with','a','an','de','le','la']);
  const k=d.n.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!noise.has(t)).sort().join('');
  return [k,d];
}));
const ISO_E_COMBOS=[
  {name:'Spring Daily Driver',frags:['Ottoman Breeze','His Perspective'],ratio:'2 + 2 sprays',ctx:'Aromatic woody base from Hacivat-style Ottoman Breeze, layered with the fresh-clean Perspective backbone. Year-round but peaks in spring on warm days. Iso E Super lifts both — adds 2-3 hours of projection.'},
  {name:'Poseidon\'s Day Stack',frags:['Poseidon\'s Swimming Cologne','His Perspective'],ratio:'2 + 2 sprays',ctx:'Aventus Cologne x Afternoon Swim freshness over Perspective\'s ambrox base. Daytime fresh stacking — Iso E Super extends the volatile citrus opening significantly.'},
  {name:'Spicy Fireplace (Evening)',frags:['Jean Lowe Immortal','Ameer Al Oudh Intense'],ratio:'2 : 1',ctx:'JLI cool aromatic woods grounded by Ameer Al Oudh\'s smoky-tobacco fireplace. Cold-weather evening only — overpowers in heat. Iso E reinforces the cedrene-resin backbone.'},
  {name:'Winter Glacier',frags:['Glacier Le Noir','Poseidon\'s Swimming Cologne'],ratio:'2 + 1 sprays',ctx:'JPG Le Male Le Parfum DNA + Aventus Cologne lift. Heavy lavender-vanilla anchored, then brightened. Iso E adds woody depth without breaking the gourmand cool.'}
];
function isoENorm(s){return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'')}
// Tokenized normalizer for fuzzy matching — strips noise words and ordering
function isoENormTokens(s){
  const noise=new Set(['the','of','at','in','by','with','a','an','de','le','la']);
  return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!noise.has(t)).sort().join('')
}
function isoEEnrich(f){
  const norm=isoENorm(f.name);
  // Try exact
  const exact=ISO_E_NORM[norm];
  if(exact)return {...f,...exact,_iso:exact};
  // Try alias
  const aliased=ISO_E_ALIASES[norm];
  if(aliased&&ISO_E_NORM[aliased])return {...f,...ISO_E_NORM[aliased],_iso:ISO_E_NORM[aliased]};
  // Try fuzzy by sorted tokens with noise words stripped
  const fuzzy=ISO_E_FUZZY[isoENormTokens(f.name)];
  if(fuzzy)return {...f,...fuzzy,_iso:fuzzy};
  // Last resort: substring/superstring match
  for(const [k,v] of Object.entries(ISO_E_NORM)){
    if(k.length>=8&&norm.length>=8&&(k.startsWith(norm)||norm.startsWith(k))){
      return {...f,...v,_iso:v};
    }
  }
  // Fallback: derive Iso E fields from existing DNA
  const fam=isoEFamFromDna(f.dna||[]);
  return {...f,n:f.name,h:f.house,ib:f.inspiration,fl:f.flag||'DISTINCT',v:'YES',b:'DEPTH, LONG',sp:2,w:'Chest',dna:(f.dna||[]).join(', ').toLowerCase(),fam,imp:'',sc:isoEDefaultScore(fam),se:f.season,oc:(f.occasions||[]).join(' / '),ti:'flexible',_inferred:true}
}
function isoEFamFromDna(dnaList){
  const map={'Citrus':'citrus','Aquatic':'aquatic','Aromatic':'aromatic','Blue':'aromatic','Chypre':'chypre','Floral':'floral','Fougere':'fougere','Fresh':'aquatic','Fruity':'fruity','Gourmand':'gourmand','Green':'green','Leather':'leather','Musk / Powdery':'musk','Oud':'oud','Spicy':'spicy','Sweet':'gourmand','Tobacco':'tobacco','Vanilla':'vanilla','Vetiver / Earthy':'vetiver','Woody':'woody','Amber':'amber'};
  return [...new Set((dnaList||[]).map(d=>map[d]).filter(Boolean))]
}
function isoEFamHas(fam,items){return (fam||[]).some(x=>items.includes(x))}
function isoEScoreScore(f){
  const fam=f.fam||[];
  const dnaText=((f.dna||'')+' '+(f.ib||'')+' '+(f.n||'')).toLowerCase();
  const benefitText=(f.b||'').toUpperCase();
  const verdict=(f.v||'YES').toUpperCase();
  const flag=(f.fl||'').toUpperCase();

  // Start neutral. Iso E is an enhancer, not a magic performance booster.
  let s=5;

  // Best fits: transparent woods, vetiver, aromatic blue, chypre, fougere, green, and clean musks.
  if(isoEFamHas(fam,['woody']))s+=1.7;
  if(isoEFamHas(fam,['vetiver']))s+=1.4;
  if(isoEFamHas(fam,['aromatic','fougere']))s+=1.1;
  if(isoEFamHas(fam,['chypre','incense']))s+=1.0;
  if(isoEFamHas(fam,['green','musk']))s+=.7;
  if(isoEFamHas(fam,['citrus','aquatic','marine']))s+=.45;

  // Risky fits: dense sweets and resins can sit on top of Iso E instead of merging with it.
  if(isoEFamHas(fam,['gourmand']))s-=1.7;
  if(isoEFamHas(fam,['vanilla','oud']))s-=1.1;
  if(isoEFamHas(fam,['tobacco','leather','smoke']))s-=.75;
  if(isoEFamHas(fam,['amber','spicy']))s-=.25;
  if(isoEFamHas(fam,['floral'])&&!isoEFamHas(fam,['woody','musk','aromatic']))s-=.9;

  // Text-level corrections for your collection. These catch note profiles not perfectly represented by broad DNA tags.
  if(/vetiver|cedar|sandalwood|oakmoss|moss|mineral|dry woods|woody|chypre|fougere|fougère|barbershop|incense|ambrox|ambroxan|iso.?e/.test(dnaText))s+=.7;
  if(/aquatic|marine|citrus|bergamot|grapefruit|ginger|neroli|tea|green apple|mint/.test(dnaText))s+=.25;
  if(/cotton candy|caramel|praline|chocolate|coffee|toffee|rum|boozy|cinnamon|apple pie|creme brulee|crème brûlée|dates|honey|dense sweet|gourmand/.test(dnaText))s-=.8;
  if(/oud|rose vanilla|heavy|thick|syrup|syrupy|tobacco vanilla|vanilla amber/.test(dnaText))s-=.45;

  // Manual benefit tags still matter, but they now nudge instead of dominating.
  if(benefitText.includes('AMP'))s+=.45;
  if(benefitText.includes('PROJ'))s+=.35;
  if(benefitText.includes('LONG'))s+=.3;
  if(benefitText.includes('BIND'))s+=.25;
  if(benefitText.includes('LIFT'))s+=.25;
  if(benefitText.includes('DEPTH'))s+=.1;
  if(benefitText==='—')s-=2;

  // CAUTION should never appear as a strong recommendation.
  if(verdict.includes('CAUTION'))s=Math.min(s,4);
  if(verdict.includes('NO'))s=Math.min(s,3);

  // Duplicate flags do not mean Iso E is bad, but avoid over-crediting redundant lanes.
  if(flag.includes('EXACT DUP'))s-=.35;
  if(flag.includes('NEAR DUP'))s-=.2;

  return Math.max(1,Math.min(10,Math.round(s)))
}
function isoEDefaultScore(fam){
  // Used only when a bottle has no manual Iso E record. Keep inferred scores conservative.
  const f={fam,b:'DEPTH, LONG',v:'YES',dna:(fam||[]).join(' ')};
  return Math.max(3,Math.min(8,isoEScoreScore(f)))
}
// Decode benefit codes into human-readable labels + tooltips
const ISO_E_BENEFIT_MAP={
  AMP:{label:'Amplifies scent',desc:'Reinforces existing woody/aromatic notes via shared cedrene structure',cls:'amp'},
  LONG:{label:'Extends longevity',desc:'Heavy molecular weight slows evaporation, adding 2-3 hours of wear',cls:'long'},
  PROJ:{label:'Boosts projection',desc:'Diffusive cedarwood creates a wider sillage trail around the body',cls:'proj'},
  DEPTH:{label:'Adds depth',desc:'Builds an invisible woody scaffold beneath the composition',cls:'depth'},
  BIND:{label:'Fixative anchor',desc:'Lipophilic structure traps volatile top notes on skin',cls:'bind'},
  LIFT:{label:'Lifts composition',desc:'Adds airy radiance that carries notes further from skin',cls:'lift'}
};
function isoEParseBenefits(b){
  if(!b||b==='—')return [];
  return b.split(',').map(x=>x.trim()).filter(Boolean).map(code=>ISO_E_BENEFIT_MAP[code]||{label:code,desc:'',cls:''})
}
function isoEAllFrags(){
  // Reads from Sillage's collection; enriches each with Iso E data
  const customsByKey={};
  state.isoE.customs.forEach(c=>{customsByKey[c.n+'|||'+c.h]=c});
  const deletedSet=new Set(state.isoE.deleted);
  return state.collection
    .map(isoEEnrich)
    .filter(f=>!deletedSet.has(f.n+'|||'+f.h))
    .map(f=>{const o=customsByKey[f.n+'|||'+f.h];return o?{...f,...o,_overridden:true}:f})
}
function isoEKey(f){return f.n+'|||'+f.h}
function isoEIsFav(f){return state.isoE.favs.includes(isoEKey(f))}
function isoEIsHidden(f){return state.isoE.hidden.includes(isoEKey(f))}
function isoEWxAdj(f,wx){
  if(!wx)return 0;
  let a=0;const{temp,humidity,code,wind}=wx;
  const fam=f.fam||[];
  const isFresh=isoEFamHas(fam,['citrus','aquatic','marine','green','aromatic']);
  const isHeavy=isoEFamHas(fam,['gourmand','tobacco','oud','smoke','vanilla','leather']);
  const isWoody=isoEFamHas(fam,['woody','vetiver','aromatic','fougere','chypre','incense','musk']);

  // Hot weather: Iso E can help fresh scents survive, but heavy sweet scents get muddy.
  if(temp>=88){if(isFresh)a+=1;if(isHeavy)a-=2}
  else if(temp>=78){if(isFresh)a+=1;if(isHeavy)a-=1}

  // Cool/cold weather: woody scaffolding helps, but thin aquatics still should not be overrated.
  if(temp<=42){if(isWoody)a+=1;if(isoEFamHas(fam,['aquatic','marine']))a-=1;if(isHeavy)a+=.5}
  else if(temp<=55){if(isWoody)a+=.5}

  // Humidity makes sweet/heavy profiles balloon. Iso E is better for dry woods than syrupy sweetness here.
  if(humidity>=78){if(isWoody)a+=.5;if(isoEFamHas(fam,['aquatic','marine']))a-=1;if(isHeavy)a-=1}
  else if(humidity<=32){if(isFresh||isWoody)a+=.5}

  // Rain/drizzle favors woods, vetiver, incense and fougere. It does not automatically improve gourmands.
  if(code>=51&&code<=67){if(isWoody)a+=1;if(isHeavy&&!isWoody)a-=.5}

  // Wind can help diffusion for sturdy woody/aromatic profiles, but it blows away fragile citrus/aquatic tops.
  if(typeof wind==='number'&&wind>=14){if(isWoody)a+=.5;if(isoEFamHas(fam,['citrus','aquatic','marine']))a-=.5}

  return Math.round(Math.max(-2,Math.min(2,a)))
}
function isoEBaseScore(f){
  // Blend manual score with rule-based compatibility so old table values cannot overrate bad matches.
  const compat=isoEScoreScore(f);
  const manual=Number(f.sc||0)||compat;
  let base=Math.round((compat*0.72)+(manual*0.28));
  const verdict=(f.v||'YES').toUpperCase();
  if(verdict.includes('CAUTION'))base=Math.min(base,4);
  if((f.b||'')==='—')base=Math.min(base,4);
  return Math.max(1,Math.min(10,base))
}
function isoEIsTrueCaution(f){
  const verdict=(f.v||'').toUpperCase();
  return verdict.includes('CAUTION')||verdict.includes('NO')||(f.b||'')==='—';
}
function isoEScore(f){
  const adj=isoEWxAdj(f,state.weather);
  let final=Math.min(10,Math.max(1,isoEBaseScore(f)+adj));
  // Hard sync: a true CAUTION / NO / no-benefit entry can never display as a strong score.
  if(isoEIsTrueCaution(f))final=Math.min(final,4);
  return final;
}
function isoEScoreBreakdown(f){
  const base=isoEBaseScore(f);
  const raw=f.sc||base;
  const compat=isoEScoreScore(f);
  const adj=isoEWxAdj(f,state.weather);
  let final=Math.min(10,Math.max(1,base+adj));
  if(isoEIsTrueCaution(f))final=Math.min(final,4);
  const fam=f.fam||[];
  const reasons=[];
  if(isoEFamHas(fam,['woody','vetiver','aromatic','fougere','chypre','incense']))reasons.push('Strong structural match: dry woods/aromatics/vetiver/fougere merge naturally with Iso E Super.');
  if(isoEFamHas(fam,['citrus','aquatic','marine','green','musk']))reasons.push('Useful support: Iso E can add lift and longevity to fresh, green, citrus, aquatic, and musk profiles.');
  if(isoEFamHas(fam,['gourmand','vanilla','oud','tobacco','leather','smoke']))reasons.push('Caution: dense sweet, tobacco, oud, leather, smoke, and heavy vanilla can sit above Iso E instead of blending cleanly.');
  if((f.v||'').toUpperCase().includes('CAUTION')||(f.b||'')==='—')reasons.push('Manual note says test first, so the score is capped.');
  const baseReason=reasons.length?reasons.join(' '):'Mixed family — Iso E gives modest lift, but not enough to treat it as a must-layer.';
  let wxReason='No weather adjustment — baseline score applies.';
  if(state.weather){
    const{temp,humidity,code,wind}=state.weather;
    const isFresh=isoEFamHas(fam,['citrus','aquatic','marine','green','aromatic']);
    const isHeavy=isoEFamHas(fam,['gourmand','tobacco','oud','smoke','vanilla','leather']);
    const isWoody=isoEFamHas(fam,['woody','vetiver','aromatic','fougere','chypre','incense','musk']);
    const wx=[];
    if(temp>=78&&isFresh)wx.push('warm weather makes Iso E useful for extending fresh tops');
    if(temp>=78&&isHeavy)wx.push('warm weather penalizes heavy sweet/resinous profiles because they can get muddy');
    if(temp<=55&&isWoody)wx.push('cool weather rewards woody/aromatic structure');
    if(temp<=42&&isoEFamHas(fam,['aquatic','marine']))wx.push('cold weather penalizes thin aquatic/marine profiles');
    if(humidity>=78&&isWoody)wx.push('humidity gives woody profiles more carry');
    if(humidity>=78&&isHeavy)wx.push('humidity penalizes dense sweet/heavy profiles');
    if(code>=51&&code<=67&&isWoody)wx.push('rain favors woods, vetiver, incense, and fougere');
    if(typeof wind==='number'&&wind>=14&&isWoody)wx.push('wind helps sturdy woody/aromatic diffusion');
    if(typeof wind==='number'&&wind>=14&&isoEFamHas(fam,['citrus','aquatic','marine']))wx.push('wind blows off fragile citrus/aquatic tops');
    if(wx.length)wxReason=wx.join('; ')+'.';
  }
  return {base,raw,compat,adj,final,baseReason,wxReason}
}

  return `<div class="card">

    <div class="chips" style="margin-top:10px">${tabs.map(([t,l])=>`<button class="chip ${state.isoE.tab===t?'active':''}" data-action="isoeTab" data-tab="${t}">${l}${t==='hidden'&&state.isoE.hidden.length?' · '+state.isoE.hidden.length:''}${t==='trash'&&state.isoE.deleted.length?' · '+state.isoE.deleted.length:''}</button>`).join('')}</div>
