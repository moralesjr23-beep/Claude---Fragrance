/* === close detail + plane spray guidance pass === */
.collection-detail-actions #clearSelectedFragrance{
  min-height:42px;
}

/* ══════════════════════════════════════════
   PREMIUM iOS PASS — material, depth, motion
   ══════════════════════════════════════════ */

/* 1. CARDS — deeper material, stronger specular highlight */
.card {
  background: linear-gradient(160deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,.06) 32%), var(--panel);
  border-color: rgba(82,54,18,.14);
  box-shadow:
    0 1px 0 rgba(255,255,255,.72) inset,
    0 -1px 0 rgba(48,30,8,.04) inset,
    0 2px 8px rgba(48,30,8,.04),
    0 12px 28px rgba(48,30,8,.08);
}
.card::after {
  height: 1px;
  background: linear-gradient(90deg, transparent 8%, rgba(255,255,255,.82) 50%, transparent 92%);
}
:root[data-theme="dark"] .card {
  box-shadow:
    0 1px 0 rgba(255,220,140,.06) inset,
    0 4px 16px rgba(0,0,0,.36),
    0 20px 48px rgba(0,0,0,.42) !important;
}

/* 2. TAB BAR — letter-spacing tuning only, active pill handled above */
.tab {
  letter-spacing: .01em;
  font-weight: 800;
}

/* 3. BUTTONS — iOS-style raised surface */
button {
  border-radius: 13px;
  background: linear-gradient(180deg, rgba(255,255,255,.68) 0%, rgba(255,255,255,.18) 100%), rgba(255,251,244,.72);
  box-shadow:
    0 1px 0 rgba(255,255,255,.88) inset,
    0 -1px 0 rgba(48,30,8,.06) inset,
    0 2px 8px rgba(48,30,8,.07),
    0 8px 20px rgba(48,30,8,.06);
  border-color: rgba(82,54,18,.14);
  font-weight: 700;
  letter-spacing: .005em;
}
button:hover {
  background: linear-gradient(180deg, rgba(255,255,255,.82) 0%, rgba(255,255,255,.28) 100%), rgba(255,251,244,.82);
  box-shadow:
    0 1px 0 rgba(255,255,255,.92) inset,
    0 -1px 0 rgba(48,30,8,.06) inset,
    0 4px 14px rgba(48,30,8,.10),
    0 12px 28px rgba(48,30,8,.09);
  transform: translateY(-1px);
}
:root[data-theme="dark"] button {
  box-shadow:
    0 1px 0 rgba(255,220,140,.08) inset,
    0 2px 8px rgba(0,0,0,.28),
    0 8px 20px rgba(0,0,0,.22) !important;
}

/* 4. IOS LIST ROWS — cleaner, tighter chevron */
.ios-row {
  padding: 13px 15px;
  border-radius: var(--r-inner);
  box-shadow:
    0 1px 0 rgba(255,255,255,.7) inset,
    0 2px 6px rgba(48,30,8,.03),
    0 8px 22px rgba(48,30,8,.05);
  border-color: rgba(82,54,18,.09);
}
.ios-chevron {
  font-size: var(--text-base);
  opacity: .38;
  font-weight: 300;
}
.ios-row-title { font-weight: 700; letter-spacing: -.02em; }

/* 5. FORM CONTROLS — deep inset (iOS "well" look) */
input, select, textarea {
  background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.52));
  box-shadow:
    inset 0 1px 3px rgba(48,30,8,.08),
    inset 0 0 0 1px rgba(82,54,18,.06),
    0 1px 0 rgba(255,255,255,.7);
  border-color: rgba(82,54,18,.16);
}
input:focus, select:focus, textarea:focus {
  background: linear-gradient(180deg, rgba(255,255,255,.90), rgba(255,255,255,.68));
  box-shadow:
    inset 0 1px 3px rgba(48,30,8,.06),
    0 0 0 3px rgba(183,137,52,.20),
    0 0 0 5px rgba(183,137,52,.08);
  border-color: rgba(183,137,52,.60);
}

/* 6. SHEETS — more iOS-native */
.sheet {
  border-top-left-radius: 32px;
  border-top-right-radius: 32px;
  box-shadow:
    0 -1px 0 rgba(255,255,255,.12) inset,
    0 -6px 24px rgba(0,0,0,.10),
    0 -20px 60px rgba(0,0,0,.16);
}
.sheet::before {
  width: 36px;
  height: 5px;
  background: rgba(82,54,18,.26);
  margin-bottom: 18px;
  border-radius: 999px;
}

/* 7. STAT / ICONSTAT — more physicality */
.stat, .iconstat {
  border-radius: var(--r-inner);
  box-shadow:
    0 1px 0 rgba(255,255,255,.72) inset,
    0 2px 6px rgba(48,30,8,.04),
    0 8px 20px rgba(48,30,8,.06);
  border-color: rgba(82,54,18,.10);
}
:root[data-theme="dark"] .stat,
:root[data-theme="dark"] .iconstat {
  box-shadow: 0 1px 0 rgba(255,220,140,.05) inset, 0 4px 16px rgba(0,0,0,.28) !important;
}

:root[data-theme="dark"] .iconbubble,
:root[data-theme="dark"] .icon-badge {
  box-shadow:
    0 2px 4px rgba(0,0,0,.5),
    0 6px 20px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.28),
    inset 0 -1px 0 rgba(0,0,0,.2) !important;
}

/* 8. ICONBUBBLE — full gold emblem, matches brandmark language */
.iconbubble, .icon-badge {
  border-radius: var(--r-control);
  background: linear-gradient(145deg, #dbb560 0%, #b78934 45%, #8f651d 100%);
  color: #fff !important;
  box-shadow:
    0 2px 4px rgba(60,38,10,.28),
    0 6px 18px var(--accent-mid),
    inset 0 1px 0 rgba(255,255,255,.32),
    inset 0 -1px 0 rgba(0,0,0,.14);
  border: 1px solid rgba(143,101,29,.35);
}

/* 9. SEGMENT CONTROL — deeper inset */
.ios-segment, .journal-subnav {
  background: linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.02)), var(--panel-inset);
  box-shadow: inset 0 1px 3px rgba(48,30,8,.08), inset 0 0 0 1px rgba(82,54,18,.05);
  border-color: rgba(82,54,18,.10);
}
.ios-segment button.active, .journal-subnav button.active {
  box-shadow:
    0 1px 0 rgba(255,255,255,.88) inset,
    0 2px 8px rgba(48,30,8,.08),
    0 6px 16px rgba(48,30,8,.07);
  background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
}
:root[data-theme="dark"] .ios-segment button.active,
:root[data-theme="dark"] .journal-subnav button.active {
  background: rgba(255,220,140,.10);
  box-shadow: 0 1px 0 rgba(255,220,140,.08) inset, 0 2px 8px rgba(0,0,0,.28);
}

/* 10. NUM / LARGE NUMBERS — optically sharper */
/* .num defined in utilities below */

/* 11. HERO STATS — elevated inset tiles */
.hero-stat {
  border-radius: var(--r-inner);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.42), 0 1px 4px rgba(48,30,8,.04);
}

/* 12. BRAND HEADER — stronger shimmer line */
.brand::after {
  height: 1px;
  background: linear-gradient(90deg, transparent 10%, #c49840 50%, transparent 90%);
  opacity: 1;
  left: 24px; right: 24px;
}

/* 13. TOAST — elevated, pill-shaped */
.toast {
  border-radius: var(--r-inner);
  padding: 13px 18px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.44) inset,
    0 4px 14px rgba(0,0,0,.10),
    0 16px 40px rgba(0,0,0,.14);
  backdrop-filter: blur(28px) saturate(1.28);
  -webkit-backdrop-filter: blur(28px) saturate(1.28);
  font-weight: 700;
}

/* 14. LISTBTN — consistent with ios-row */
.listbtn {
  border-radius: var(--r-inner);
  box-shadow:
    0 1px 0 rgba(255,255,255,.68) inset,
    0 2px 6px rgba(48,30,8,.04),
    0 8px 20px rgba(48,30,8,.06);
  border-color: rgba(82,54,18,.10);
}

/* 15. VAULT ADVISOR CARD — stronger presence */
.vault-advisor-card {
  border-color: rgba(82,54,18,.17) !important;
  box-shadow:
    0 1px 0 rgba(255,255,255,.54) inset,
    0 4px 14px rgba(48,30,8,.06),
    0 16px 40px rgba(48,30,8,.10) !important;
}

/* 16. METER TRACK — deeper groove */
.meter, .score-meter {
  background: rgba(82,54,18,.08);
  box-shadow: inset 0 1px 2px rgba(48,30,8,.10);
}

/* 17. KICKER — final tuning for optical balance */
.kicker {
  font-size: var(--text-xs);
  letter-spacing: .26em;
}

/* 18. EMPTY STATE — softer dashed border */
.empty-state, .empty-card {
  border-style: dashed;
  border-color: rgba(82,54,18,.11);
  background: linear-gradient(180deg, rgba(255,255,255,.08), transparent 60%), var(--panel-inset);
}

/* 19. DARK MODE — deeper, richer shadows throughout */
:root[data-theme="dark"] .ios-row {
  box-shadow: 0 1px 0 rgba(255,220,140,.05) inset, 0 4px 14px rgba(0,0,0,.28), 0 12px 32px rgba(0,0,0,.32) !important;
  border-color: rgba(220,185,120,.07) !important;
}
:root[data-theme="dark"] .listbtn {
  box-shadow: 0 1px 0 rgba(255,220,140,.04) inset, 0 4px 14px rgba(0,0,0,.28) !important;
}
:root[data-theme="dark"] .toast {
  box-shadow: 0 1px 0 rgba(255,220,140,.06) inset, 0 6px 20px rgba(0,0,0,.40), 0 20px 50px rgba(0,0,0,.44) !important;
}

/* 20. MICRO-INTERACTION — press feedback more physical */
button:active, .tab:active, .listbtn:active, .ios-row:active {
  transform: scale(.975) !important;
  opacity: .88 !important;
  transition: transform .09s ease, opacity .09s ease !important;
}

/* 21. ACCENT BARS — bold gradient ribbons with glow */
.accent-bar {
  position: relative;
  overflow: hidden;
}
.accent-bar::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 5px; height: 100%;
  border-radius: 5px 0 0 5px;
  background: linear-gradient(180deg, #e8c070 0%, #b78934 50%, #8f651d 100%);
  opacity: 1;
  box-shadow: 3px 0 10px rgba(183,137,52,.4);
}
.accent-bar.bar-good::before {
  background: linear-gradient(180deg, #52c98a 0%, #2e8a56 50%, #1a6038 100%);
  box-shadow: 3px 0 10px rgba(46,138,86,.4);
}
.accent-bar.bar-warn::before {
  background: linear-gradient(180deg, #f5b84a 0%, #c07830 50%, #8a5018 100%);
  box-shadow: 3px 0 10px rgba(192,120,48,.4);
}
.accent-bar.bar-blue::before {
  background: linear-gradient(180deg, #5b9de8 0%, #2f6abf 50%, #1a4a9a 100%);
  box-shadow: 3px 0 10px rgba(47,106,191,.4);
}
.accent-bar.bar-violet::before {
  background: linear-gradient(180deg, #9b72cf 0%, #6e3db8 50%, #4e2490 100%);
  box-shadow: 3px 0 10px rgba(110,61,184,.4);
}
.accent-bar.bar-muted::before {
  background: linear-gradient(180deg, #9aa0a8 0%, #6e7880 50%, #4e5860 100%);
  box-shadow: 3px 0 6px rgba(80,90,100,.3);
}
.accent-bar > .accent-bar-content { padding-left: 14px; }



/* ══════════════════════════════════════════
   WEAR PICK CARDS — colourful rank bands
   ══════════════════════════════════════════ */
.wear-pick-card {
  display: flex;
  flex-direction: column;
  width: 100%;
  text-align: left;
  border-radius: var(--r-inner);
  border: 1px solid var(--border);
  overflow: hidden;
  background: var(--panel);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .18s ease, transform .14s ease;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.wear-pick-card:hover  { box-shadow: var(--shadow); transform: translateY(-1px); }
.wear-pick-card:active { transform: scale(0.98) translateY(0); box-shadow: var(--shadow-sm); transition: transform 0.08s ease; }
.wear-pick-card:active { transform: scale(.985); }

/* ── Rank band — full-width coloured header ── */
.wear-pick-band {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  padding: var(--sp-2) var(--sp-3);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .10em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
}
.wear-pick-sym   { font-size: 14px; line-height: 1; }
.wear-pick-label { flex: 1; }
.wear-pick-score {
  /* override score-badge for inline use in band */
  min-width: 52px !important;
  min-height: 28px !important;
  font-size: var(--text-xs) !important;
  font-weight: 800 !important;
  background: rgba(255,255,255,.22) !important;
  border-color: rgba(255,255,255,.28) !important;
  box-shadow: none !important;
  color: inherit !important;
}

/* Gold — #1 Safest */
.wear-pick--gold .wear-pick-band {
  background: linear-gradient(135deg, #e8c070 0%, #c49840 55%, #a87c28 100%);
  color: #1a0f02;
}
/* Green — #2 Most unique */
.wear-pick--green .wear-pick-band {
  background: linear-gradient(135deg, #52c98a 0%, #2e8a56 55%, #1a6038 100%);
  color: #fff;
}
/* Blue — #3 Best performer */
.wear-pick--blue .wear-pick-band {
  background: linear-gradient(135deg, #5b9de8 0%, #2f6abf 55%, #1a4a9a 100%);
  color: #fff;
}
/* Violet — #4 Strong backup */
.wear-pick--violet .wear-pick-band {
  background: linear-gradient(135deg, #9b72cf 0%, #6e3db8 55%, #4e2490 100%);
  color: #fff;
}
/* Slate — #5 Fifth option */
.wear-pick--slate .wear-pick-band {
  background: linear-gradient(135deg, #7a8a9a 0%, #566070 55%, #3e4a58 100%);
  color: #fff;
}

/* Dark mode band adjustments */
:root[data-theme="dark"] .wear-pick--gold .wear-pick-band   { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%); color: #fff; }
:root[data-theme="dark"] .wear-pick--green .wear-pick-band  { background: linear-gradient(135deg, #2e8a56 0%, #1a5c38 100%); }
:root[data-theme="dark"] .wear-pick--blue .wear-pick-band   { background: linear-gradient(135deg, #2f6abf 0%, #1a4090 100%); }
:root[data-theme="dark"] .wear-pick--violet .wear-pick-band { background: linear-gradient(135deg, #6e3db8 0%, #4e2090 100%); }
:root[data-theme="dark"] .wear-pick--slate .wear-pick-band  { background: linear-gradient(135deg, #566070 0%, #3a4550 100%); }

/* ── Card body ── */
.wear-pick-body {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4) var(--sp-4);
  flex: 1;
}
.wear-pick-name  { font-size: var(--text-base); font-weight: 800; line-height: var(--lh-snug); letter-spacing: -.015em; color: var(--text); }
.wear-pick-star  { color: var(--accent); }
.wear-pick-house { font-size: var(--text-sm); color: var(--muted); margin-top: calc(-1 * var(--sp-1)); }
.wear-pick-dna   { display: flex; flex-wrap: wrap; gap: var(--sp-1); }
.wear-pick-meta  { font-size: var(--text-xs); color: var(--muted); }
.wear-pick-reason {
  font-size: var(--text-sm);
  color: var(--muted);
  line-height: var(--lh-base);
}
.wear-pick-ranked {
  font-size: var(--text-xs);
  color: var(--muted);
  padding: var(--sp-2) var(--sp-3);
  background: var(--panel-inset);
  border: 1px solid var(--border);
  border-radius: var(--r-control);
  line-height: var(--lh-base);
}
.wear-pick-ranked strong { color: var(--text); font-weight: 700; }
.wear-pick-spray {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--accent-text);
  letter-spacing: .04em;
  padding-top: var(--sp-2);
  border-top: 1px solid var(--border);
  margin-top: auto;
}

/* ══════════════════════════════════════════
   HOME STATS STRIP — compact horizontal row
   ══════════════════════════════════════════ */
.home-stats-strip {
  display: flex;
  align-items: center;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-inner);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.home-stat-cell {
  flex: 1;
  padding: var(--sp-3) var(--sp-2);
  text-align: center;
  min-width: 0;
  overflow: hidden;
}

.home-stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: var(--lh-tight);
  color: var(--text);
}
.home-stat-dna {
  font-family: 'Outfit', sans-serif;
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: -.01em;
}

.home-stat-label {
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--accent-text);
  margin-top: var(--sp-1);
}

.home-stat-divider {
  width: 1px;
  height: 40px;
  background: var(--border);
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   HOME PICK CARDS — "What should I wear today?"
   ══════════════════════════════════════════ */
.home-pick-card {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  border-radius: var(--r-inner);
  border: 1px solid var(--border);
  overflow: hidden;
  background: var(--panel);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .18s ease, transform .16s ease;
}
.home-pick-card:hover  { box-shadow: var(--shadow); transform: translateY(-1px); }
.home-pick-card:active { transform: scale(0.98) translateY(0); box-shadow: var(--shadow-sm); transition: transform 0.08s ease; }

/* Rank band — full-width coloured header, readable at a glance */
.home-pick-rank {
  padding: var(--sp-2) var(--sp-3);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .10em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  white-space: nowrap;
  overflow: hidden;
}
.home-pick--gold  .home-pick-rank { background: linear-gradient(135deg, var(--accent-light), var(--accent)); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.22); }
.home-pick--green .home-pick-rank { background: linear-gradient(135deg, #5cc98a, #2e7d50); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.18); }
.home-pick--blue  .home-pick-rank { background: linear-gradient(135deg, #5b8dd9, #2f6abf); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.18); }
:root[data-theme="dark"] .home-pick--gold  .home-pick-rank { background: linear-gradient(135deg, var(--accent), var(--accent-strong)); }
:root[data-theme="dark"] .home-pick--green .home-pick-rank { background: linear-gradient(135deg, #3a8a5e, #1e5c3a); }
:root[data-theme="dark"] .home-pick--blue  .home-pick-rank { background: linear-gradient(135deg, #3a6aaa, #1e4a88); }

.home-pick-name {
  font-size: var(--text-base);
  font-weight: 800;
  line-height: var(--lh-snug);
  letter-spacing: -.015em;
  color: var(--text);
  padding: 0 var(--sp-4);
}
.home-pick-star   { color: var(--accent); font-size: var(--text-sm); }
.home-pick-house  { font-size: var(--text-sm); color: var(--muted); padding: 0 var(--sp-4); margin-top: calc(-1 * var(--sp-1)); }
.home-pick-dna    { padding: 0 var(--sp-4); }
.home-pick-reason { font-size: var(--text-sm); color: var(--muted); line-height: var(--lh-base); padding: 0 var(--sp-4); }
.home-pick-spray  {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .04em;
  padding: var(--sp-2) var(--sp-4) var(--sp-4);
  border-top: 1px solid var(--border);
  margin-top: auto;
}

/* Static ios-row (non-interactive) */
.ios-row-static {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 13px 15px;
  border-radius: var(--r-inner);
  border: 1px solid rgba(82,54,18,.10);
  background: rgba(255,252,246,.96);
}

/* Manual log step label */
.log-step-label {
  font-size: var(--text-xs);
  font-weight: 800;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: #7a5a30;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* AI add-to-collection separator */
.ai-add-separator {
  height: 1px;
  margin: 4px -20px 20px;
  background: linear-gradient(90deg, transparent 5%, rgba(183,137,52,.30) 50%, transparent 95%);
}

/* CPW no-price rows — less noise */
.cpw-row.no-data { opacity: .52; }

/* Iconbubble text marks — ensure clean centering and no selection */
.iconbubble, .icon-badge {
  user-select: none;
  -webkit-user-select: none;
  line-height: var(--lh-tight);
}

/* ══ TOUCH TARGETS — min 44×44pt per Apple HIG ══ */
.tab { min-height: 54px; min-width: 44px; }
button { min-height: 44px; }
.ios-row { min-height: 44px; }
.acc-head { min-height: 52px; }
/* Small utility buttons get a larger tap area via padding */
[id="closeSheetBtnAdd"],
[id="toggleApiKeyInputClose"],
[id="themeToggle" aria-label="Toggle dark mode"] {
  min-height: 44px !important;
  min-width: 44px !important;
  padding: 0 12px !important;
}
/* Delete/action buttons in rows */
[data-delete-wishlist],
[data-delete-wear] {
  min-height: 36px;
  padding: 0 12px;
}

/* ══ TYPE SCALE — Apple HIG 6-stop ══ */
/* Caption:     11px — kicker, meta, badges */
/* Footnote:    13px — muted, small, subtitles */
/* Subheadline: 15px — base body (set on html) */
/* Callout:     16px — ios-row-title, strong labels */
/* Body/Title3: 17–20px — h3, section titles */
/* Title2+:     22px+ — h1, hero numbers */
.kicker       { font-size: var(--text-xs); }   /* brand-specific, tighter than Caption */
.small, .muted.small { font-size: var(--text-sm); }
.ios-row-subtitle { font-size: var(--text-sm); }
.ios-row-title { font-size: var(--text-base); }
.section-desc { font-size: var(--text-sm); }
.explain-note { font-size: var(--text-sm); }
.mini-note    { font-size: var(--text-sm); }
/* .num defined in utilities below */

/* ══ SAFE AREA — top padding for brand header on notched devices ══ */
.brand {
  padding-top: max(20px, calc(env(safe-area-inset-top) + 8px));
}
/* Status bar area on standalone PWA */
@media (display-mode: standalone) {
  .brand {
    padding-top: max(24px, calc(env(safe-area-inset-top) + 12px));
  }
  body {
    padding-top: env(safe-area-inset-top);
  }
}

/* ══ SHEET DRAG HANDLE — more visible ══ */
.sheet::before {
  width: 36px;
  height: 5px;
  background: rgba(82,54,18,.32);
  border-radius: 999px;
  margin: 0 auto 20px;
  opacity: .5;
}

/* ══ SCROLL REGIONS — each tab owns its scroll ══ */
.view-scroll-container {
  position: fixed;
  top: 0; left: 0; right: 0;
  bottom: calc(78px + env(safe-area-inset-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
}
.view-scroll-inner {
  max-width: 900px;
  margin: 0 auto;
}

/* ══ localStorage QUOTA WARNING ══ */
.storage-warn {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--r-control); margin-bottom: 10px;
  background: var(--warn-soft);
  border: 1px solid rgba(138,88,32,.28);
  color: var(--warn); font-size: var(--text-sm); font-weight: 600;
}


/* ══ OCCASION COLOR CHIPS ══ */
.occasion-chip { display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:var(--text-xs); font-weight:800; letter-spacing:.05em; text-transform:uppercase; margin:2px 3px 2px 0; }
.occasion-chip.office   { background:rgba(47,106,191,.14); color:#1a4d99; border:1px solid rgba(47,106,191,.28); }
.occasion-chip.casual   { background:rgba(52,122,80,.13);  color:#1a5e38; border:1px solid rgba(52,122,80,.26); }
.occasion-chip.date     { background:rgba(192,48,48,.12);  color:#961818; border:1px solid rgba(192,48,48,.26); }
.occasion-chip.evening  { background:rgba(94,47,160,.14);  color:#3d1470; border:1px solid rgba(94,47,160,.28); }
.occasion-chip.gym      { background:rgba(157,100,38,.13); color:#7a4a18; border:1px solid rgba(157,100,38,.26); }
.occasion-chip.plane    { background:rgba(183,137,52,.15); color:#6e4010; border:1px solid rgba(183,137,52,.30); }
:root[data-theme="dark"] .occasion-chip.office  { background:rgba(91,141,217,.18); color:#b0d0f8; border-color:rgba(91,141,217,.30); }
:root[data-theme="dark"] .occasion-chip.casual  { background:rgba(92,201,138,.12); color:#5cc98a; border-color:rgba(92,201,138,.22); }
:root[data-theme="dark"] .occasion-chip.date    { background:rgba(217,107,107,.16); color:#f09090; border-color:rgba(217,107,107,.28); }
:root[data-theme="dark"] .occasion-chip.evening { background:rgba(155,114,207,.14); color:#9b72cf; border-color:rgba(155,114,207,.24); }
:root[data-theme="dark"] .occasion-chip.gym     { background:rgba(232,168,74,.13);  color:#e8a84a; border-color:rgba(232,168,74,.24); }
:root[data-theme="dark"] .occasion-chip.plane   { background:rgba(221,181,109,.14); color:#dbb560; border-color:rgba(221,181,109,.26); }

/* ══ REDUNDANCY METER — colored severity ══ */
.redundancy-bar { height:6px; border-radius:999px; margin-top:6px; overflow:hidden; background:rgba(82,54,18,.20); }

/* ══════════════════════════════════════════
   VIEW TRANSITIONS — iOS-style slide & fade
   ══════════════════════════════════════════ */

/* Base view-content — no opacity/transform by default */
.view-content {
  min-height: 0;
  will-change: transform, opacity;
}

/* Slide in from right (forward navigation) */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(22px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Slide in from left (back navigation) */
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-22px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Fade up (sub-view / same-tab navigation) */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.view-anim-forward {
  animation: slideInRight 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}
.view-anim-back {
  animation: slideInLeft 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}
.view-anim-fade {
  animation: fadeInUp 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

/* Button press depth — iOS depressed feel */
button:active,
.listbtn:active,
.ios-row:active,
.home-pick-card:active,
.wear-pick-card:active {
  transform: scale(0.97);
  transition: transform 0.08s ease;
}

/* Smooth scroll on all scrollable areas */
.app, .sheet, .ios-list {
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}


@keyframes sheetSlideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet {
  animation: sheetSlideUp 0.32s cubic-bezier(0.32, 0, 0.67, 0) both;
}


@keyframes backdropFade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.sheet-backdrop {
  animation: backdropFade 0.22s ease both;
}


/* Kicker → h3 spacing */
.kicker + h3,
.kicker + .section-title { margin-top: var(--sp-1); }
h3 + .section-desc,
h3 + .muted { margin-top: var(--sp-1); }


@keyframes wearLogged {

<script>
const OCCASIONS=["Plane","Office","Date","Casual","Gym","Evening"];
const ENVIRONMENTS=["Indoors","Mixed","Outdoors"];
const VIEWS=["Home","Collection","Wear","Layer","More"];
const WEATHER_KEY="vault_weather_pref";
const THEME_KEY="vault_theme";
const WEAR_KEY="vault_wear_log";
const JOURNAL_KEY="vault_journal";
const JOURNAL_BY_KEY_KEY="vault_journal_by_key";
const RECOMMENDATION_MEMORY_KEY="vault_recommendation_memory";
const WISHLIST_KEY="vault_wishlist";
const DELETED_FRAGRANCES_KEY="vault_deleted_fragrances";
const PRICES_KEY="vault_prices";
const API_KEY_KEY="vault_api_key";

function makeUserFragranceObject(item){
  return {
    id: item.id || ("uf_" + Date.now()),
    h: item.house || "Custom",
    n: item.name || "Unnamed Fragrance",
    i: item.inspiration || "Original",
    d: (item.dna || "").split(",").map(x=>x.trim()).filter(Boolean),
    o: (item.occasions || "").split(",").map(x=>x.trim()).filter(Boolean),
    s: item.season || "All Season",
    r: Number(item.rating || 4),
    _userAdded: true
  };
}

function getAllCollection(){
  const base = Array.isArray(COLLECTION) ? COLLECTION.slice() : [];
  const added = (state.userFragrances||[])
    .map(makeUserFragranceObject)
    .filter(item=>{
      const name = String(item.n||"").trim().toLowerCase();
      return name && name !== "unnamed fragrance";
    });

  const merged = [...base, ...added];
  const seenHouseName = new Set();

  return merged.filter(item=>{
    const name = String(item.n||"").trim().toLowerCase();
    const house = String(item.h||"").trim().toLowerCase();
    const houseNameKey = `${house}__${name}`;
    if (!name) return false;
    if (seenHouseName.has(houseNameKey)) return false;
    seenHouseName.add(houseNameKey);
    return true;
  });
}


function getFragranceKey(f){
  if (!f) return "";
  const house = String(f.h || f.house || "").trim().toLowerCase();
  const name = String(f.n || f.name || "").trim().toLowerCase();
  return name ? `${house}__${name}` : "";
}

function isFragranceKey(value){
  return typeof value === "string" && value.includes("__");
}

function getFragranceByKey(value, fallbackHouse = ""){
  const all = getAllCollection();
  if (!value) return null;
  if (isFragranceKey(value)) return all.find(f=>getFragranceKey(f)===value) || null;
  const name = String(value || "").trim().toLowerCase();
  const house = String(fallbackHouse || "").trim().toLowerCase();
  return all.find(f=>String(f.n||"").trim().toLowerCase()===name && (!house || String(f.h||"").trim().toLowerCase()===house))
    || all.find(f=>String(f.n||"").trim().toLowerCase()===name)
    || null;
}

function normalizeFragranceKey(value, fallbackHouse = ""){
  if (!value) return "";
  if (isFragranceKey(value)) return value;
  const match = getFragranceByKey(value, fallbackHouse);
  return match ? getFragranceKey(match) : "";
}

function getFragranceNameByKey(value, fallbackHouse = ""){
  const match = getFragranceByKey(value, fallbackHouse);
  return match ? match.n : String(value || "");
}

function getFragranceHouseByKey(value, fallbackHouse = ""){
  const match = getFragranceByKey(value, fallbackHouse);
  return match ? match.h : String(fallbackHouse || "");
}

function sameFragranceSelection(fragrance, value){
  return !!fragrance && getFragranceKey(fragrance) === normalizeFragranceKey(value, fragrance.h || "");
}

function getWearEntryKey(entry){
  if (!entry) return "";
  return normalizeFragranceKey(entry.fragranceKey || entry.fragrance || "", entry.house || "");
}

function getWearLogForFragrance(fragranceOrKey){
  const key = typeof fragranceOrKey === "string"
    ? normalizeFragranceKey(fragranceOrKey)
    : getFragranceKey(fragranceOrKey);
  return (state.wearLog || []).filter(entry => getWearEntryKey(entry) === key);
}

function getWearCountForFragrance(fragranceOrKey){
  return getWearLogForFragrance(fragranceOrKey).length;
}

function normalizeWearLogEntries(){
  if (!Array.isArray(state.wearLog)) state.wearLog = [];
  state.wearLog = state.wearLog.map(entry=>{
    const fragranceKey = getWearEntryKey(entry);
    const match = getFragranceByKey(fragranceKey, entry.house || "");
    return {
      ...entry,
      fragranceKey,
      fragrance: match ? match.n : (entry.fragrance || ""),
      house: match ? match.h : (entry.house || "")
    };
  });
}

function normalizePricesToKeys(){
  const current = state.prices && typeof state.prices === "object" ? state.prices : {};
  const normalized = {};
  Object.entries(current).forEach(([rawKey, rawValue])=>{
    const value = Number(rawValue);
    if (!rawKey || !Number.isFinite(value)) return;
    const fragranceKey = normalizeFragranceKey(rawKey);
    const finalKey = fragranceKey || rawKey;
    normalized[finalKey] = value;
  });
  state.prices = normalized;
}

function getPriceForFragrance(fragranceOrKey){
  const key = typeof fragranceOrKey === "string"
    ? normalizeFragranceKey(fragranceOrKey)
    : getFragranceKey(fragranceOrKey);
  const prices = state.prices && typeof state.prices === "object" ? state.prices : {};
  return key && prices[key] != null ? Number(prices[key]) : null;
}

function getWearManualHouseOptions(){
  return ["All", ...Array.from(new Set(getAllCollection().map(f=>String(f.h||"").trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b))];
}

function getWearManualFilteredCollection(house = state.wearManualHouse || "All"){
  return getAllCollection()
    .filter(f=>house === "All" ? true : f.h === house)
    .slice()
    .sort((a,b)=>a.n.localeCompare(b.n));
}

function syncWearManualSelection(){
  const all = getAllCollection();
  if (!all.length){
    state.wearManualHouse = "All";
    state.wearSelected = "";
    return [];
  }

  const current = getFragranceByKey(state.wearSelected);
  const houseOptions = getWearManualHouseOptions();
  if (!houseOptions.includes(state.wearManualHouse)) {
    state.wearManualHouse = (current && current.h) ? current.h : "All";
  }

  let filtered = getWearManualFilteredCollection(state.wearManualHouse);
  if (!filtered.length && state.wearManualHouse !== "All") {
    state.wearManualHouse = "All";
    filtered = getWearManualFilteredCollection("All");
  }

  if (!filtered.some(f=>sameFragranceSelection(f, state.wearSelected))) {
    state.wearSelected = getFragranceKey(filtered[0] || all[0]) || "";
  }

  return filtered;
}

function getCompareHouseOptions(){
  return ["All", ...Array.from(new Set(getAllCollection().map(f=>f.h).filter(Boolean))).sort((a,b)=>a.localeCompare(b))];
}

function getCompareFilteredCollection(house = "All") {
  return getAllCollection()
    .filter(f=>house === "All" ? true : f.h === house)
    .slice()
    .sort((a,b)=>String(a.n||"").localeCompare(String(b.n||"")));
}

function syncCompareSelection(){
  const all = getCompareFilteredCollection("All");
  if (!all.length){
    state.compareHouseA = "All";
    state.compareHouseB = "All";
    state.compareA = "";
    state.compareB = "";
    return { listA: [], listB: [] };
  }

  const houseOptions = getCompareHouseOptions();
  if (!houseOptions.includes(state.compareHouseA)) state.compareHouseA = "All";
  if (!houseOptions.includes(state.compareHouseB)) state.compareHouseB = "All";

  let listA = getCompareFilteredCollection(state.compareHouseA);
  let listB = getCompareFilteredCollection(state.compareHouseB);

  if (!listA.length && state.compareHouseA !== "All") {
    state.compareHouseA = "All";
    listA = getCompareFilteredCollection("All");
  }
  if (!listB.length && state.compareHouseB !== "All") {
    state.compareHouseB = "All";
    listB = getCompareFilteredCollection("All");
  }

  if (!listA.some(f=>sameFragranceSelection(f, state.compareA))) state.compareA = getFragranceKey(listA[0] || all[0]) || "";
  if (!listB.some(f=>sameFragranceSelection(f, state.compareB))) state.compareB = getFragranceKey(listB[0] || all[0]) || "";

  return { listA, listB };
}

function getMoodReasoning(fragrance, mood){
  const dna = displayDNAList(fragrance).map(norm);
  const occ = simplifyOccasionList(fragrance);
  const season = norm(fragrance.s || "");
  const journal = typeof getJournalEntry === "function" ? (getJournalEntry(fragrance) || {}) : {};
  const noteBag = `${norm(journal.moodTags||"")} ${norm(journal.notes||"")} ${norm(journal.complimentContext||"")}`;
  const m = norm(mood || "Any");
  const why = [];

  if (m === "clean"){
    if (dna.some(x=>["fresh","citrus","aquatic","musk / powdery","blue"].includes(x))) why.push("Its DNA sits on the cleaner, fresher side of the collection.");
    if (occ.includes("Office") || occ.includes("Casual")) why.push("Its occasion fit keeps it easy and controlled.");
  } else if (m === "cozy"){
    if (dna.some(x=>["amber","sweet","gourmand","woody","spicy"].includes(x))) why.push("Its warmer structure makes it feel more comforting.");
    if (/fall|winter/.test(season)) why.push("Its season fit supports cooler-weather wear.");
  } else if (m === "seductive"){
    if (occ.includes("Date") || occ.includes("Evening")) why.push("Its occasion fit is stronger for closer or more intimate settings.");
    if (dna.some(x=>["amber","sweet","spicy","gourmand"].includes(x))) why.push("Its richer DNA gives it more pull and presence.");
  } else if (m === "classy"){
    if (dna.some(x=>["woody","fougere","vetiver / earthy","musk / powdery"].includes(x))) why.push("Its more polished DNA reads sharper and more refined.");
    if (occ.includes("Office") || occ.includes("Date")) why.push("Its occasion fit works well when you want something composed.");
  } else if (m === "loud"){
    if (dna.some(x=>["amber","sweet","gourmand","spicy"].includes(x))) why.push("Its denser DNA helps it feel more attention-grabbing.");
    if (occ.includes("Evening")) why.push("Its use case already leans toward stronger wear.");
  } else if (m === "relaxing"){
    if (dna.some(x=>["musk / powdery","green","fresh","woody","vetiver / earthy"].includes(x))) why.push("Its softer DNA makes it easier to wear without effort.");
    if (occ.includes("Casual") || occ.includes("Office")) why.push("It fits quieter, lower-pressure situations.");
  }

  if (m !== "any" && noteBag.includes(m)) why.push("Your own notes or mood tags already connect it to this mood.");
  if (typeof isFavorite === "function" && isFavorite(fragrance)) why.push("It gets a small boost because you already flagged it as a favorite.");
  if (typeof getLastWornDate === "function" && !getLastWornDate(fragrance)) why.push("It gets a small boost because it has not been worn recently.");

  return why.slice(0,3);
}

function getBuySkipReasonRows(analysis){
  const rows = [];
  rows.push(analysis.reason || "No verdict reason available.");
  if (analysis.overlaps && analysis.overlaps.length){
    const top = analysis.overlaps[0];
    rows.push(`Closest overlap: ${top.item.n}.`);
    if (top.overlap.sharedDNA && top.overlap.sharedDNA.length) rows.push(`Shared DNA: ${top.overlap.sharedDNA.join(", ")}.`);
    if (top.overlap.sharedOccasion && top.overlap.sharedOccasion.length) rows.push(`Shared occasions: ${top.overlap.sharedOccasion.join(", ")}.`);
  } else {
    rows.push("There is no close overlap in the current collection, which helps it fill a clearer lane.");
  }
  return rows.slice(0,4);
}

function sortCollectionItems(items, mode){
  const arr = items.slice();
  if (mode === "House") return arr.sort((a,b)=>(a.h||"").localeCompare(b.h||"") || (a.n||"").localeCompare(b.n||""));
  if (mode === "Season") return arr.sort((a,b)=>(a.s||"").localeCompare(b.s||"") || (a.n||"").localeCompare(b.n||""));
  if (mode === "Favorites") return arr.sort((a,b)=>(isFavorite(b)?1:0)-(isFavorite(a)?1:0) || (a.n||"").localeCompare(b.n||""));
  if (mode === "Score") return arr.sort((a,b)=>scoreDisplay(b)-scoreDisplay(a));
  return arr.sort((a,b)=>(a.n||"").localeCompare(b.n||""));
}

function safeJSONParse(raw, fallback){
  if (raw == null || raw === "") return fallback;
  try {
    const parsed = JSON.parse(raw);
    return parsed == null ? fallback : parsed;
  } catch (e) {
    return fallback;
  }
}

function safeLocalStorageJSON(key, fallback){
  try {
    return safeJSONParse(localStorage.getItem(key), fallback);
  } catch (e) {
    return fallback;
  }
}

function importAllAppDataFromText(textValue){
  try{
    const payload = JSON.parse(textValue);
    if (!payload || typeof payload !== "object") return {ok:false, message:"Backup file is not valid."};

    if (Array.isArray(payload.userFragrances)) state.userFragrances = payload.userFragrances;
    if (Array.isArray(payload.wearLog)) state.wearLog = payload.wearLog;
    if (Array.isArray(payload.savedLayerCombos)) state.savedLayerCombos = payload.savedLayerCombos;

    if (Array.isArray(payload.favorites)){
      state.favoriteFragrances = payload.favorites;
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(state.favoriteFragrances));
    }

    const importedDisplays = Array.isArray(payload.displaySnapshots)
      ? payload.displaySnapshots
      : (Array.isArray(payload.savedDisplays) ? payload.savedDisplays : null);
    if (importedDisplays){
      state.displaySnapshots = importedDisplays;
      localStorage.setItem(DISPLAY_KEY, JSON.stringify(state.displaySnapshots));
    }

    if (payload.journalData && typeof payload.journalData === "object") state.journalData = payload.journalData;
    if (payload.journalByKey && typeof payload.journalByKey === "object") state.journalByKey = payload.journalByKey;
    if (payload.recommendationMemory && typeof payload.recommendationMemory === "object") state.recommendationMemory = payload.recommendationMemory;

    migrateJournalDataToKeys();
    saveJournalData();
    saveRecommendationMemory();

    if (Array.isArray(payload.wishlist)){ state.wishlist = payload.wishlist; saveWishlist(); }
    if (payload.prices && typeof payload.prices === "object"){ state.prices = payload.prices; normalizePricesToKeys(); savePrices(); }
    if (payload.bottleStatus && typeof payload.bottleStatus === "object"){ state.bottleStatus = payload.bottleStatus; saveBottleStatus(); }
    if (Array.isArray(payload.deletedFragrances)){ state.deletedFragrances = payload.deletedFragrances; saveDeletedFragrances(); }

    if (payload.settings && typeof payload.settings === "object"){
      if (payload.settings.theme) state.theme = payload.settings.theme;
      if (payload.settings.weatherPref) state.weatherPref = payload.settings.weatherPref;
      if (payload.settings.collectionSort) state.collectionSort = payload.settings.collectionSort;
    }

    saveUserFragrances();
    saveWearLog();
    saveLayerCombos();
    saveTheme();
    saveWeatherPref();
    render();
    return {ok:true};
  }catch(e){
    return {ok:false, message:"Import file is not valid JSON."};
  }
}

function loadUserFragrances(){

    return Array.isArray(raw) ? raw : [];
  }catch(e){

  }
}

}

function deleteFragranceFromCollection(item){
  if (!item) return;
  const key = `${String(item.h||"").trim().toLowerCase()}__${String(item.n||"").trim().toLowerCase()}`;
  // Snapshot for undo before deleting
  state.lastDeleted = {
    item: {...item},
    key,
    wasUserAdded: !!(item._userAdded && item.id),
    deletedAt: Date.now()
  };
  state.deletedFragrances = state.deletedFragrances || [];
  if (!state.deletedFragrances.includes(key)) state.deletedFragrances.push(key);
  saveDeletedFragrances();
  if (item._userAdded && item.id){
    state.userFragrances = (state.userFragrances||[]).filter(x=>x.id!==item.id);
    saveUserFragrances();
  }
  if (state.selectedFragrance && state.selectedFragrance.n===item.n && state.selectedFragrance.h===item.h){
    state.selectedFragrance = null;
  }
}

function undoLastDelete(){
  const snap = state.lastDeleted;
  if (!snap) return;
  state.lastDeleted = null;
  // Remove from deleted blocklist
  state.deletedFragrances = (state.deletedFragrances||[]).filter(k => k !== snap.key);
  saveDeletedFragrances();
  // Restore user-added fragrance if it was one
  if (snap.wasUserAdded && snap.item.id){
    state.userFragrances = state.userFragrances || [];
    if (!state.userFragrances.find(x=>x.id===snap.item.id)){
      state.userFragrances.unshift(snap.item);
      saveUserFragrances();
    }
  }
  haptic("medium");
  pushToast(`${snap.item.n} restored ✦`, "success");
  render();
}

  state.editWearIndex = index;
  state.editWearDraft = {

    fragrance: entry.fragrance || getFragranceNameByKey(state.wearSelected),
    date: entry.date || new Date().toISOString().slice(0,10),

    occasion: entry.occasion || "Office",
    notes: entry.notes || "",

  };
  openSheet("editWearEntry");
}

function saveWearEntryEdit(){
  if (state.editWearIndex == null) return {ok:false, message:"No wear entry selected."};
  const idx = Number(state.editWearIndex);
  const entry = (state.wearLog||[])[idx];
  if (!entry) return {ok:false, message:"That wear entry no longer exists."};
  const fragranceObj = getFragranceByKey(state.editWearDraft.fragranceKey || state.editWearDraft.fragrance, state.editWearDraft.house || entry.house || "");
  state.wearLog[idx] = {
    date: state.editWearDraft.date || entry.date,
    fragranceKey: getFragranceKey(fragranceObj) || getWearEntryKey(entry),
    fragrance: fragranceObj ? fragranceObj.n : (state.editWearDraft.fragrance || entry.fragrance),
    house: fragranceObj ? fragranceObj.h : (state.editWearDraft.house || entry.house || ""),
    amount: state.editWearDraft.amount || "",
    occasion: state.editWearDraft.occasion || "Office",
    notes: state.editWearDraft.notes || ""
  };
  saveWearLog();
  return {ok:true};
}

function deleteWearEntry(index){
  state.wearLog = (state.wearLog||[]).filter((_,i)=>i!==Number(index));
  saveWearLog();
  if (state.editWearIndex === Number(index)){
    state.editWearIndex = null;
    state.editWearDraft = null;
  }
}

function resolveFragranceIdentity(input, house=""){
  if (!input) return { key:"", name:"", house:"", fragrance:null };
  if (typeof input === "object") {
    const fragrance = input.n ? input : getFragranceByKey(input.fragranceKey || input.key || "", input.house || house);
    if (fragrance) return { key:getFragranceKey(fragrance), name:fragrance.n, house:fragrance.h, fragrance };
    const keyFromObject = normalizeFragranceKey(input.fragranceKey || input.key || "", input.house || house);
    return { key:keyFromObject, name:input.n || input.name || getFragranceNameByKey(keyFromObject), house:input.h || input.house || house || getFragranceHouseByKey(keyFromObject), fragrance:getFragranceByKey(keyFromObject, input.house || house) };
  }
  const raw = String(input || "").trim();
  const keyed = normalizeFragranceKey(raw, house);
  const byKey = getFragranceByKey(keyed, house);
  if (byKey) return { key:getFragranceKey(byKey), name:byKey.n, house:byKey.h, fragrance:byKey };
  const byName = getAllCollection().find(f => norm(f.n) === norm(raw) && (!house || norm(f.h) === norm(house)));
  if (byName) return { key:getFragranceKey(byName), name:byName.n, house:byName.h, fragrance:byName };
  return { key:keyed, name:raw, house:house || getFragranceHouseByKey(keyed), fragrance:getFragranceByKey(keyed, house) };
}
function getRecommendationMemoryBucket(bucket){
  state.recommendationMemory = state.recommendationMemory || {wear:{},signature:{},mood:{},buy:{}};
  state.recommendationMemory[bucket] = state.recommendationMemory[bucket] || {};
  return state.recommendationMemory[bucket];
}

function getRecommendationMemoryScore(bucket, fragrance){
  const key = resolveFragranceIdentity(fragrance).key;
  if (!key) return 0;
  const hit = getRecommendationMemoryBucket(bucket)[key];
  if (!hit || !hit.lastShownAt) return 0;
  const days = (Date.now() - new Date(hit.lastShownAt).getTime()) / 86400000;
  if (!Number.isFinite(days)) return 0;
  if (days < 1) return -1.8;
  if (days < 3) return -1.0;
  if (days < 7) return -0.45;
  return 0;
}
function rememberRecommendations(bucket, fragrances){
  const store = getRecommendationMemoryBucket(bucket);
  const now = new Date().toISOString();
  (fragrances || []).forEach((fragrance, index)=>{
    const ident = resolveFragranceIdentity(fragrance);
    if (!ident.key) return;
    const current = store[ident.key] || {timesShown:0};
    store[ident.key] = {...current, key:ident.key, name:ident.name, house:ident.house, lastShownAt:now, timesShown:(current.timesShown||0)+1, lastRank:index+1};
  });
  saveRecommendationMemory();
}

    const isCoolSeason = season.includes("winter") || season.includes("fall");
    if (temp <= 50 && isCoolSeason)  score += 1.2;
    if (temp <= 50 && isWarmSeason)  score -= 0.5;
    if (temp >= 80 && isWarmSeason)  score += 1.0;
    if (temp >= 80 && isCoolSeason)  score -= 0.6;
    // Heat bonus for fresh DNA — peaks at ≥90°F

      else if (temp >= 80)  score += clampScore((temp - 80) * (2.5/10)); // linear 0→2.5

function getFragranceOverlapStats(fragrance, pool=getAllCollection()){

  const overlaps = (pool || []).filter(other => getFragranceKey(other) !== key).map(other => {
    const otherDna = displayDNAList(other).map(norm);
    if (!otherDna.length) return 0;
    const shared = dna.filter(tag => otherDna.includes(tag)).length;
    // Jaccard similarity: |A∩B| / |A∪B| — correct metric, unbiased by DNA set size
    const union = dna.length + otherDna.length - shared;
    return shared / Math.max(1, union);

  if (!overlaps.length) return {top:0, average:0};
  const top = Math.max(...overlaps);
  const average = overlaps.reduce((a,b)=>a+b,0) / overlaps.length;

  // journal, favorites, and wear patterns pull it up; missing data holds at 5.0
  const journalAvgNorm = journal.average5 ? (journal.average5 / 5) * 10 : 0;
  const wearPatternIdent = wearCount >= 5 ? 1.2 : wearCount >= 2 ? 0.6 : 0;
  const identityFit = clampScore(
    5.0 +                                              // neutral prior (was 3.8)
    (favorite ? 1.4 : 0) +
    (journalAvgNorm ? (journalAvgNorm - 5) * 0.38 : 0) + // deviation from midpoint 5
    wearPatternIdent +
    (rating >= 4 ? 0.4 : rating >= 3 ? 0.1 : 0)
  );

  // confidence: measures how well-calibrated our score is for this bottle
  // journal.confidence = 2.2 (no data) to 8.8 (all 5 fields filled)
  // Scale to full [0,10] range using the spread that actually exists in the data
  const journalConfidenceNorm = clampScore((journal.confidence - 2.2) / (8.8 - 2.2) * 10);
  const confidence = clampScore(
    4.0 +                                    // neutral prior
    journalConfidenceNorm * 0.42 +           // journal data = best calibration signal
    (wearCount >= 10 ? 1.5 :
     wearCount >= 5  ? 1.0 :
     wearCount >= 2  ? 0.5 :
     wearCount >= 1  ? 0.2 : 0) +           // actual use history
    (favorite ? 0.3 : 0) +
    (rating >= 1 ? rating * 0.10 : 0)       // having rated it at all = signal
  );

  const rotationFit = scoreRotationBehavior(fragrance, occasion);

  let planeFit = 6.2;
  const planeLevel = getPlaneSafetyLevel(fragrance);
  if (occasion === "Plane"){
    planeFit = planeLevel === "Plane Safe" ? 10 : planeLevel === "Safe Enough" ? 7.2 : 1.2;
  }

  // moodFitMap: bases set so specific moods OUTPERFORM "Any" for matching DNA (Fix 7)
  // "Any" is a neutral 6.0 — specific moods can reach higher peaks for the right bottles
  const moodFitMap = {
    any:       6.0,
    clean:     clampScore(5.2 + role.fresh * 1.6  - role.dense * 0.5 - (isEvening ? 0.4 : 0)),
    cozy:      clampScore(4.8 + role.dense * 1.55 - (role.fresh ? 0.6 : 0) + (isEvening ? 0.5 : 0)),
    // seductive: loud is typically 2-3, needs stronger multiplier to clear "any"=6.0
    seductive: clampScore(4.2 + role.loud * 1.45 + (role.elegant ? 0.7 : 0) + (isNight ? 0.8 : 0)),
    classy:    clampScore(5.5 + role.elegant * 1.3 + (role.fresh ? 0.3 : 0) - (role.dense > 2 ? 0.4 : 0)),
    // loud: dense+evening+date can sum to ~4-5, needs stronger signal
    loud:      clampScore(3.8 + role.loud * 1.8  - (role.fresh ? 0.4 : 0)),
    relaxing:  clampScore(5.2 + role.fresh * 0.9 + (journal.comfort ? journal.comfort * 0.5 : 0) - role.dense * 0.3 + (isMorning ? 0.3 : 0))
  };
  const moodFit = moodFitMap[norm(mood)] != null ? moodFitMap[norm(mood)] : 6.0;

  // Time-of-day modifier on top (Fix 5)
  let timeBonus = 0;
  if (isMorning && role.fresh > 0) timeBonus += 0.4;
  if (isMorning && role.dense > 2) timeBonus -= 0.5;
  if (isEvening && role.dense > 0) timeBonus += 0.3;
  if (isEvening && !role.dense && !role.loud) timeBonus -= 0.3;
  if (isNight && occasion === "Date") timeBonus += 0.4;
  // Evening/Date occasion with pure fresh DNA — insufficient presence
  // This dampens fresh-only bottles when the occasion calls for richer character
  if ((occasion === "Evening" || occasion === "Date") && role.fresh > 0 && role.dense === 0 && role.loud === 0) {
    timeBonus -= 0.6; // fresh bottle for evening has no warmth or presence
  }

  let strategyFit = 6.5;
  if (strategy === "Most unique") strategyFit = clampScore((uniquenessFit * 0.82) + (identityFit * 0.1) + 0.5);
  else if (strategy === "Best performer") strategyFit = clampScore((performanceConfidence * 0.72) + (styleFit * 0.12) + 0.8);
  else strategyFit = clampScore((occasionFit * 0.34) + (weatherFit * 0.24) + (comfortFit * 0.16) + (styleFit * 0.12) + 0.8);

  const risk = clampScore(
    0.8 +
    (occasion === "Plane" && planeLevel === "Not Plane Safe" ? 4.8 : 0) +
    (environment === "Indoors" && role.dense > 3 ? 1.6 : 0) +
    (weather && typeof weather.temp === "number" && weather.temp >= 82 && role.dense > 2 ? 1.5 : 0) +
    (weather && typeof weather.humidity === "number" && weather.humidity >= 75 && role.dense > 2 ? 1.1 : 0) +
    // Wind risk: light DNA in strong wind performs poorly
    (weather && typeof weather.wind === "number" && weather.wind >= 20 && role.fresh > 0 && role.dense === 0 ? 0.8 : 0)
  );

  return {
    role, journal, overlap, rating, favorite, confidence, risk,
    weatherFit, environmentFit, occasionFit, versatilityFit, styleFit,
    uniquenessFit, performanceConfidence, comfortFit, identityFit,
    rotationFit, planeFit, moodFit, strategyFit,
    timeBonus, wearCount, recentWears, abandoned, occasionMatchedWears
  };
}


function getNormalizedScoreModel(fragrance, context={}){
  const s = getScoringSignals(fragrance, context);

  // Dynamic weather weight: increases when conditions are extreme
  // Normal: 0.18. Extreme cold (≤32°F) or extreme heat (≥90°F): 0.26
  const w = context.weather;
  const temp = w && typeof w.temp === "number" ? w.temp : null;
  const isExtreme = temp !== null && (temp <= 32 || temp >= 90);
  const isModerate = temp !== null && (temp <= 45 || temp >= 85);
  const weatherWeight = isExtreme ? 0.26 : isModerate ? 0.22 : 0.18;
  // Reduce other weights proportionally to keep sum = 1.0
  const baseOther = 1.0 - 0.18; // 0.82 for non-weather weights normally
  const scaleFactor = (1.0 - weatherWeight) / baseOther;

  const fit = composeScore({
    weather:     {score:s.weatherFit,           weight:weatherWeight},
    occasion:    {score:s.occasionFit,          weight:0.24 * scaleFactor},
    environment: {score:s.environmentFit,       weight:0.08 * scaleFactor},
    mood:        {score:s.moodFit,              weight:0.09 * scaleFactor},
    versatility: {score:s.versatilityFit,       weight:0.10 * scaleFactor},
    identity:    {score:s.identityFit,          weight:0.08 * scaleFactor},
    comfort:     {score:s.comfortFit,           weight:0.08 * scaleFactor},
    performance: {score:s.performanceConfidence, weight:0.09 * scaleFactor},
    uniqueness:  {score:s.uniquenessFit,        weight:0.06 * scaleFactor}
  }, 10);
  const confidence = roundScore(s.confidence, 1);
  const risk = roundScore(s.risk, 1);
  // Dampen confidence contribution when occasion is a poor match.
  // A well-worn bottle should not beat a purpose-built bottle for the wrong occasion.
  // Threshold 8.0: full confidence only when occasionFit≥8.0 (exact or near-exact match)
  // occFit=5.5 → 0.888 (11% reduction), occFit=3.0 → 0.575 (42% reduction)
  const occDampen = clampScore(s.occasionFit / 8.0 + 0.20, 0.25, 1.0);
  const effectiveConf = roundScore(confidence * occDampen, 1);
  const rawTotal = (fit * 0.826) + (effectiveConf * 0.174) - (risk * 0.10) + (s.timeBonus || 0);
  const total = clampScore(rawTotal);
  return {
    total: roundScore(total, 1),
    fit: roundScore(fit, 1),
    confidence,
    risk,
    signals: s,
    parts: [
      {label:"Fit",        score:fit},
      {label:"Confidence", score:confidence},
      {label:"Risk",       score:10 - risk}
    ]
  };
}

function getNeglectedFragrances(limit=8){
  const now = Date.now();
  const wearCounts = {};
  const lastWorn   = {};
  (state.wearLog||[]).forEach(e => {
    const key = getWearEntryKey(e);
    wearCounts[key] = (wearCounts[key]||0)+1;
    if (!lastWorn[key]) lastWorn[key] = e.date;
  });

  const scored = getAllCollection().map(f => {
    const key = getFragranceKey(f);
    const count  = wearCounts[key] || 0;
    const last   = lastWorn[key] || "";
    const daysAgo = last ? (now - new Date(last)) / 86400000 : null;

    // Abandoned detection: worn before but stopped AND journal shows discomfort
    // Only flag as abandoned if comfort IS explicitly filled (not just missing)
    const journalEntry = getJournalEntry(f) || {};
    const comfortFilled = journalEntry.comfort != null && Number(journalEntry.comfort) > 0;
    const abandoned = count > 2 && daysAgo !== null && daysAgo > 90 &&
      comfortFilled && Number(journalEntry.comfort) <= 2;

    let neglect = 0;
    if (count === 0){
      // Never worn: score on a comparable scale to worn-neglected (max ~25)
      // Use quality signals to prioritize which never-wears to surface first
      const rating = Number(f.r || 0);
      const fav = isFavorite(f) ? 1 : 0;
      neglect = 12 + rating * 2 + fav * 4; // range: 12 to 23
    } else {
      // Worn before: score based on how overdue it is relative to its own cadence
      const lastEntry = (state.wearLog||[]).slice(-1)[0];
      const totalDays = lastEntry && lastEntry.date
        ? (now - new Date(lastEntry.date)) / 86400000
        : 1;
      const avgInterval = Math.max(1, totalDays / Math.max(count, 1));
      neglect = daysAgo !== null ? (daysAgo / avgInterval) * 10 : 10;
      // Boost high-quality neglected bottles
      if (isFavorite(f)) neglect *= 1.3;
      if ((f.r||0) >= 4)  neglect *= 1.1;
      // Suppress abandoned — you stopped for a reason
      if (abandoned)      neglect *= 0.3;
    }

    return { item: f, last: last || "", count, neglect, abandoned };
  })
  .filter(x => !x.abandoned) // abandoned bottles removed entirely from neglect list
  .sort((a,b) => b.neglect - a.neglect);

  // House diversity: cap 2 per house so list isn't all Dua never-wearns
  const out = [];
  const houseCounts = {};
  for (const row of scored) {
    const house = row.item.h || "Unknown";
    houseCounts[house] = (houseCounts[house] || 0);
    if (houseCounts[house] >= 2 && out.length < limit - 1) continue;
    out.push(row);
    houseCounts[house]++;
    if (out.length >= limit) break;
  }
  return out.length ? out : scored.slice(0, limit);
}
function getSignatureCandidates(limit=6){
  const pool = getAllCollection();
  const ranked = pool.map(f => {
    const model = getNormalizedScoreModel(f, {occasion:"Casual", environment:"Mixed", pool, mood:"Classy"});
    const s = model.signals;
    let score = composeScore({
      versatility:{score:s.versatilityFit, weight:0.30},
      polish:{score:s.styleFit, weight:0.24},
      identity:{score:s.identityFit, weight:0.18},
      confidence:{score:model.confidence, weight:0.14},
      comfort:{score:s.comfortFit, weight:0.08},
      uniqueness:{score:s.uniquenessFit, weight:0.06}
    }, 100);
    score += getRecommendationMemoryScore("signature", f) * 7.0; // scaled to 100-pt
    return { item: f, score: roundScore(score, 1) };
  }).sort((a,b) => b.score - a.score || a.item.n.localeCompare(b.item.n)).slice(0, limit);
  rememberRecommendations("signature", ranked.map(x=>x.item));
  return ranked;
}


function getMoodCandidates(mood, limit=6){
  const moodNorm = norm(mood || "Any");
  const pool = getAllCollection();

  const ranked = pool.map(f => {
    const model = getNormalizedScoreModel(f, {
      occasion: "Casual",
      environment: "Mixed",
      pool,
      mood,
      weather: state.weather
    });
    const s = model.signals;
    let score = composeScore({
      mood:       {score: s.moodFit,              weight: moodNorm === "any" ? 0.10 : 0.36},
      weather:    {score: s.weatherFit,           weight: 0.14},
      comfort:    {score: s.comfortFit,           weight: 0.14},
      identity:   {score: s.identityFit,          weight: 0.14},
      uniqueness: {score: s.uniquenessFit,        weight: 0.12},
      confidence: {score: model.confidence,       weight: 0.10},
      performance:{score: s.performanceConfidence, weight: 0.10},
      risk:       {score: 10 - model.risk,        weight: 0.10}
    }, 100);
    score += getRecommendationMemoryScore("mood", f) * 6.5; // scaled to 100-pt
    return { item: f, score: roundScore(score, 1) };
  }).sort((a,b) => b.score - a.score || a.item.n.localeCompare(b.item.n));

  const picks = ranked.slice(0, limit).map(x => x.item);
  rememberRecommendations("mood", picks);
  return picks;
}

// Key obfuscation — XOR with static seed so plain sk-ant- keys aren't visible in localStorage
function _vaultObfuscate(str){
  const seed = "vlt2025fr4g";
  let out = "";
  for (let i=0; i<str.length; i++){
    out += String.fromCharCode(str.charCodeAt(i) ^ seed.charCodeAt(i % seed.length));
  }
  return btoa(out);
}
function _vaultDeobfuscate(b64){
  try {
    const seed = "vlt2025fr4g";
    const str = atob(b64);
    let out = "";
    for (let i=0; i<str.length; i++){
      out += String.fromCharCode(str.charCodeAt(i) ^ seed.charCodeAt(i % seed.length));
    }
    return out;
  } catch(_){ return ""; }
}

function esc(s){ return String(s != null ? s : "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function norm(s){ return String(s||"").toLowerCase().trim(); }
function dnatags(f){ return (f.d||[]).map(norm); }
function isOil(f){ return /oil/i.test(f.h||"") || /oil/i.test(f.n||""); }

function displayDNAList(f, maxTags=4){
  const raw = dnatags(f);
  const scores = {
    "Fresh":0, "Citrus":0, "Aquatic":0, "Blue":0, "Green":0,
    "Woody":0, "Vetiver / Earthy":0, "Fougere":0, "Musk / Powdery":0,
    "Amber":0, "Sweet":0, "Spicy":0, "Gourmand":0, "Oud":0, "Tobacco":0
  };

  const bump = (key, n=1) => { if (scores[key] !== undefined) scores[key] += n; };
  const hasAny = (text, words) => words.some(word => text.includes(word));

  raw.forEach(tag => {
    const t = norm(tag);

    if (hasAny(t, ["fresh","clean","airy","soapy","soap","tea","crisp","bright","freshness","neroli lite","easy wear"])) bump("Fresh", 2);
    if (hasAny(t, ["citrus","orange","bergamot","lemon","lime","grapefruit","neroli","orange blossom","mandarin","yuzu","pineapple","citrusy"])) bump("Citrus", 2);
    if (hasAny(t, ["aquatic","marine","watery","salty","ocean","beach","sea","water"])) bump("Aquatic", 2);
    if (hasAny(t, ["blue","bleu","electric","cobalt","indigo"])) bump("Blue", 2);
    if (hasAny(t, ["green","grassy","herbal","mossy","minty","mint","cut grass","leafy","fig","basil"])) bump("Green", 2);
    if (hasAny(t, ["woody","woods","wood","patchouli","sandalwood","cedar","guaiac","bark","birch"])) bump("Woody", 2);
    // "woods" as a standalone primary note deserves extra weight — it's the core DNA, not a modifier
    if (hasAny(t, ["woods","wood"]) && !hasAny(t, ["driftwood","firewood"])) bump("Woody", 1);
    if (hasAny(t, ["palo santo"])) { bump("Woody", 2); bump("Amber", 1); } // palo santo = resinous sacred wood, amber-adjacent
    if (hasAny(t, ["vetiver","earthy","mineral","earthiness","earth","soil","rocky","terr"])) bump("Vetiver / Earthy", 3);
    if (hasAny(t, ["fougere","lavender","barbershop","shaving cream","fern","coumarin","geranium"])) bump("Fougere", 2);
    // 'aromatic' alone is too generic — only fires Fougere when paired with fougere-specific context
    if (hasAny(t, ["aromatic"]) && hasAny(t, ["lavender","fougere","barbershop","fern","geranium","coumarin","herbal"])) bump("Fougere", 2);
    if (hasAny(t, ["musk","musky","powdery","powder","iris","skin","soft musk","white musk"])) bump("Musk / Powdery", 2);
    if (hasAny(t, ["ambrox","ambroxan"])) { bump("Musk / Powdery", 2); bump("Amber", 1); } // ambroxan = synthetic amber-musk
    if (hasAny(t, ["amber","ambered","amberwood","benzoin","resinous","labdanum","ambergris"])) bump("Amber", 2);
    // "warm" and "warmth" alone are vibe descriptors — only fire Amber when paired with explicit amber chemistry
    if (hasAny(t, ["warm"]) && hasAny(t, ["amber","benzoin","resin","labdanum","amberwood"])) bump("Amber", 1);
    // Sweet: actual sweetness signals. "warm/warmth/golden/cozy" are vibe descriptors → small Sweet bump, not Amber
    if (hasAny(t, ["sweet","sweetness","vanilla","sugar","sugary","honey","praline","caramel","cream","creamy","cotton candy","spun sugar"])) bump("Sweet", 2);
    if (hasAny(t, ["golden","warm","warmth","cozy richness","rich sweetness"])) bump("Sweet", 1);
    if (hasAny(t, ["spice","spicy","pepper","ginger","cinnamon","cardamom","saffron","nutmeg","clove","hot"])) bump("Spicy", 2);
    // Gourmand: food/dessert/boozy — NOT tobacco or oud
    if (hasAny(t, ["gourmand","coffee","chocolate","cocoa","caramel","dessert","rum","boozy","tonka","hazelnut","chestnut","cookie","cake","praline"])) bump("Gourmand", 2);
    // Oud: explicit oud chemistry only
    // 'incense' alone is too broad (catches blue/woody notes) — requires oud context
    // 'smoky/smoke' are Tobacco territory; fireside/campfire are oud-adjacent not tobacco
    if (hasAny(t, ["oud","aoud","bakhoor","tarry","dark resin"])) bump("Oud", 3);
    if (hasAny(t, ["incense"]) && hasAny(t, ["oud","dark","resin","bakhoor"])) bump("Oud", 3);
    if (hasAny(t, ["incense"]) && !hasAny(t, ["oud","dark","resin","bakhoor"])) bump("Amber", 1); // incense in blue/woody = warm amber note only
    if (hasAny(t, ["fireside","campfire","burnt wood","charred"])) bump("Oud", 2);
    if (hasAny(t, ["mysterious","dark rum"])) bump("Oud", 1);
    if (hasAny(t, ["resinous"]) && hasAny(t, ["oud","aoud","dark","smoky oud"])) bump("Oud", 2);
    // Tobacco: fireside/campfire/cozy smoke is NOT tobacco — only explicit tobacco keywords
    if (hasAny(t, ["tobacco","tabac","pipe tobacco","cigarette","cuban"])) bump("Tobacco", 3);
    if (hasAny(t, ["smoky","smoke"]) && !hasAny(t, ["fireside","campfire","burnt wood","charred","cozy","fruity"])) bump("Tobacco", 3);
    if (hasAny(t, ["smoky","smoke"]) && hasAny(t, ["fruity"])) bump("Woody", 1); // birch smoke in Aventus-style = woody note

    // Honey is amber-adjacent when in warm/tobacco/aromatic context
    if (hasAny(t, ["honey"]) && hasAny(t, ["tobacco","amber","warm","lavender","aromatic","rich"])) bump("Amber", 2);

    // Fruity signals → Citrus + Sweet split
    if (hasAny(t, ["apple","pear","peach","mango","cherry","plum","berry","melon","coconut","apricot","blackcurrant"])) {
      bump("Citrus", 1); bump("Sweet", 1);
    }
    if (hasAny(t, ["floral","rose","jasmine","floral amber","fruity floral"])) bump("Sweet", 1);

    // Relationship nudges
    if (hasAny(t, ["aquatic","marine"])) bump("Fresh", 1);
    if (hasAny(t, ["citrus","bergamot"])) bump("Fresh", 1);
    if (hasAny(t, ["neroli","iris","ambrox"])) bump("Musk / Powdery", 1);
    if (hasAny(t, ["lavender","fougere"])) bump("Fougere", 1);
    if (hasAny(t, ["amber","benzoin"])) bump("Sweet", 1);
    if (hasAny(t, ["oud","incense"])) bump("Amber", 1);
  });

  // Structural boosts
  if (scores["Aquatic"] > 0) scores["Fresh"] += 1;
  if (scores["Citrus"] > 0)  scores["Fresh"] += 1;
  if (scores["Fougere"] > 0) scores["Fresh"] += 1;
  if (scores["Vetiver / Earthy"] > 0) scores["Woody"] += 1;
  if (scores["Oud"] > 0)     scores["Amber"] += 2; // oud almost always has amber warmth underneath
  if (scores["Tobacco"] > 0) scores["Amber"] += 2; // tobacco blends almost always have amber/warmth base
  // Lavender/Fougere as accent note in tobacco/amber/spicy frags — suppress dominance
  if (scores["Tobacco"] > 0 && scores["Fougere"] > 0) scores["Fougere"] = Math.max(0, scores["Fougere"] - 2);
  if (scores["Amber"] >= 4 && scores["Spicy"] >= 4 && scores["Fougere"] > 0) scores["Fougere"] = Math.max(0, scores["Fougere"] - 2);

  // Rank by score
  let ranked = Object.entries(scores)
    .filter(([,score]) => score > 0)
    .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([name]) => name);

  // De-dup overlapping signals
  if (ranked.includes("Gourmand") && ranked.indexOf("Sweet") > ranked.indexOf("Gourmand")) {
    ranked = ranked.filter(x => x !== "Sweet").concat(["Sweet"]);
  }
  if (ranked.includes("Oud") && ranked.includes("Amber")) {
    // Keep Oud first, push Amber lower
    ranked = ["Oud", ...ranked.filter(x => x !== "Oud")];
  }
  if (ranked.includes("Vetiver / Earthy") && ranked.includes("Woody")) {
    ranked = ["Vetiver / Earthy", ...ranked.filter(x => x !== "Vetiver / Earthy")];
  }
  if (ranked.includes("Aquatic") && ranked.includes("Blue") && ranked.includes("Fresh")) {
    ranked = ranked.slice(0, maxTags);
  }

  return ranked.slice(0, maxTags).length ? ranked.slice(0, maxTags) : ["Fresh"];
}

function getWeatherAdjustedWeights(baseWeights, weather){
  const w = {...baseWeights};
  const temp = weather && typeof weather.temp==="number" ? weather.temp : null;
  if (temp !== null){
    if (temp <= 55){
      w["amber"] = (w["amber"]||0) + 2;
      w["woody"] = (w["woody"]||0) + 1;
      w["spicy"] = (w["spicy"]||0) + 1;
      w["fresh"] = (w["fresh"]||0) - 1;
      w["aquatic"] = (w["aquatic"]||0) - 2;
    }
    if (temp >= 82){
      w["fresh"] = (w["fresh"]||0) + 2;
      w["citrus"] = (w["citrus"]||0) + 1;
      w["aquatic"] = (w["aquatic"]||0) + 1;
      w["amber"] = (w["amber"]||0) - 2;
      w["gourmand"] = (w["gourmand"]||0) - 3;
    }
  }
  return w;
}

function scoreFragrance(f, weights, weather=null, environment="Mixed"){
  const model = getNormalizedScoreModel(f, {occasion:"Casual", weather, environment, pool:getAllCollection()});
  const dna = displayDNAList(f).map(norm);
  const weightedTagFit = getWeightedTagFit(dna, weights || {});
  const roleFit = clampScore((model.fit * 0.55) + (weightedTagFit * 0.35) + (model.signals.styleFit * 0.10));
  return roundScore(roleFit * 10, 1);
}

function pickTop(items, weights, count=3, weather=null, environment="Mixed"){
  const ranked = [...items].map(item=>({item, score:scoreFragrance(item, weights, weather, environment)})).sort((a,b)=>b.score-a.score);
  const out=[], seen=new Set();
  for (const row of ranked){
    const key = getFragranceKey(row.item);
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(row.item);

function getPlaneSafetyLevel(f){
  const dna = displayDNAList(f, 5).map(norm);
  const occasions = simplifyOccasionList(f);

  // Absolute disqualifiers — no exceptions
  const veryRisky = dna.some(x=>["gourmand","oud","tobacco"].includes(x));
  if (veryRisky) return "Not Plane Safe";

  // How much heavy DNA is present
  const richCount = dna.filter(x=>["amber","sweet","spicy","resin"].includes(x)).length;

  // Genuine fresh signal (tighter than before — woody alone is not enough)
  const genuinelyFresh = dna.some(x=>["fresh","citrus","aquatic","blue","green"].includes(x));

  // Broader fresh/structured core (includes woody, fougere, musk/powdery)
  const freshCore = dna.some(x=>["fresh","citrus","musk / powdery","woody","vetiver / earthy","blue","aquatic","green","fougere"].includes(x));

  // officeLike is a tiebreaker only — never a primary pathway
  const officeLike = occasions.some(x=>["Office","Casual","Gym"].includes(x));

  // Plane Safe: fresh core with zero heavy DNA
  if (freshCore && richCount === 0) return "Plane Safe";

  // 2+ heavy tags is too projecting for an enclosed cabin, even with fresh
  if (richCount >= 2 && genuinelyFresh) return "Safe Enough";
  if (richCount >= 2) return "Not Plane Safe";

  // 1 heavy tag + fresh core = borderline → Safe Enough
  if (freshCore && richCount === 1) return "Safe Enough";

  // No fresh DNA: officeLike can only reach Safe Enough if very light (1 heavy tag max)
  if (officeLike && richCount <= 1) return "Safe Enough";

  return "Not Plane Safe";
}

function getLayerSuggestions(collection, occasion, weather, count=8){

    for (let j = 0; j < pool.length; j++) {
      if (i === j) continue;
      const base = pool[i];
      const top = pool[j];
      const res = getLayeringAnalysis(base, top);
      if (res.score >= 6) combos.push({base, top, res});
    }
  }
  combos.sort((a,b)=>b.res.score-a.res.score);
  const out = [];

    const key = combo.base.n + "||" + combo.top.n;
    if (seen.has(key)) continue;

    out.push(combo);
    if (out.length >= count) break;

}

      (td.includes("woody") || td.includes("musk / powdery") || td.includes("fougere"))) add("freshen up");

  };

  };

    signature:["amber","gourmand","tobacco","oud","spicy"],
