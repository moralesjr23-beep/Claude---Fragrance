  bindValue("wearLogSearch", v=>{ state.wearLogSearch=v; render(); });
  bindValue("wearLogOccasionFilter", v=>{ state.wearLogOccasionFilter=v; render(); });
  bindValue("wearLogDateFrom", v=>{ state.wearLogDateFrom=v; render(); });
  bindValue("wearLogDateTo", v=>{ state.wearLogDateTo=v; render(); });
  const clearWearLogFilters=document.getElementById("clearWearLogFilters");
  if(clearWearLogFilters) clearWearLogFilters.onclick=()=>{ state.wearLogSearch=""; state.wearLogOccasionFilter="All"; state.wearLogDateFrom=""; state.wearLogDateTo=""; render(); };

  // Wear typeahead
  const wearSelectedSearch=document.getElementById("wearSelectedSearch");
  if(wearSelectedSearch){ wearSelectedSearch.oninput=e=>{ const v=e.target.value; const match=getAllCollection().find(f=>f.n.toLowerCase()===v.toLowerCase()||f.n===v); if(match){ state.wearSelected=match.n; render(); } else { state.wearSelected=v; } }; }

  // Layering typeahead
  const layerBaseSearch=document.getElementById("layerBaseSearch");
  if(layerBaseSearch){ layerBaseSearch.oninput=e=>{ const v=e.target.value; const match=getAllCollection().find(f=>f.n.toLowerCase()===v.toLowerCase()||f.n===v); if(match){ state.layerBase=match.n; render(); } }; }
  const layerTopSearch=document.getElementById("layerTopSearch");
  if(layerTopSearch){ layerTopSearch.oninput=e=>{ const v=e.target.value; const match=getAllCollection().find(f=>f.n.toLowerCase()===v.toLowerCase()||f.n===v); if(match){ state.layerTop=match.n; render(); } }; }

  // Layering wear log toggle
  const toggleWearLayering=document.getElementById("toggleWearLayering");
  if(toggleWearLayering) toggleWearLayering.onclick=()=>{ state.wearIsLayering=!state.wearIsLayering; render(); };
  const wearLayerSecondSearch=document.getElementById("wearLayerSecondSearch");
  if(wearLayerSecondSearch){ wearLayerSecondSearch.oninput=e=>{ const v=e.target.value; const match=getAllCollection().find(f=>f.n===v||f.n.toLowerCase()===v.toLowerCase()); if(match) state.wearLayerSecond=match.n; else state.wearLayerSecond=v; }; }
  bindValue("wearLayerSecondSprays", v=>{ state.wearLayerSecondSprays=Number(v)||1; });

  // Log layer combo as wear
  const logLayerComboAsWear=document.getElementById("logLayerComboAsWear");
  if(logLayerComboAsWear) logLayerComboAsWear.onclick=()=>{
    if (!state.layerBase) return;
    const base=getAllCollection().find(f=>f.n===state.layerBase);
    if (!base) return;
    const entry={
      date:new Date().toISOString().slice(0,10),
      fragrance:base.n,
      house:base.h,
      amount:`${state.layerBaseSprays} sprays base + ${state.layerTopSprays} sprays top`,
      occasion:state.layerOccasion,
      notes:`Layered with ${state.layerTop}`,
      layerWith:state.layerTop,
      layerWithSprays:state.layerTopSprays
    };
    pushUndo("deleteWear",entry);
    state.wearLog.unshift(entry);
    saveWearLog();
    pushToast(`Logged: ${base.n} + ${state.layerTop}`, "success");
    render();
  };

  // Wear delete (✕ button on history)
  document.querySelectorAll("[data-delete-wear]").forEach(btn=>btn.onclick=(e)=>{
    e.stopPropagation();
    const idx=Number(btn.dataset.deleteWear);
    const entry=state.wearLog[idx];
    if(entry){ pushUndo("deleteWear",entry); state.wearLog.splice(idx,1); saveWearLog(); pushToast("Wear deleted — tap Undo to restore","warn"); render(); }
  });

  // Undo
  const undoBtn=document.getElementById("undoLastAction");
  if(undoBtn) undoBtn.onclick=()=>{ performUndo(); };

  // Save bottle status
  const saveBottleStatusBtn=document.getElementById("saveBottleStatus");
  if(saveBottleStatusBtn && state.selectedFragrance) saveBottleStatusBtn.onclick=()=>{
    const name=state.selectedFragrance.n;
    setBottleStatus(name,{
      status:(document.getElementById("bottleStatusField")||{}).value||"Full Bottle",
      cost:(document.getElementById("bottleCost")||{}).value||"",
      mlRemaining:(document.getElementById("bottleMlRemaining")||{}).value||"",
      mlTotal:(document.getElementById("bottleMlTotal")||{}).value||""
    });
    pushToast("Bottle status saved","success");
    render();
  };

  // SOTD sheet
  document.querySelectorAll("[data-sotd]").forEach(btn=>btn.onclick=()=>{
    state.sotdFragrance=btn.dataset.sotd;
    state.activeSheet="sotd";
    render();
  });

  // Patch save wear to include layering info
  const saveWearOld=document.getElementById("saveWear");
  if(saveWearOld) saveWearOld.onclick=()=>{
    const f=getAllCollection().find(x=>x.n===state.wearSelected);
    if(!f){ pushToast("Select a fragrance first","warn"); return; }
    const entry={
      date:state.wearDate||new Date().toISOString().slice(0,10),
      fragrance:f.n,
      house:f.h,
      amount:state.wearAmount||getSprayAdvice(f,state.wearOccasion),
      occasion:state.wearOccasion,
      notes:state.wearNotes.trim()
    };
    if(state.wearIsLayering && state.wearLayerSecond){
      entry.layerWith=state.wearLayerSecond;
      entry.layerWithSprays=state.wearLayerSecondSprays;
      const baseSprays=parseInt((document.getElementById("wearBaseSprays")||{}).value||"2");
      entry.amount=`${baseSprays} base + ${state.wearLayerSecondSprays} top (${state.wearLayerSecond})`;
    }
    pushUndo("deleteWear",entry);
    state.wearLog.unshift(entry);
    saveWearLog();
    state.wearNotes="";
    state.wearAmount="";
    pushToast(`Logged: ${f.n}${entry.layerWith?" + "+entry.layerWith:""}`, "success");
    render();
  };


async function loadWeather(){
  state.weather={loading:true,error:"",temp:null,code:null,wind:null,humidity:null,city:state.weatherPref.mode==="manual"?(state.weatherPref.city||"Manual city"):"Your area"};
  render();
  state.weather=await fetchWeather(state.weatherPref);
  render();
}
loadWeather();
render();
</script>
</body>
</html>
